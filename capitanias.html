// ══════════════════════════════════════════════════════════════════
// MAPA LEAFLET
// ══════════════════════════════════════════════════════════════════
const map = L.map('map', {center:[-14,-42], zoom:5, minZoom:4, maxZoom:9, zoomControl:true});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd', maxZoom:20}).addTo(map);

// Linha de Tordesilhas
L.polyline([[-35,-48.7],[10,-48.7]],
  {color:'#c9a84c', weight:1.5, dashArray:'8,5', opacity:.7})
  .bindTooltip('Meridiano de Tordesilhas — 48,7° W<br>Cintra (2013): calculado a partir do módulo de 16⅔ léguas/grau',
    {className:'cacd-tooltip', direction:'right'})
  .addTo(map);

// Polígonos das capitanias
const layers = {};
CAPS.forEach(cap => {
  const c = COR[cap.resultado];
  // Garantir que o polígono seja válido (fechado)
  const polyCoords = [...cap.poly, cap.poly[0]];
  const poly = L.polygon(polyCoords, {
    fillColor: c.fill,
    fillOpacity: .82,
    color: c.border,
    weight: 1.0,
    opacity: .9
  }).addTo(map);

  poly.bindTooltip(
    `<b>${cap.nome}</b><br><span style="opacity:.7">${cap.donatario} · ${cap.leguas}</span>`,
    {className:'cacd-tooltip', direction:'top', sticky:true}
  );

  poly.on('click', () => abrir(cap));
  poly.on('mouseover', function(){ this.setStyle({fillOpacity:.97, weight:1.5, color:'#fff'}); });
  poly.on('mouseout', function(){
    this.setStyle({fillColor:c.fill, fillOpacity:.82, color:c.border, weight:1.0, opacity:.9});
  });

  layers[cap.id] = poly;
});

// ══════════════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════════════
function buildSidebar() {
  const sl = document.getElementById('slist');
  const groups = [
    {label:'▸ Norte — Meridianos', ids:['MA1','MA2','PI','CE','RN1','RN2']},
    {label:'▸ Centro — Paralelos', ids:['IT','PE','BA','IL','PS','ES']},
    {label:'▸ Sul — Rumo Noroeste', ids:['ST','SV1','SA','SV2','SAN']},
  ];
  groups.forEach(g => {
    const h = document.createElement('div');
    h.className = 'grp-head'; h.textContent = g.label;
    sl.appendChild(h);
    g.ids.forEach(id => {
      const cap = CAPS.find(c => c.id === id);
      if (!cap) return;
      const c = COR[cap.resultado];
      const d = document.createElement('div');
      d.className = 'si';
      d.dataset.n = (cap.nome + ' ' + cap.donatario).toLowerCase();
      d.onclick = () => { abrir(cap); map.fitBounds(layers[cap.id].getBounds(), {padding:[30,30]}); };
      d.innerHTML = `<div class="si-num">${cap.n}</div>
        <div class="si-info">
          <div class="si-name">${cap.nome}</div>
          <div class="si-sub" style="color:${c.border}">${cap.donatario}</div>
        </div>`;
      sl.appendChild(d);
    });
  });
  document.getElementById('cnt').textContent = CAPS.length;
}
buildSidebar();

function buscar(v) {
  const q = v.toLowerCase();
  document.querySelectorAll('.si').forEach(el => {
    el.classList.toggle('hidden', q.length > 0 && !el.dataset.n.includes(q));
  });
}

// ══════════════════════════════════════════════════════════════════
// POPUP
// ══════════════════════════════════════════════════════════════════
function abrir(cap) {
  const c = COR[cap.resultado];
  const pnum = document.getElementById('pnum');
  pnum.textContent = `Cap. ${cap.n} · ${c.label}`;
  pnum.style.cssText = `background:${c.fill};color:${c.border};border:1px solid ${c.border}55`;
  document.getElementById('ptitle').textContent = cap.nome;
  document.getElementById('popup').style.borderTop = `3px solid ${c.border}`;
  document.getElementById('pmeta').innerHTML =
    `<div>👑 <b>${cap.donatario}</b></div>` +
    `<div>📏 <b>${cap.leguas}</b></div>` +
    `<div>🏙️ <b>${cap.capital}</b></div>`;

  const g = document.getElementById('pgrid');
  g.innerHTML = '';
  function box(cls, titulo, texto) {
    const d = document.createElement('div');
    d.className = 'pbox' + (cls ? ' ' + cls : '');
    d.innerHTML = `<h3>${titulo}</h3><p>${texto}</p>`;
    g.appendChild(d);
  }
  box('full','💰 Economia e Produção', cap.economia);
  box('','⚖️ Política e Administração', cap.politica);
  box('','🇵🇹 Relação com a Coroa Portuguesa', cap.portugal);
  box('full','👥 Principais Lideranças', cap.lideres);
  box('','⚔️ Conflitos e Resistências', cap.conflitos);
  box('','📜 Legado Histórico', cap.legado);
  box('full','🗺️ Nota Cartográfica (Cintra, 2013)',
    `<p style="font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.7;color:var(--muted)">${cap.fonte}</p>`);
  document.getElementById('overlay').classList.add('open');
}

function fechar() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e) { if (e.target.id === 'overlay') fechar(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') fechar(); });
setTimeout(() => map.invalidateSize(), 100);
</script>
