<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090d12">
<title>Brasil – Portugal · Relações Internacionais · CACD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── TOKENS (mesclagem PEB dark + Militares gold) ── */
:root {
  --bg:        #0d1117;
  --bg2:       #090d12;
  --panel:     #13191f;
  --panel2:    #171e26;
  --border:    #2a3240;
  --gold:      #c9a84c;
  --gold-bright: #e8c97a;
  --gold-dim:  rgba(201,168,76,0.12);
  --gold-line: rgba(201,168,76,0.3);
  --text:      #f0ece2;
  --muted:     #7a8494;
  --red:       #c0392b;
  --green:     #5f9a6a;
  --blue:      #4a7cb5;
  --teal:      #3a8c84;
  --purple:    #8e5ea0;
  --orange:    #c47a35;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  font-family: "IBM Plex Mono", monospace;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HERO (do Militares) ── */
.hero {
  background: linear-gradient(180deg, #050709 0%, #0d1117 70%, transparent 100%);
  padding: 4.5rem 2rem 3.5rem;
  text-align: center;
  position: relative;
  border-bottom: 1px solid var(--gold-line);
}
.hero::before {
  content: '';
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 80px; height: 2px;
  background: var(--gold);
}
.hero-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: .58rem;
  letter-spacing: .32em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1.4rem;
}
.hero-flags {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 1.2rem;
}
.hflag {
  width: 54px; height: 36px; border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.15);
  overflow: hidden; position: relative;
  flex-shrink: 0;
}
.hflag svg { width: 100%; height: 100%; display: block; }
.hero-sep { color: var(--gold); font-size: 1.2rem; opacity: .7; }
.hero h1 {
  font-family: "Playfair Display", serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: .5rem;
}
.hero h1 em { color: var(--gold); font-style: italic; }
.hero-sub {
  font-family: "Crimson Pro", serif;
  font-style: italic;
  font-size: clamp(.9rem, 2vw, 1.1rem);
  color: var(--muted);
  margin-bottom: 2.2rem;
}

/* era legend dots */
.era-legend {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
}
.era-legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: .5rem; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
}
.era-legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* ── FILTER BAR (do Militares) ── */
.filter-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.filter-lbl {
  font-size: .46rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}
.fbtn {
  font-family: "IBM Plex Mono", monospace;
  font-size: .5rem;
  padding: 5px 14px;
  letter-spacing: .09em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  border-radius: 2px;
  transition: all .15s;
}
.fbtn:hover, .fbtn.on {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}
.filter-spacer { flex: 1; }
.search-box {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: "IBM Plex Mono", monospace;
  font-size: .52rem;
  padding: 5px 12px;
  border-radius: 2px;
  outline: none;
  width: 180px;
}
.search-box:focus { border-color: var(--gold); }
.search-box::placeholder { color: var(--muted); }

/* ── MAIN SPLIT (do PEB) ── */
.workspace {
  display: grid;
  grid-template-columns: 270px 1fr;
  min-height: calc(100vh - 160px);
}

/* ── SIDEBAR (do PEB) ── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  position: sticky;
  top: 50px;
  height: calc(100vh - 50px);
}
.sidebar-section {
  border-bottom: 1px solid var(--border);
}
.section-era {
  padding: 10px 16px 6px;
  font-size: .58rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-era::after {
  content: ''; flex: 1; height: 1px;
  background: var(--gold-line);
}
.nav-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .15s;
}
.nav-item:hover { background: var(--gold-dim); }
.nav-item.active {
  background: var(--gold-dim);
  border-left-color: var(--gold);
}
.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%; margin-top: 5px; flex-shrink: 0;
}
.nav-info { flex: 1; min-width: 0; }
.nav-year {
  font-size: .62rem; font-weight: 600;
  color: var(--muted); letter-spacing: .04em;
}
.nav-item.active .nav-year { color: var(--gold); }
.nav-title {
  font-size: .67rem; color: var(--text);
  line-height: 1.35; margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-tag {
  font-size: .5rem; padding: 2px 7px; border-radius: 2px;
  text-transform: uppercase; letter-spacing: .06em;
  margin-top: 4px; display: inline-block;
}

/* ── CONTENT AREA ── */
.content {
  overflow-y: auto;
}

/* ── TIMELINE CENTRAL (do Militares) ── */
.timeline-wrap {
  padding: 50px 48px 100px;
  position: relative;
}
.tl-line {
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 2px;
  transform: translateX(-50%);
  background: linear-gradient(180deg, transparent, var(--border) 5%, var(--border) 95%, transparent);
}

/* era divider */
.era-block {
  position: relative;
  text-align: center;
  margin: 48px 0 32px;
  z-index: 2;
}
.era-block-label {
  display: inline-block;
  font-size: .52rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  padding: 6px 20px;
  border: 1px solid var(--gold-line);
  background: var(--bg);
  color: var(--gold);
  position: relative;
}

/* event row — alternating sides (do Militares) */
.ev-row {
  display: grid;
  grid-template-columns: 1fr 40px 1fr;
  gap: 0;
  align-items: start;
  margin-bottom: 32px;
  position: relative;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity .4s, transform .4s;
}
.ev-row.visible { opacity: 1; transform: translateY(0); }
.ev-row.hidden { display: none; }

.ev-left, .ev-right { padding: 0; }
.ev-left { text-align: right; padding-right: 28px; }
.ev-right { text-align: left; padding-left: 28px; }
.ev-empty { /* spacer */ }

/* center column dot */
.ev-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 14px;
  position: relative;
  z-index: 2;
}
.ev-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--bg);
  flex-shrink: 0;
  cursor: pointer;
  transition: transform .2s;
}
.ev-dot:hover { transform: scale(1.3); }

/* card (PEB card style) */
.ev-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  text-align: left;
}
.ev-card:hover { border-color: var(--gold); background: var(--panel2); }
.ev-card.active { border-color: var(--gold); background: var(--panel2); }
.ev-card-year {
  font-family: "IBM Plex Mono", monospace;
  font-size: .56rem; font-weight: 600;
  letter-spacing: .06em;
  margin-bottom: 5px;
}
.ev-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; }
.ev-card-title {
  font-family: "Playfair Display", serif;
  font-size: .92rem; font-weight: 700;
  line-height: 1.3; margin-bottom: 5px;
}
.ev-card-sub {
  font-family: "Crimson Pro", serif;
  font-size: .82rem; color: var(--muted); line-height: 1.5;
}

/* right-side card: reversed tags alignment */
.ev-right .ev-card-tags { justify-content: flex-start; }
.ev-left .ev-card-tags { justify-content: flex-end; }
.ev-left .ev-card { text-align: right; }

/* ── DETAIL PANEL (do PEB) ── */
.detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5,7,9,0.7);
  z-index: 200;
  align-items: flex-end;
}
.detail-overlay.open { display: flex; }
.detail-drawer {
  width: 100%;
  max-height: 75vh;
  background: var(--panel);
  border-top: 2px solid var(--gold);
  display: flex;
  flex-direction: column;
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.drawer-header {
  padding: 16px 24px 12px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: start;
  flex-shrink: 0;
}
.drawer-meta {
  font-size: .48rem;
  color: var(--gold);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.drawer-title {
  font-family: "Playfair Display", serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 6px;
}
.drawer-sub {
  font-family: "Crimson Pro", serif;
  font-style: italic;
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.5;
}
.drawer-close {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 32px; height: 32px;
  border-radius: 2px;
  cursor: pointer;
  font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color .15s;
}
.drawer-close:hover { border-color: var(--gold); color: var(--gold); }

/* three-column meta row (do PEB) */
.drawer-meta-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.meta-col {
  padding: 12px 20px;
  border-right: 1px solid var(--border);
}
.meta-col:last-child { border-right: none; }
.meta-col-label {
  font-size: .44rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}
.meta-col-content {
  font-family: "Crimson Pro", serif;
  font-size: .84rem;
  color: var(--text);
  line-height: 1.6;
}

/* tabs (do PEB) */
.drawer-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.drawer-tabs::-webkit-scrollbar { display: none; }
.dtab {
  font-family: "IBM Plex Mono", monospace;
  font-size: .5rem;
  padding: 10px 16px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
}
.dtab:hover { color: var(--text); }
.dtab.active { color: var(--gold); border-bottom-color: var(--gold); }

.drawer-body {
  overflow-y: auto;
  flex: 1;
}
.tab-panel { display: none; padding: 20px 24px 32px; }
.tab-panel.active { display: block; }

/* content widgets */
.tp-section { margin-bottom: 20px; }
.tp-label {
  font-size: .46rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}
.tp-text {
  font-family: "Crimson Pro", serif;
  font-size: .9rem;
  line-height: 1.75;
  color: var(--text);
}
.tp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.tp-stat {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 14px;
}
.tp-stat-val {
  font-family: "Playfair Display", serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.tp-stat-lbl {
  font-size: .44rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-top: 3px;
}
.tp-list { list-style: none; }
.tp-list li {
  font-family: "Crimson Pro", serif;
  font-size: .88rem;
  color: var(--text);
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
}
.tp-list li::before { content: '›'; color: var(--gold); flex-shrink: 0; }
.tp-actors { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.actor-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 7px 12px;
}
.actor-name { font-size: .56rem; color: var(--text); font-weight: 600; }
.actor-role { font-size: .46rem; color: var(--muted); margin-top: 2px; }
.quote-block {
  background: var(--bg);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  margin: 14px 0;
  border-radius: 0 3px 3px 0;
}
.quote-text {
  font-family: "Crimson Pro", serif;
  font-style: italic;
  font-size: .95rem;
  color: var(--text);
  line-height: 1.65;
}
.quote-author {
  font-size: .46rem;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-top: 8px;
}

/* tags */
.tag {
  font-size: .44rem;
  padding: 2px 7px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.tc { background:rgba(201,168,76,.10);  color:var(--gold);    border:1px solid rgba(201,168,76,.3);  }
.ti { background:rgba(142,94,160,.12);  color:var(--purple);  border:1px solid rgba(142,94,160,.3);  }
.tr { background:rgba(74,124,181,.12);  color:var(--blue);    border:1px solid rgba(74,124,181,.3);   }
.tm { background:rgba(58,140,132,.12);  color:var(--teal);    border:1px solid rgba(58,140,132,.3);   }
.tk { background:rgba(201,168,76,.14);  color:var(--gold-bright); border:1px solid rgba(201,168,76,.35); }
.ta { background:rgba(95,154,106,.12);  color:var(--green);   border:1px solid rgba(95,154,106,.3);   }
.tx { background:rgba(192,57,43,.12);   color:var(--red);     border:1px solid rgba(192,57,43,.3);    }
.td { background:rgba(74,124,181,.12);  color:var(--blue);    border:1px solid rgba(74,124,181,.3);   }

/* footer quick-access (do PEB) */
.quick-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 7px 20px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 150;
}
.quick-bar::-webkit-scrollbar { display: none; }
.qpill {
  font-size: .44rem;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
  transition: all .15s;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: .06em;
  text-transform: uppercase;
  background: transparent;
}
.qpill:hover { border-color: var(--gold); color: var(--gold); }

/* ── SAFE AREA (iPhone notch/home bar) ── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .quick-bar {
    padding-bottom: calc(7px + env(safe-area-inset-bottom));
  }
  @media (max-width: 768px) {
    .detail-drawer {
      padding-bottom: env(safe-area-inset-bottom);
    }
  }
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── MOBILE ── */
@media (max-width: 768px) {

  /* Hero compacto */
  .hero {
    padding: 2.2rem 1.2rem 2rem;
  }
  .hero-label {
    font-size: .5rem;
    letter-spacing: .18em;
    margin-bottom: 1rem;
  }
  .hero h1 { font-size: 2rem; }
  .hero-sub { font-size: .82rem; margin-bottom: 1.4rem; }
  .hflag { width: 36px; height: 24px; }
  .era-legend { gap: 10px; }
  .era-legend-item { font-size: .44rem; }

  /* Filter bar — scroll horizontal */
  .filter-bar {
    padding: 8px 12px;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-lbl { display: none; }
  .fbtn { font-size: .46rem; padding: 5px 10px; flex-shrink: 0; }
  .filter-spacer { display: none; }
  .search-box { display: none; } /* substituído por modal no mobile */

  /* Layout — sem sidebar */
  .workspace { grid-template-columns: 1fr; }
  .sidebar { display: none; }

  /* Timeline — coluna única, linha à esquerda */
  .timeline-wrap {
    padding: 20px 14px 100px 44px;
  }
  .tl-line {
    left: 16px;
    transform: none;
  }
  .ev-row {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 0;
    margin-bottom: 20px;
  }
  .ev-left { display: none; }
  .ev-empty { display: none; }
  .ev-center {
    flex-shrink: 0;
    width: 28px;
    padding-top: 12px;
    margin-left: -28px;
  }
  .ev-dot { width: 12px; height: 12px; }
  .ev-right {
    flex: 1;
    padding-left: 12px;
    text-align: left;
  }
  /* cards no mobile */
  .ev-card {
    padding: 11px 13px;
  }
  .ev-card-year { font-size: .58rem; }
  .ev-card-title { font-size: .82rem; }
  .ev-card-sub { font-size: .75rem; }
  .ev-card-tags { margin-bottom: 5px; }
  .tag { font-size: .42rem; padding: 2px 6px; }

  /* Era dividers */
  .era-block-label { font-size: .44rem; padding: 5px 12px; letter-spacing: .12em; }

  /* ── DRAWER — tela cheia no mobile */
  .detail-overlay { align-items: flex-start; }
  .detail-drawer {
    max-height: 100vh;
    height: 100dvh;
    border-top: none;
    border-bottom: 2px solid var(--gold);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header do drawer */
  .drawer-header {
    padding: 14px 16px 10px;
    gap: 10px;
  }
  .drawer-title { font-size: 1.1rem; }
  .drawer-sub { font-size: .78rem; }
  .drawer-meta { font-size: .42rem; }
  .drawer-close {
    width: 28px; height: 28px; font-size: .7rem;
    flex-shrink: 0;
  }

  /* Meta row — coluna única */
  .drawer-meta-row {
    grid-template-columns: 1fr !important;
    border-bottom: 1px solid var(--border);
  }
  .meta-col {
    padding: 8px 16px;
    border-right: none !important;
    border-bottom: 1px solid var(--border);
  }
  .meta-col:last-child { border-bottom: none; }
  .meta-col-label { font-size: .42rem; }
  .meta-col-content { font-size: .78rem; }

  /* Tabs — scroll horizontal */
  .drawer-tabs { flex-shrink: 0; }
  .dtab { font-size: .46rem; padding: 9px 12px; }

  /* Body do drawer — scrollável */
  .drawer-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        {lbl:"A transferência — logística e significado histórico", txt:"Em 29 de novembro de 1807, entre 10.000 e 15.000 pessoas embarcaram no Tejo sob chuva, levando arquivos, tesouro régio, biblioteca e a família real. A escolta era da Royal Navy. Em 22 de janeiro de 1808 chegaram a Salvador; em 7 de março, ao Rio de Janeiro. Foi a única vez na história moderna em que um monarca europeu governou seu império a partir de uma colônia. O Rio de Janeiro tornou-se, de um dia para o outro, capital de um vasto império."},

        {lbl:"Carta Régia de Abertura dos Portos (1808)", txt:"Primeiro documento de política econômica externa do futuro Estado brasileiro. Rompeu o monopólio comercial português sobre o Brasil. Texto fundamental para entender a transição do sistema colonial para a economia de mercado no Brasil."}

      {name:"Celso Amorim", role:"Assessor especial — influência na política externa do governo Lula III"},
      {name:"Luís Montenegro", role:"PM português (2024–) — manteve a agenda bilateral do governo anterior"},
      {name:"Ursula von der Leyen", role:"Presidente da Comissão Europeia — conduziu a conclusão do Acordo UE-Mercosul"}
    ],
    stats:[{val:"2024", lbl:"Conclusão UE-Mercosul"},{val:"780 mi", lbl:"Pessoas abrangidas"},{val:"€88 bi", lbl:"Comércio bilateral UE-Mercosul"},{val:"2026", lbl:"30 anos da CPLP"}]
  }
];

/* ── ERA CONFIG ── */
const ERA_LABELS = {colonial:"Período Colonial", imperial:"Período Imperial", republican:"República", modern:"Era Moderna", contempor:"Contemporâneo"};
const ERA_ORDER  = ["colonial","imperial","republican","modern","contempor"];
const TAG_LABELS = {colonial:"Colonial",imperial:"Imperial",republican:"República",modern:"Moderno",contempor:"Contemporâneo",acordo:"Acordo",ruptura:"Ruptura",diplomacia:"Diplomacia"};
const TAG_CLS    = {colonial:"tc",imperial:"ti",republican:"tr",modern:"tm",contempor:"tk",acordo:"ta",ruptura:"tx",diplomacia:"td"};

/* ── STATE ── */
let activeEra = "all", activeSearch = "", activeEv = null;

/* ── ELEMENTS ── */
const sidebar    = document.getElementById("sidebar");
const timelineEl = document.getElementById("timelineEl");
const overlay    = document.getElementById("detailOverlay");
const dTitle     = document.getElementById("dTitle");
const dMeta      = document.getElementById("dMeta");
const dSub       = document.getElementById("dSub");
const dMetaRow   = document.getElementById("dMetaRow");
const dTabs      = document.getElementById("dTabs");
const dBody      = document.getElementById("dBody");
const quickBar   = document.getElementById("quickBar");

/* ── RENDER ── */
function tagHtml(t) { return `<span class="tag ${TAG_CLS[t]||'tc'}">${TAG_LABELS[t]||t}</span>`; }

function visible(ev) {
  const eraOk = activeEra === "all" || ev.era === activeEra;
  const search = activeSearch.toLowerCase();
  const searchOk = !search || ev.title.toLowerCase().includes(search) || ev.year.includes(search) || ev.sub.toLowerCase().includes(search);
  return eraOk && searchOk;
}

function render() {
  timelineEl.innerHTML = "";
  sidebar.innerHTML = "";
  quickBar.innerHTML = "";

  let currentEra = null;
  let side = 0; // alternating

  EVENTS.forEach(ev => {
    if (!visible(ev)) return;

    // Quick bar pill
    const qp = document.createElement("button");
    qp.className = "qpill";
    qp.textContent = ev.year + " · " + ev.title.slice(0,28) + (ev.title.length>28?"…":"");
    qp.onclick = () => openDetail(ev);
    quickBar.appendChild(qp);

    // Sidebar section header
    if (ev.era !== currentEra) {
      currentEra = ev.era;
      const sh = document.createElement("div");
      sh.className = "sidebar-section";
      sh.innerHTML = `<div class="section-era">${ERA_LABELS[ev.era]}</div>`;
      sidebar.appendChild(sh);
    }

    // Sidebar nav item
    const ni = document.createElement("div");
    ni.className = "nav-item" + (activeEv === ev.id ? " active" : "");
    ni.id = "nav-" + ev.id;
    ni.innerHTML = `
      <div class="nav-dot" style="background:${ev.dot}"></div>
      <div class="nav-info">
        <div class="nav-year">${ev.year}</div>
        <div class="nav-title">${ev.title}</div>
        <span class="nav-tag tag ${TAG_CLS[ev.tags[0]]||'tc'}">${TAG_LABELS[ev.tags[0]]||ev.tags[0]}</span>
      </div>`;
    ni.onclick = () => { openDetail(ev); scrollToCard(ev.id); };
    sidebar.appendChild(ni);

    // Timeline row (alternating, like Militares)
    const row = document.createElement("div");
    row.className = "ev-row visible";
    row.id = "row-" + ev.id;

    const cardHtml = `
      <div class="ev-card" data-id="${ev.id}">
        <div class="ev-card-year" style="color:${ev.dot}">${ev.year}</div>
        <div class="ev-card-tags">${ev.tags.map(tagHtml).join("")}</div>
        <div class="ev-card-title">${ev.title}</div>
        <div class="ev-card-sub">${ev.sub}</div>
      </div>`;

    if (side % 2 === 0) {
      row.innerHTML = `
        <div class="ev-left">${cardHtml}</div>
        <div class="ev-center"><div class="ev-dot" style="background:${ev.dot}" data-id="${ev.id}"></div></div>
        <div class="ev-right ev-empty"></div>`;
    } else {
      row.innerHTML = `
        <div class="ev-left ev-empty"></div>
        <div class="ev-center"><div class="ev-dot" style="background:${ev.dot}" data-id="${ev.id}"></div></div>
        <div class="ev-right">${cardHtml}</div>`;
    }

    row.querySelectorAll(".ev-card, .ev-dot").forEach(el => {
      el.onclick = () => openDetail(ev);
    });

    timelineEl.appendChild(row);
    side++;
  });
}

function scrollToCard(id) {
  const el = document.getElementById("row-" + id);
  el?.scrollIntoView({ behavior: "smooth", block: "center" });
}

/* ── DETAIL DRAWER ── */
function openDetail(ev) {
  activeEv = ev.id;
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  const ni = document.getElementById("nav-" + ev.id);
  if (ni) ni.classList.add("active");

  // Header
  dMeta.textContent = ev.year + "  ·  " + ERA_LABELS[ev.era];
  dTitle.textContent = ev.title;
  dSub.textContent = ev.sub;

  // 3-col meta row
  if (ev.meta && ev.meta.length) {
    dMetaRow.innerHTML = ev.meta.map(m =>
      `<div class="meta-col"><div class="meta-col-label">${m.lbl}</div><div class="meta-col-content">${m.val}</div></div>`
    ).join("");
    dMetaRow.style.display = "grid";
  } else {
    dMetaRow.style.display = "none";
  }

  // Build tabs — ordem canônica + extras do evento
  const TAB_ORDER = ["Contexto RI","Atores","Tratados e Documentos","Votações em OIs","Governos","Impacto","Legado","Discurso"];
  const evTabKeys = Object.keys(ev.tabs);
  const orderedTabs = TAB_ORDER.filter(t => evTabKeys.includes(t));
  const remainingTabs = evTabKeys.filter(t => !TAB_ORDER.includes(t));
  const allTabs = [...orderedTabs, ...remainingTabs];

  dTabs.innerHTML = allTabs.map((t,i) =>
    `<div class="dtab${i===0?" active":""}" data-tab="${i}">${t}</div>`
  ).join("");

  dBody.innerHTML = allTabs.map((tabName, i) => {
    let html = `<div class="tab-panel${i===0?" active":""}" data-panel="${i}">`;

    // ── ATORES: chips especiais
    if (tabName === "Atores") {
      if (ev.actors && ev.actors.length) {
        html += `<div class="tp-section"><div class="tp-label">Atores principais</div>
          <div class="tp-actors">${ev.actors.map(a =>
            `<div class="actor-chip"><div class="actor-name">${a.name}</div><div class="actor-role">${a.role}</div></div>`
          ).join("")}</div></div>`;
      } else {
        html += `<div class="tp-section"><div class="tp-text" style="color:var(--muted)">Não especificado para este evento.</div></div>`;
      }

    // ── VOTAÇÕES EM OIs: com ícone e estilo diferenciado
    } else if (tabName === "Votações em OIs") {
      html += `<div class="tp-section" style="margin-bottom:6px">
        <div class="tp-label" style="color:var(--blue)">Posições e votações em organismos internacionais</div>
      </div>`;
      const sections = ev.tabs[tabName] || [];
      sections.forEach(s => {
        html += `<div class="tp-section" style="border-left:2px solid rgba(74,124,181,0.4);padding-left:12px;margin-bottom:14px">
          <div class="tp-label" style="color:var(--blue);font-size:.44rem">${s.lbl}</div>
          <div class="tp-text">${s.txt}</div>
        </div>`;
      });

    // ── TRATADOS: com estilo de documento
    } else if (tabName === "Tratados e Documentos") {
      html += `<div class="tp-section" style="margin-bottom:6px">
        <div class="tp-label" style="color:var(--green)">Instrumentos jurídicos e documentos diplomáticos</div>
      </div>`;
      const sections = ev.tabs[tabName] || [];
      sections.forEach(s => {
        html += `<div class="tp-section" style="border-left:2px solid rgba(95,154,106,0.4);padding-left:12px;margin-bottom:14px">
          <div class="tp-label" style="color:var(--green);font-size:.44rem">${s.lbl}</div>
          <div class="tp-text">${s.txt}</div>
        </div>`;
      });

    // ── GOVERNOS: grid de governantes
    } else if (tabName === "Governos") {
      html += `<div class="tp-section" style="margin-bottom:6px">
        <div class="tp-label" style="color:var(--purple)">Governos e lideranças do período</div>
      </div>`;
      const sections = ev.tabs[tabName] || [];
      sections.forEach(s => {
        html += `<div class="tp-section" style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:12px 14px;margin-bottom:10px">
          <div class="tp-label" style="color:var(--purple);font-size:.46rem;margin-bottom:6px">${s.lbl}</div>
          <div class="tp-text">${s.txt}</div>
        </div>`;
      });

    // ── LEGADO: com destaque âmbar
    } else if (tabName === "Legado") {
      const sections = ev.tabs[tabName] || [];
      sections.forEach(s => {
        const isCACD = s.lbl && s.lbl.includes("CACD");
        html += `<div class="tp-section" style="border-left:2px solid ${isCACD?'var(--gold)':'rgba(201,168,76,0.3)'};padding-left:12px;margin-bottom:14px;${isCACD?'background:var(--gold-dim);padding:10px 12px;border-radius:0 3px 3px 0':''}">
          ${s.lbl ? `<div class="tp-label" style="color:var(--gold);font-size:.44rem">${s.lbl}</div>` : ''}
          <div class="tp-text">${s.txt}</div>
        </div>`;
      });

    // ── DEMAIS TABS: layout padrão com stats no Contexto RI
    } else {
      if (ev.stats && tabName === "Contexto RI") {
        html += `<div class="tp-grid">${ev.stats.map(s =>
          `<div class="tp-stat"><div class="tp-stat-val">${s.val}</div><div class="tp-stat-lbl">${s.lbl}</div></div>`
        ).join("")}</div>`;
      }
      const sections = ev.tabs[tabName] || [];
      sections.forEach(s => {
        if (s.lbl) html += `<div class="tp-section"><div class="tp-label">${s.lbl}</div><div class="tp-text">${s.txt}</div></div>`;
        else if (s.txt) html += `<div class="tp-section"><div class="tp-text">${s.txt}</div></div>`;
      });
      if (ev.quote && tabName === "Impacto") {
        html += `<div class="quote-block"><div class="quote-text">"${ev.quote.txt}"</div><div class="quote-author">— ${ev.quote.author}</div></div>`;
      }
    }

    html += `</div>`;
    return html;
  }).join("");

  dTabs.querySelectorAll(".dtab").forEach(tab => {
    tab.onclick = () => {
      const idx = tab.dataset.tab;
      dTabs.querySelectorAll(".dtab").forEach(t => t.classList.remove("active"));
      dBody.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      dBody.querySelector(`[data-panel="${idx}"]`)?.classList.add("active");
    };
  });

  overlay.classList.add("open");
}

function closeDetail() {
  overlay.classList.remove("open");
  activeEv = null;
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
}

document.getElementById("drawerClose").onclick = closeDetail;
overlay.onclick = e => { if (e.target === overlay) closeDetail(); };

/* ── FILTERS ── */
document.querySelectorAll("[data-era]").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("[data-era]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
    activeEra = btn.dataset.era;
    render();
  };
});

document.getElementById("searchInput").oninput = e => {
  activeSearch = e.target.value;
  render();
};

/* ── MOBILE: busca e swipe ── */
const mobileSearchBtn = document.getElementById("mobileSearchBtn");
const searchInput     = document.getElementById("searchInput");

// Mostrar botão de busca no mobile, esconder input
function applyMobileLayout() {
  const isMobile = window.innerWidth <= 768;
  mobileSearchBtn.style.display = isMobile ? "block" : "none";
  searchInput.style.display     = isMobile ? "none"  : "block";
}
applyMobileLayout();
window.addEventListener("resize", applyMobileLayout);

// Tap no ⌕ abre um prompt simples no mobile
mobileSearchBtn.onclick = () => {
  const q = prompt("Buscar evento:", activeSearch);
  if (q !== null) {
    activeSearch = q;
    render();
  }
};

// Swipe para baixo fecha o drawer
(function swipeToClose() {
  const drawer = document.getElementById("detailDrawer");
  let startY = 0, isDragging = false;
  drawer.addEventListener("touchstart", e => {
    // Só ativa se o scroll do body estiver no topo
    if (drawer.querySelector(".drawer-body").scrollTop === 0) {
      startY = e.touches[0].clientY;
      isDragging = true;
    }
  }, { passive: true });
  drawer.addEventListener("touchmove", e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      drawer.style.transform = `translateY(${Math.min(dy, 200)}px)`;
      drawer.style.transition = "none";
    }
  }, { passive: true });
  drawer.addEventListener("touchend", e => {
    if (!isDragging) return;
    isDragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    drawer.style.transition = "";
    if (dy > 90) {
      closeDetail();
      drawer.style.transform = "";
    } else {
      drawer.style.transform = "";
    }
  });
})();

/* ── INIT ── */
render();
</script>
</body>
</html>
