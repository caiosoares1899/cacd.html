    geo.features.forEach(f => {

      if (iso && iso !== '-99' && iso.length === 3) return;
      const n = p.ADMIN || p.admin || p.NAME || p.name || p.SOVEREIGNT || p.GEOUNIT || '';

      if (mapped) { p.ISO_A3 = mapped; p.id = mapped; }
      else {
        // Busca parcial em todos os campos de texto disponíveis
        const allNames = Object.values(p).filter(v => typeof v === 'string' && v.length > 2);
        for (const an of allNames) {
          if (_NAME_MAP[an]) { p.ISO_A3 = _NAME_MAP[an]; p.id = _NAME_MAP[an]; break; }
        }
      }
    });
    document.getElementById('loading').style.display = 'none';

function getPaisData(feature) {
  const p = feature.properties || {};
  // 1) ISO direto — vários campos possíveis
  const isoFields = [p.id, p.ISO_A3, p.iso_a3, p.ADM0_A3, p.SOV_A3, p.BRK_A3, p.ISO_A3_EH, p.ADM0_ISO];
  for (const c of isoFields) {
    if (!c || c === '-99' || c === 'N/A' || c.length < 2) continue;
    const up = c.toUpperCase();
    if (_ISO_IDX[up]) return _ISO_IDX[up];
  }
  // 2) Nome exato ou abreviado
  const nameFields = [p.ADMIN, p.admin, p.NAME, p.name, p.NAME_EN, p.GEOUNIT, p.SOVEREIGNT, p.NAME_LONG, p.FORMAL_EN];
  for (const n of nameFields) {
    if (!n) continue;
    if (_NAME_MAP[n] && _ISO_IDX[_NAME_MAP[n]]) return _ISO_IDX[_NAME_MAP[n]];
  }
  // 3) Busca parcial nos nomes
  for (const n of nameFields) {
    if (!n || n.length < 3) continue;
    for (const [mapName, iso] of Object.entries(_NAME_MAP)) {
      if (n === mapName || n.startsWith(mapName) || mapName.startsWith(n)) {
        if (_ISO_IDX[iso]) return _ISO_IDX[iso];
      }
    }
  }
  return null;
}


// Cores por continente (fill escuro + border = cor do filtro)
const CONT_COLOR = {
  americas: '#4ade80',
  europa:   '#60a5fa',
  africa:   '#f59e0b',
  asia:     '#f87171',
  oceania:  '#a78bfa',
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function getStyle(feature) {
  const p = feature.properties || {};
  const isoFields = [p.ISO_A3, p.iso_a3, p.ADM0_A3, p.SOV_A3, p.id].filter(Boolean);
  for (const c of isoFields) {
    if (c && c.toUpperCase() === 'BRA') {
      return { fillColor: '#1a4a22', fillOpacity: 0.9, color: '#FFDF00', weight: 2, opacity: 1 };
    }
  }
  const pais = getPaisData(feature);
  if (!pais) {
    // Inferir continente pelo centroid geográfico do polígono
    let contColor = null;
    try {
      const coords = feature.geometry && feature.geometry.coordinates;
      if (coords && coords.length) {
        // Pegar um ponto representativo
        let pt = coords[0];
        while (Array.isArray(pt[0])) pt = pt[0];
        const lng = pt[0], lat = pt[1];
        // Classificação grosseira por longitude/latitude
        if (lat > 34 && lng > -30 && lng < 70) contColor = '#60a5fa';       // Europa
        else if (lat > -40 && lat < 40 && lng > -20 && lng < 55) contColor = '#f59e0b'; // África
        else if (lat > -15 && lng > 25 && lng < 180) contColor = '#f87171'; // Ásia
        else if (lat < -10 && lng > 100) contColor = '#a78bfa';             // Oceania
        else if (lng < -30) contColor = '#4ade80';                          // Américas
        else contColor = '#f59e0b';                                          // África por padrão
      }
    } catch(e) {}
    if (contColor) {
      const r = parseInt(contColor.slice(1,3),16);
      const g = parseInt(contColor.slice(3,5),16);
      const b = parseInt(contColor.slice(5,7),16);
      return { fillColor: `rgba(${r},${g},${b},0.06)`, fillOpacity: 1, color: contColor, opacity: 0.3, weight: 0.5 };
    }
    return { fillColor: '#1c1c1c', fillOpacity: 1, color: '#2e2e2e', weight: 0.5, opacity: 0.8 };
  }

  // Cor base = cor do continente
  const contBorder = CONT_COLOR[pais.continente] || '#6b7280';
  const rgb = hexToRgb(contBorder);

  // Intensidade varia por tipo de presença
  const alpha = { embaixada: 0.22, consulado: 0.16, escritorio: 0.14, honorario: 0.12, acreditacao: 0.07 };
  const fillAlpha = alpha[pais.presenca] || 0.07;
  const borderAlpha = { embaixada: 1, consulado: 0.85, escritorio: 0.75, honorario: 0.65, acreditacao: 0.45 };
  const bAlpha = borderAlpha[pais.presenca] || 0.45;
  const weight = { embaixada: 1.0, consulado: 0.9, escritorio: 0.8, honorario: 0.7, acreditacao: 0.5 };
  const w = weight[pais.presenca] || 0.5;

  return {
    fillColor: `rgba(${rgb},${fillAlpha})`,
    fillOpacity: 1,
    color: contBorder,
    opacity: bAlpha,
    weight: w
  };
}

function buildMap(geo) {
  geoLayer = L.geoJSON(geo, {
    style: getStyle,
    onEachFeature: (feature, layer) => {
      const fp = feature.properties || {};
      const isoVals = [fp.ISO_A3, fp.iso_a3, fp.ADM0_A3, fp.SOV_A3, fp.id].filter(Boolean);
      if (isoVals.some(c => c.toUpperCase() === 'BRA')) {
        layer.bindTooltip('<b>🇧🇷 Brasil</b>', { direction: 'top', className: 'cacd-tooltip' });
        return;
      }
      const pais = getPaisData(feature);
      if (!pais) return;
      const cor = CORES[pais.presenca] || CORES.acreditacao;
  // Cor de destaque = cor do continente
  const contBorder = CONT_COLOR[pais.continente] || cor.border;
      const tipLabel = pais.presencaLabel || cor.label;
      layer.bindTooltip(
        `<b>${pais.flag} ${pais.nome}</b><br><span style="opacity:.7">${tipLabel}</span>`,
        { direction: 'top', className: 'cacd-tooltip' }
      );
      layer.on('click', () => openPopup(pais));
      layer.on('mouseover', function() { this.setStyle({ fillOpacity: 0.97, weight: 1.5, color: '#fff' }); });
      layer.on('mouseout', function() { geoLayer.resetStyle(this); });
    }
  }).addTo(map);
}

function buildSidebar() {
  const sl = document.getElementById('slist');
  sl.innerHTML = '';
  const continentes = {
    americas: '● Américas',
    europa: '● Europa',
    africa: '● África',
    asia: '● Ásia',
    oceania: '● Oceania'
  };
  
  // Agrupar por continente
  const grupos = {};
  Object.values(PAISES).forEach(p => {
    if (!grupos[p.continente]) grupos[p.continente] = [];
    grupos[p.continente].push(p);
  });

  Object.entries(continentes).forEach(([cont, label]) => {
    const grupo = grupos[cont] || [];
    if (!grupo.length) return;
    
    const header = document.createElement('div');
    header.style.cssText = 'padding:5px 12px;font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(201,168,76,.04)';
    header.dataset.cont = cont;
    header.textContent = label;
    sl.appendChild(header);
    
    grupo.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(pais => {
      const d = document.createElement('div');
      d.className = 'si';
      d.dataset.cont = pais.continente;
      d.dataset.nome = pais.nome.toLowerCase();
      d.onclick = () => openPopup(pais);
      const cor = CORES[pais.presenca] || CORES.acreditacao;
      const capital = pais.capital || '';
      const contC = CONT_COLOR[pais.continente] || cor.border;
      d.innerHTML = `
        <div class="si-flag">${pais.flag}</div>
        <div>
          <div class="si-name">${pais.nome}</div>
          <div class="si-sub" style="color:${contC}">${capital}</div>
          <span class="si-pres" style="background:rgba(0,0,0,0.3);color:${contC};border:1px solid ${contC}44">${cor.label}</span>
        </div>`;
      sl.appendChild(d);
    });
  });
  
  updateCount();
}

function updateCount() {
  let vis = 0;
  document.querySelectorAll('.si').forEach(el => {
    if (!el.classList.contains('hidden')) vis++;
  });
  document.getElementById('count').textContent = vis;
}

// ═══════════════════════════════════════════════
function filterCont(cont) {
  currentFilter = cont;
  document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + (cont === 'all' ? 'all' : cont));
  if (btn) btn.classList.add('active');
  applyFilters();
}

function searchCountry(term) {
  currentSearch = term.toLowerCase();
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.si, [data-cont]').forEach(el => {
    if (!el.classList.contains('si')) return;
    const matchCont = currentFilter === 'all' || el.dataset.cont === currentFilter;
    const matchSearch = !currentSearch || el.dataset.nome.includes(currentSearch);
    el.classList.toggle('hidden', !(matchCont && matchSearch));
  });

  // Headers
  document.querySelectorAll('[data-cont]:not(.si)').forEach(header => {
    const cont = header.dataset.cont;
    const hasVisible = Array.from(document.querySelectorAll(`.si[data-cont="${cont}"]`))
      .some(el => !el.classList.contains('hidden'));
    header.style.display = hasVisible ? '' : 'none';
  });
  
  // Filtro especial "sem embaixada"
  if (currentFilter === 'parlamento') {
    document.querySelectorAll('.si').forEach(el => {
      // mostrar só acreditação
    });
  }
  
  updateCount();
}

// ═══════════════════════════════════════════════
// POPUP
// ═══════════════════════════════════════════════
function openPopup(pais) {
  const cor = CORES[pais.presenca] || CORES.acreditacao;
  // Cor do continente para destaque visual
  const contBorder = CONT_COLOR[pais.continente] || cor.border;
  // Normalizar campos — suporta formato antigo e novo
  const presLabel = pais.presencaLabel || pais.presencaDesc || cor.label;
  const desde = pais.inicioRelacoes || pais.desde || null;
  const brs = pais.brasileiros || pais.br || null;
  const ct = pais.comercioTotal || pais.ct || null;
  // Exportações
  const expT = (pais.exportacoes && pais.exportacoes.total) || (pais.exp && pais.exp.t) || null;
  const expI = (pais.exportacoes && pais.exportacoes.principais) || (pais.exp && pais.exp.i) || [];
  // Importações
  const impT = (pais.importacoes && pais.importacoes.total) || (pais.imp && pais.imp.t) || null;
  const impI = (pais.importacoes && pais.importacoes.principais) || (pais.imp && pais.imp.i) || [];
  // Organismos
  const orgs = pais.organismos || pais.org || [];
  // Textos
  const aprox = pais.aproximacoes || pais.apr || null;
  const conf = pais.conflitos || pais.conf || null;
  const continenteMap = {americas:'Américas',europa:'Europa',africa:'África',asia:'Ásia',oceania:'Oceania'};

  document.getElementById('p-flag').textContent = pais.flag;
  const ptag = document.getElementById('p-tag');
  ptag.textContent = presLabel;
  ptag.style.cssText = `background:rgba(0,0,0,0.3);color:${contBorder};border:1px solid ${contBorder}55`;
  document.getElementById('p-title').textContent = pais.nome;
  document.getElementById('popup').style.borderTop = `3px solid ${contBorder}`;

  document.getElementById('p-meta').innerHTML =
    `<div>🌍 <span>${continenteMap[pais.continente] || pais.continente}</span></div>` +
    (desde ? `<div>📅 Relações desde <span>${desde}</span></div>` : '') +
    (brs ? `<div>👥 Brasileiros: <span>${Number(brs).toLocaleString('pt-BR')}</span></div>` : '') +
    (ct ? `<div>💱 Comércio: <span>${ct}</span></div>` : '');

  const grid = document.getElementById('popup-grid');
  grid.innerHTML = '';

  // Presença
  addBox(grid, 'full', '🏛 Presença Diplomática Brasileira',
    `<p style="color:${contBorder};font-size:13px;font-weight:500;margin-bottom:5px">${presLabel}</p>` +
    `<p>${cor.label === 'Embaixada' ? 'Brasil mantém embaixada residente.' :
        cor.label === 'Acreditação/Sem sede' || cor.label === 'Acreditação' ? 'Brasil está acreditado a partir de outro país — sem sede permanente.' :
        cor.label === 'Escritório/Missão' ? 'Brasil mantém escritório ou missão especial.' :
        'Consulado ou representação brasileira presente.'}</p>`);

  // Exportações
  if (expT || expI.length) {
    addBox(grid, '', '📦 Exportações BR →',
      (expT ? `<div class="big-num">${expT}</div><div class="sub-num">Total 2023</div>` : '') +
      `<div style="margin-top:8px">${expI.map(x => `<span style="display:inline-block;margin:2px 3px 2px 0;font-size:10px;padding:2px 7px;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);border-radius:2px;color:#86efac">${x}</span>`).join('')}</div>`);
  }

  // Importações
  if (impT || impI.length) {
    addBox(grid, '', '🚢 Importações BR ←',
      (impT ? `<div class="big-num">${impT}</div><div class="sub-num">Total 2023</div>` : '') +
      `<div style="margin-top:8px">${impI.map(x => `<span style="display:inline-block;margin:2px 3px 2px 0;font-size:10px;padding:2px 7px;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);border-radius:2px;color:#93c5fd">${x}</span>`).join('')}</div>`);
  }

  // Organismos
  if (orgs.length) {
    addBox(grid, 'full', '🌐 Organismos Internacionais em Comum',
      `<div class="tag-list">${orgs.map(o => `<span class="org-tag">${o}</span>`).join('')}</div>`);
  }

  // Aproximações e Conflitos
  if (aprox) addBox(grid, conf ? '' : 'full', '🤝 Aproximações e Parcerias', `<p>${aprox}</p>`);
  if (conf) addBox(grid, aprox ? '' : 'full', '⚡ Tensões e Conflitos', `<p>${conf}</p>`);

  document.getElementById('overlay').classList.add('open');
}

function addBox(parent, cls, title, content) {
  const div = document.createElement('div');
  div.className = 'pbox' + (cls ? ' ' + cls : '');
  div.innerHTML = `<h3>${title}</h3>${content}`;
  parent.appendChild(div);
}

function closePopup() {
  document.getElementById('overlay').classList.remove('open');
}

function closeIfBg(e) {
  if (e.target === document.getElementById('overlay')) closePopup();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePopup();
});
</script>
</body>
