{date:"1999–2004",type:"ri",side:"right",title:"Ministério da Defesa e MINUSTAH — novo papel internacional",summary:"Brasil cria o MD (1999); assume comando da missão da ONU no Haiti (2004).",governo:"FHC (1995–2002) cria o MD; Lula I (2003–06) decide a MINUSTAH",modal:{contexto:"Em 1999, o governo FHC cria o Ministério da Defesa — unificando as três FA sob um ministro civil pela primeira vez na história. Em 2004, o Brasil assume o comando da MINUSTAH no Haiti — liderança inédita em operação de paz da ONU.",fatos:["1999: Criação do Ministério da Defesa — Élcio Álvares, primeiro ministro civil; FA antes respondiam diretamente ao presidente","2004: Brasil assume comando da MINUSTAH (Haiti) — General Augusto Heleno","Mais de 37.000 militares brasileiros servem no Haiti entre 2004 e 2017","IBAS (2003): articulação Brasil-Índia-África do Sul; FA participam da cooperação sul-sul","Programa Nuclear da Marinha: submarino de propulsão nuclear em desenvolvimento desde os anos 1980","2010: Terremoto no Haiti — FA brasileiras coordenam operações humanitárias"],ri:"A MINUSTAH é instrumento da política externa do governo Lula de projeção de poder e liderança regional. Reforça a candidatura ao assento permanente no CSNU. O engajamento haitiano revela também tensões: denúncias de abuso sexual por tropas da ONU incluem contingentes brasileiros — investigadas pela ONU.",legado:"O Ministério da Defesa é o avanço mais concreto no controle civil das FA desde a redemocratização. A MINUSTAH projeta o Brasil como potência regional responsável. A retirada em 2017 e o terremoto de 2010 testam os limites da capacidade humanitária e militar brasileira.",tags:["Ministério da Defesa","MINUSTAH","Haiti","ONU","FHC","Lula","CSNU"]}},
{date:"2016",type:"golpe",side:"left",title:"Impeachment de Dilma — militares no pano de fundo",summary:"Processo controverso; tweet de Villas Bôas é a mais clara pressão militar ao Judiciário desde 1964.",governo:"Dilma Rousseff afastada (ago. 2016); Michel Temer (2016–2018)",modal:{contexto:"Dilma Rousseff é afastada em 2016 acusada de 'pedaladas fiscais'. O processo é amplamente contestado como 'golpe parlamentar'. Michel Temer assume. Os militares permanecem formalmente à margem — mas figuras como o General Eduardo Villas Bôas e o Ministério da Defesa estão atentos.",fatos:["Agosto 2016: Dilma afastada pelo Senado — 61 votos a favor, 20 contra","Temer governa com ministros civis mas busca apoio militar para 'garantia da ordem'","2018: Intervenção Federal no Rio de Janeiro — General Walter Braga Netto comanda toda a segurança pública","Abril 2018: General Villas Bôas twitta mensagem direta sobre o STF na noite antes da decisão do HC de Lula — pressão militar explícita sobre o Judiciário","2018: Eleições — Bolsonaro eleito com forte apoio do Exército e de 6 generais na chapa ou ministérios"],ri:"O Brasil de 2016 está em crise econômica profunda e isolamento relativo na política externa (fim do ciclo do soft power da era Lula). O tweet de Villas Bôas é considerado a mais clara pressão militar sobre o Judiciário desde 1964 — comparado ao AI-5 por alguns analistas.",legado:"O tweet de Villas Bôas é marco do retorno da ameaça militar implícita à política brasileira. Rompe com o padrão de discrição das FA desde 1985. Abre caminho para a candidatura e eleição de Bolsonaro — capitão reformado que coloca militares no centro do governo.",tags:["Dilma","Impeachment","Temer","Villas Bôas","2016","Braga Netto"]}},
{date:"2019–2022",type:"ditadura",side:"right",title:"Governo Bolsonaro — militares no poder sem golpe formal",summary:"6.157 cargos civis ocupados por fardados; erosão democrática sistemática.",governo:"Jair Bolsonaro, Capitão Reformado do Exército (2019–2022); Vice: General Hamilton Mourão",modal:{contexto:"Jair Bolsonaro (2019–22), capitão reformado, nomeia militares para 6.157 cargos civis — recorde histórico desde a ditadura. Os generais Hamilton Mourão (VP), Braga Netto (ministros), Paulo Sérgio Nogueira e outros dominam o primeiro escalão.",presGov:[{nome:"Jair Bolsonaro (Capitão Reformado) e os militares no governo",period:"2019–2022",desc:"Maior presença de militares no poder civil desde a ditadura: 6.157 cargos ocupados por militares. Vice-presidente General Hamilton Mourão. Generais Braga Netto (Casa Civil e Defesa), Augusto Heleno (GSI), Paulo Sérgio Nogueira (Defesa) e Almir Garnier (Marinha) compunham o núcleo duro. General Eduardo Pazuello assumiu o Ministério da Saúde durante a pandemia de Covid."}],fatos:["2019: 6.157 cargos civis ocupados por militares — recorde histórico","General Braga Netto: Ministério da Casa Civil (2020–21) e Ministério da Defesa (2021–22)","General Eduardo Pazuello assume o Ministério da Saúde durante a pandemia — sem formação na área","Militares resistem à transparência sobre mortes por Covid; negacionismo científico","Outubro 2022: Reunião de Bolsonaro com embaixadores para atacar o TSE — militares presentes","60+ dias pós-derrota: acampamentos em frente a quartéis; Exército omisso ou conivente","Dezembro 2022: PF e GSI investigam plano de golpe — 'kids pretos' planejam assassinato de Lula, Alckmin e Moraes"],ri:"Bolsonaro realinhou o Brasil aos EUA de Trump, rompeu com o multilateralismo, atacou o Acordo de Paris e enfraqueceu o Mercosul. Isolamento internacional severo: Macron ameaçou bloquear o acordo UE-Mercosul; Biden descreveu Bolsonaro como ameaça à democracia. O isolamento prejudicou negociações comerciais e acordos multilaterais.",legado:"O governo Bolsonaro representa o retorno mais explícito da tutela militar desde 1985 — sem golpe formal, mas com erosão sistemática das normas democráticas. O 8 de janeiro é o maior ataque às instituições democráticas desde o AI-5. O indiciamento de militares pelo STF cria precedente jurídico inédito.",tags:["Bolsonaro","Militares","2022","Democracia","Mourão","Braga Netto","Covid","Pazuello"]}},
{date:"8 Jan 2023",type:"golpe",side:"left",title:"8 de Janeiro — a Intentona Bolsonarista",summary:"Golpistas invadem e depredam Congresso, STF e Palácio do Planalto; militares omissos.",governo:"Lula III (posse em 1/1/2023); Governador do DF afastado; investigação sobre omissão do GSI e do Comando do Exército",modal:{contexto:"Em 8 de janeiro de 2023 — uma semana após a posse de Lula — cerca de 4.000 bolsonaristas radicais saíram do Quartel-General do Exército em Brasília e marcharam para a Praça dos Três Poderes. Invadiram, vandalizaram e depredaram o Congresso Nacional, o STF e o Palácio do Planalto.",fatos:["8/1/2023: ~4.000 manifestantes saem do QG do Exército em Brasília rumo aos Três Poderes","Invasão simultânea do Congresso, STF e Palácio do Planalto — imagens televisionadas para o mundo","PMDF: vídeos mostram policiais fazendo sinal de positivo para invasores — conivência ou omissão deliberada","Anderson Torres (ex-Min. da Justiça, secretário de Segurança do DF): estava nos EUA — 'minuta do golpe' achada em sua casa","1.418 pessoas presas e encaminhadas ao Complexo da Papuda e à penitenciária feminina","86 condenações pelo STF em 2024 — penas de 3 a 17 anos por abolição do Estado Democrático e golpe de Estado","'Operação Tempus Veritatis' (PF): descobre plano de golpe e assassinato de Lula, Alckmin e Moraes — 'kids pretos' (tropas especiais)","Novembro 2024: PF indincia 37 pessoas, incluindo Bolsonaro, Braga Netto, Heleno, Garnier, Mário Fernandes e outros militares","Fevereiro 2025: PGR Paulo Gonet denuncia 34 pessoas ao STF","2025: STF condena Bolsonaro a 27 anos e 3 meses de prisão em regime fechado"],ri:"O 8 de janeiro foi comparado mundialmente ao 6 de janeiro americano (invasão do Capitólio, 2021). A crise exposta internacionalmente comprometeu brevemente a imagem do Brasil na retomada multilateralista de Lula. Os EUA, UE e países da América Latina condenaram rapidamente os ataques e reafirmaram apoio à democracia brasileira.",presGov:[{nome:"Militares indiciados pela PF (nov. 2024)",period:"37 indiciados — militares de alta patente incluem:",desc:"General Walter Braga Netto (ex-ministro da Defesa e candidato a VP de Bolsonaro); General Augusto Heleno (ex-chefe do GSI); Almirante Almir Garnier Santos (ex-comandante da Marinha); General Mário Fernandes ('kids pretos' — planejou assassinatos); Tenente-coronel Mauro Cid (ex-ajudante de ordens; fez delação premiada). Todos indiciados por: abolição violenta do Estado Democrático de Direito, golpe de Estado e organização criminosa armada."}],legado:"O 8 de janeiro é o maior ataque às instituições democráticas brasileiras desde o AI-5. O indiciamento de Bolsonaro e de generais — confirmado pela PGR em fevereiro de 2025 e julgado pelo STF — cria o precedente histórico inédito de responsabilização penal de militares por tentativa de golpe no Brasil. Bolsonaro condenado a 27 anos e 3 meses (STF, 2025).",tags:["8 de janeiro","Golpe","Bolsonaro","STF","Indiciamento","2023","Kids pretos","Tempus Veritatis","Braga Netto"]}},

const ERAS=[
{before:"1500",label:"BRASIL COLONIAL",sub:"1500 – 1807"},
{before:"1808",label:"PERÍODO JOANINO & INDEPENDÊNCIA",sub:"1808 – 1889"},
{before:"1889",label:"REPÚBLICA VELHA",sub:"1889 – 1930"},
{before:"1930",label:"ERA VARGAS & DEMOCRACIA POPULISTA",sub:"1930 – 1964"},
{before:"1964",label:"DITADURA MILITAR",sub:"1964 – 1985"},
{before:"1985",label:"NOVA REPÚBLICA",sub:"1985 – Presente"}
];

function getEraIdx(d){
  // Extrai o primeiro número de 4 dígitos encontrado na string de data
  const m=d.match(/\b(1[0-9]{3}|20[0-9]{2})\b/);
  const y=m?parseInt(m[1]):NaN;
  if(isNaN(y))return ERAS.length-1;
  for(let i=ERAS.length-1;i>=0;i--){if(y>=parseInt(ERAS[i].before))return i;}
  return 0;
}

const tl=document.getElementById('timeline');
let lastEra=-1;
const typeLabel={colonial:'Colonial',imperio:'Império',republica:'República',golpe:'Golpe',ditadura:'Ditadura',ri:'Rel. Internacionais',resistencia:'Resistência'};

EVENTS.forEach((ev,i)=>{
  const eIdx=getEraIdx(ev.date);
  if(eIdx>lastEra){
    for(let j=lastEra+1;j<=eIdx;j++){
      const d=document.createElement('div');
      d.className='era-divider';
      d.innerHTML=`<div class="era-divider-inner"><h2>${ERAS[j].label}</h2><p>${ERAS[j].sub}</p></div>`;
      tl.appendChild(d);
    }
    lastEra=eIdx;
  }
  const div=document.createElement('div');
  div.className=`event ${ev.side}`;
  div.dataset.type=ev.type;
  div.dataset.idx=i;
  const card=`<div class="card" onclick="openModal(${i})"><div class="card-inner"><div class="card-type-badge badge-${ev.type}">${typeLabel[ev.type]||ev.type}</div><div class="date">${ev.date}</div><h3>${ev.title}</h3><p>${ev.summary}</p><div class="click-hint">[ clique para expandir ]</div></div></div>`;
  if(ev.side==='left'){div.innerHTML=`${card}<div class="dot-col"><div class="dot type-${ev.type}" onclick="openModal(${i})"></div></div><div class="spacer"></div>`;}
  else{div.innerHTML=`<div class="spacer"></div><div class="dot-col"><div class="dot type-${ev.type}" onclick="openModal(${i})"></div></div>${card}`;}
  tl.appendChild(div);
});

const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('visible'),80);});},{threshold:0.1});
document.querySelectorAll('.event').forEach(el=>io.observe(el));

function openModal(idx){
  const ev=EVENTS[idx];
  const m=ev.modal;
  document.getElementById('modal-date').textContent=ev.date;
  document.getElementById('modal-title').textContent=ev.title;
  const gEl=document.getElementById('modal-governo');
  gEl.innerHTML=ev.governo?`<div class="modal-governo">⚑ ${ev.governo}</div>`:'';
  let body='';
  if(m.contexto)body+=`<div class="modal-section"><div class="modal-section-title">Contexto Histórico</div><p>${m.contexto}</p></div>`;
  if(m.presGov&&m.presGov.length){
    body+=`<div class="modal-section"><div class="modal-section-title">Governantes do Período</div>`;
    m.presGov.forEach(p=>{body+=`<div class="pres-box"><div class="pres-period">${p.period}</div><div class="pres-name">${p.nome}</div><div class="pres-desc">${p.desc}</div></div>`;});
    body+=`</div>`;
  }
  if(m.fatos&&m.fatos.length)body+=`<div class="modal-section"><div class="modal-section-title">Fatos & Cronologia</div><ul>${m.fatos.map(f=>`<li>${f}</li>`).join('')}</ul></div>`;
  if(m.ri)body+=`<div class="modal-section"><div class="modal-section-title">Relações Internacionais & Repercussão</div><p>${m.ri}</p></div>`;
  if(m.legado)body+=`<div class="modal-section"><div class="modal-section-title">Legado & Impacto</div><p>${m.legado}</p></div>`;
  if(m.tags&&m.tags.length)body+=`<div class="modal-tags">${m.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('')}</div>`;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

document.getElementById('modal-close').onclick=closeModal;
document.getElementById('modal-overlay').onclick=function(e){if(e.target===this)closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    const f=this.dataset.filter;
    document.querySelectorAll('.event').forEach(ev=>{
      if(f==='all'||ev.dataset.type===f)ev.classList.remove('hidden');
      else ev.classList.add('hidden');
    });
  });
});
</script>
</body>
</html>
