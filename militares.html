<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Militares na Política Brasileira | 1500–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --olive: #3D4A2E;
    --olive-mid: #5A6B42;
    --cream: #F5F0E8;
    --cream-dark: #E8E0CC;
    --ink: #1A1A14;
    --ink-mid: #2D2D22;
    --ink-soft: #4A4A38;
    --red: #8B2222;
    --red-light: #C0392B;
    --blue-dim: #2C3E5A;
    --line: rgba(201,168,76,0.35);
    --modal-bg: rgba(10,10,8,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0D0D0A 0%, #1A1A14 60%, transparent 100%);
    padding: 4rem 2rem 3rem;
    text-align: center;
    position: relative;
    border-bottom: 1px solid var(--line);
  }

  header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 1px;
    background: var(--gold);
  }

  .header-label {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  h1 span {
    color: var(--gold);
    font-style: italic;
  }

  .header-sub {
    font-size: 0.9rem;
    color: rgba(245,240,232,0.5);
    margin-top: 1rem;
    font-style: italic;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 1.5rem 2rem;
    background: rgba(26,26,20,0.9);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .filter-btn {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--line);
    background: transparent;
    color: rgba(245,240,232,0.6);
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 2px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }

  /* ── TIMELINE LAYOUT ── */
  .timeline-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
    position: relative;
  }

  /* Central spine */
  .timeline-wrapper::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--gold) 5%, var(--gold) 95%, transparent);
    transform: translateX(-50%);
    opacity: 0.4;
  }

  /* ── ERA DIVIDER ── */
  .era-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 3rem 0 2rem;
    position: relative;
    z-index: 5;
  }

  .era-divider-inner {
    background: var(--ink);
    padding: 0.6rem 2rem;
    border: 1px solid var(--gold-dark);
    text-align: center;
  }

  .era-divider h2 {
    font-family: 'Courier Prime', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .era-divider p {
    font-size: 0.75rem;
    color: rgba(245,240,232,0.4);
    font-style: italic;
    margin-top: 0.2rem;
  }

  /* ── EVENT CARD ── */
  .event {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 0;
    margin-bottom: 1.5rem;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s;
  }

  .event.visible { opacity: 1; transform: translateY(0); }
  .event.hidden { display: none; }

  /* Left events: card on left, dot center */
  .event.left .card { grid-column: 1; text-align: right; padding-right: 2rem; }
  .event.left .dot-col { grid-column: 2; }
  .event.left .spacer { grid-column: 3; }

  /* Right events: spacer left, dot center, card right */
  .event.right .spacer { grid-column: 1; }
  .event.right .dot-col { grid-column: 2; }
  .event.right .card { grid-column: 3; text-align: left; padding-left: 2rem; }

  .dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 5;
  }

  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: var(--ink);
    margin-top: 0.9rem;
    flex-shrink: 0;
    transition: transform 0.2s;
    cursor: pointer;
    position: relative;
  }

  .dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .dot:hover::after { border-color: var(--gold); }
  .dot:hover { transform: scale(1.3); }

  .dot.type-colonial { background: var(--olive); border-color: var(--olive-mid); }
  .dot.type-imperio { background: #3A2E5A; border-color: #6B5A9E; }
  .dot.type-republica { background: var(--blue-dim); border-color: #4A6FA5; }
  .dot.type-golpe { background: var(--red); border-color: var(--red-light); }
  .dot.type-ditadura { background: #5A1A1A; border-color: #922B2B; }
  .dot.type-ri { background: #1A4A3A; border-color: #2D8A6A; }
  .dot.type-resistencia { background: #4A3A00; border-color: #C9A84C; }

  .card {
    cursor: pointer;
    transition: transform 0.2s;
  }

  .card:hover { transform: translateX(4px); }
  .event.right .card:hover { transform: translateX(-4px); }

  .card-inner {
    display: inline-block;
    background: rgba(30,30,22,0.8);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 0.9rem 1.1rem;
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .card:hover .card-inner {
    border-color: rgba(201,168,76,0.5);
    background: rgba(40,38,28,0.9);
  }

  .card-inner .date {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .card-inner h3 {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.3;
    margin-bottom: 0.3rem;
  }

  .card-inner p {
    font-size: 0.78rem;
    color: rgba(245,240,232,0.55);
    line-height: 1.5;
    font-style: italic;
  }

  .card-type-badge {
    display: inline-block;
    font-family: 'Courier Prime', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    margin-bottom: 0.4rem;
    border-radius: 2px;
  }

  .badge-colonial { background: rgba(61,74,46,0.6); color: #A8C080; }
  .badge-imperio { background: rgba(58,46,90,0.6); color: #B09ADE; }
  .badge-republica { background: rgba(44,62,90,0.6); color: #7AAFDE; }
  .badge-golpe { background: rgba(139,34,34,0.6); color: #F08080; }
  .badge-ditadura { background: rgba(90,26,26,0.6); color: #E09090; }
  .badge-ri { background: rgba(26,74,58,0.6); color: #70D4A8; }
  .badge-resistencia { background: rgba(74,58,0,0.6); color: var(--gold-light); }

  .click-hint {
    font-family: 'Courier Prime', monospace;
    font-size: 0.55rem;
    color: rgba(201,168,76,0.4);
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--modal-bg);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #1C1C14;
    border: 1px solid var(--gold-dark);
    max-width: 720px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 1.8rem 2rem 1.2rem;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 1.2rem; right: 1.5rem;
    background: none;
    border: 1px solid var(--line);
    color: var(--cream);
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

  .modal-date {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--cream);
    line-height: 1.25;
  }

  .modal-body {
    padding: 1.5rem 2rem 2rem;
  }

  .modal-section {
    margin-bottom: 1.5rem;
  }

  .modal-section-title {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--line);
  }

  .modal-section p {
    font-size: 0.88rem;
    color: rgba(245,240,232,0.8);
    line-height: 1.75;
  }

  .modal-section ul {
    list-style: none;
    padding: 0;
  }

  .modal-section ul li {
    font-size: 0.85rem;
    color: rgba(245,240,232,0.75);
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    line-height: 1.6;
  }

  .modal-section ul li::before {
    content: '▸ ';
    color: var(--gold);
    font-size: 0.7rem;
  }

  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 1.2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--line);
  }

  .modal-tag {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: rgba(201,168,76,0.7);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    justify-content: center;
    padding: 1rem 2rem;
    background: rgba(26,26,20,0.6);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: rgba(245,240,232,0.6);
    text-transform: uppercase;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--ink); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

  /* Mobile */
  @media (max-width: 640px) {
    .timeline-wrapper::before { left: 20px; }
    .event { grid-template-columns: 40px 1fr; }
    .event.left .card, .event.right .card { grid-column: 2; text-align: left; padding-left: 1.2rem; padding-right: 0; }
    .event.left .dot-col, .event.right .dot-col { grid-column: 1; }
    .event.left .spacer, .event.right .spacer { display: none; }
    .modal h2 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Linha do Tempo · CACD 2026</div>
  <h1>Militares na<br><span>Política Nacional</span></h1>
  <p class="header-sub">1500 – 2026 · Do descobrimento ao debate democrático contemporâneo</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--olive-mid)"></div>Colonial</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6B5A9E"></div>Império</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4A6FA5"></div>República</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red-light)"></div>Golpe/Intervenção</div>
  <div class="legend-item"><div class="legend-dot" style="background:#922B2B"></div>Ditadura</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2D8A6A"></div>Rel. Internacionais</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Resistência</div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="colonial">Colonial</button>
  <button class="filter-btn" data-filter="imperio">Império</button>
  <button class="filter-btn" data-filter="republica">República Velha</button>
  <button class="filter-btn" data-filter="golpe">Golpes</button>
  <button class="filter-btn" data-filter="ditadura">Ditadura 64–85</button>
  <button class="filter-btn" data-filter="ri">Rel. Internacionais</button>
  <button class="filter-btn" data-filter="resistencia">Resistência</button>
</div>

<div class="timeline-wrapper" id="timeline">
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-date" id="modal-date"></div>
      <h2 id="modal-title"></h2>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const EVENTS = [
  {
    date: "1500–1549",
    type: "colonial",
    side: "right",
    title: "Capitanias e estrutura militar colonial",
    summary: "Administração portuguesa funde poder civil e militar desde o início.",
    modal: {
      contexto: "Portugal organiza o território colonial sob uma lógica militar-administrativa. Os capitães-donatários exercem poderes de governador, juiz e comandante militar simultaneamente. A figura do militar é inseparável do administrador colonial.",
      fatos: [
        "Capitanias hereditárias (1534): donatários com poderes civis e militares plenos",
        "Criação de fortes e feitorias ao longo do litoral como postos militares",
        "Primeira expedição colonizadora (Tomé de Sousa, 1549): acompanhada de 1.000 soldados",
        "Organização das Ordenanças: milícias locais subordinadas ao governador-geral"
      ],
      ri: "A estrutura militar colonial responde à competição europeia pelo Atlântico Sul. França e Espanha pressionam o domínio português; os fortes militares demarcam soberania antes que tratados o façam. O Tratado de Tordesilhas (1494) já era um instrumento geopolítico que antecede e fundamenta a militarização do território.",
      legado: "O modelo de poder misto civil-militar no Brasil nasce na colônia. A confusão entre as esferas permanecerá como traço estrutural até o século XX.",
      tags: ["Colônia", "Capitanias", "Portugal", "Tordesilhas"]
    }
  },
  {
    date: "1624–1654",
    type: "colonial",
    side: "left",
    title: "Invasões Holandesas e o primeiro conflito militar-geopolítico",
    summary: "Holanda ocupa Pernambuco; batalhas definem fronteiras do domínio português.",
    modal: {
      contexto: "A Companhia das Índias Ocidentais (WIC) invade a Bahia em 1624 e o Nordeste a partir de 1630. O Brasil Holandês dura 24 anos e é a primeira experiência de administração não-portuguesa do território. A retomada portuguesa envolve articulação entre elites locais, tropas regulares e milícias.",
      fatos: [
        "1624: Holandeses tomam Salvador — portugueses retomam em 1625 com frota de socorro",
        "1630: Invasão de Pernambuco — início do Brasil Holandês sob o Conde Maurício de Nassau",
        "1645–1648: Insurreição Pernambucana — guerra de guerrilha liderada por André Vidal de Negreiros, Henrique Dias e Felipe Camarão",
        "Batalhas dos Guararapes (1648 e 1649): vitórias decisivas que expulsam os holandeses"
      ],
      ri: "O conflito é um episódio da Guerra dos 80 Anos e das disputas pelo domínio colonial Atlântico. A restauração portuguesa (1640) e o Tratado de Westminster (1654) encerram formalmente o conflito. O Brasil torna-se peça de barganha diplomática europeia. A diplomacia portuguesa com a Inglaterra é reforçada como contrabalança à Holanda.",
      legado: "Os Guararapes são elevados a mito fundador do Exército Brasileiro. O episódio demonstra pela primeira vez a capacidade de articulação militar entre grupos étnicos distintos (brancos, negros, indígenas) sob comando luso-brasileiro. Legado historiográfico de 'exército multiétnico' é instrumentalizado politicamente até hoje.",
      tags: ["Holanda", "WIC", "Guararapes", "Pernambuco", "Atlântico"]
    }
  },
  {
    date: "1695",
    type: "resistencia",
    side: "right",
    title: "Destruição de Palmares e militarização do controle racial",
    summary: "Domingos Jorge Velho destrói Quilombo dos Palmares — bandeiras como braço militar do Estado.",
    modal: {
      contexto: "Palmares existiu por quase um século (c.1600–1695) como Estado quilombola no agreste pernambucano. Sua destruição representa a articulação entre poder estatal, interesses senhoriais e capacidade militar privada (bandeirantes) contra a resistência escravizada.",
      fatos: [
        "Zumbi dos Palmares resistiu a inúmeras expedições militares ao longo de décadas",
        "Coroa portuguesa contrata Domingos Jorge Velho — bandeirante paulista — para destruir Palmares",
        "1695: Cerco final e destruição do Mocambo do Macaco; Zumbi capturado e executado em 20/11",
        "Bandeirantes como exército informal do Estado: força privatizada de expansão e controle"
      ],
      ri: "A manutenção do escravismo era pressuposto do modelo agroexportador colonial — e o modelo colonial era sustentáculo da inserção do Brasil no sistema mercantil atlântico. Palmares representava ameaça não só interna mas ao sistema de produção que alimentava as trocas comerciais com Europa.",
      legado: "Zumbi torna-se símbolo da resistência negra brasileira. O 20 de novembro é Dia da Consciência Negra. A militarização do controle racial estabelece precedente de uso da força armada para manutenção de hierarquias sociais — padrão que reaparece na repressão a movimentos populares nos séculos XIX e XX.",
      tags: ["Escravidão", "Palmares", "Zumbi", "Bandeirantes", "Resistência"]
    }
  },
  {
    date: "1808",
    type: "imperio",
    side: "left",
    title: "Chegada da Família Real — Militarização do Estado Imperial",
    summary: "A Corte portuguesa chega com tropa; reorganização militar é prioridade imediata.",
    modal: {
      contexto: "A transferência da Corte portuguesa para o Brasil, pressionada pela invasão napoleônica, traz consigo aproximadamente 15.000 pessoas — incluindo parte significativa do aparato militar e burocrático de Lisboa. O Brasil deixa de ser colônia administrativa e passa a sediar o Estado imperial.",
      fatos: [
        "1808: Criação da Academia Real Militar — primeiro ensino superior militar no Brasil",
        "Reorganização do Exército: incorporação de tropas regulares portuguesas e mercenários europeus",
        "1811–1812: Intervenção militar na Banda Oriental (atual Uruguai) — expansão territorial sul",
        "1816: Invasão da Banda Oriental, declarando-a Província Cisplatina",
        "Criação da Marinha como força estratégica atlântica"
      ],
      ri: "A vinda da Corte é resultado direto das Guerras Napoleônicas e da aliança luso-britânica (Tratados de Methuen, 1703). A Convenção Secreta (1807) e os Tratados de 1810 — abrindo portos e concedendo tarifas preferenciais à Grã-Bretanha — refletem a dependência estratégica portuguesa. O Brasil assume funções de Estado soberano sem romper com a dinâmica de subordinação. A militarização do Estado é resposta às ameaças externas (Napoleão, Espanha, movimentos independentistas sul-americanos).",
      legado: "A Academia Real Militar forma as primeiras gerações de oficiais brasileiros com formação científica. O padrão de modernização militar via importação europeia (instrutores, técnicas, armamento) permanecerá como traço estrutural. A intervenção na Banda Oriental estabelece o precedente de uso da força nas relações com os países platinos.",

// ── RENDER ──
const timeline = document.getElementById('timeline');

const eras = [
  { before: "1500", label: "BRASIL COLONIAL", sub: "1500 – 1807" },
  { before: "1808", label: "PERÍODO JOANINO & INDEPENDÊNCIA", sub: "1808 – 1889" },
  { before: "1889", label: "REPÚBLICA VELHA", sub: "1889 – 1930" },
  { before: "1930", label: "ERA VARGAS & DEMOCRACIA POPULISTA", sub: "1930 – 1964" },
  { before: "1964", label: "DITADURA MILITAR", sub: "1964 – 1985" },
  { before: "1985", label: "NOVA REPÚBLICA", sub: "1985 – Presente" },
];

function getEraFor(dateStr) {
  for (let i = eras.length - 1; i >= 0; i--) {
    const yearStr = eras[i].before;
    const eventYear = parseInt(dateStr);
    if (!isNaN(eventYear) && eventYear >= parseInt(yearStr)) return i;
    if (dateStr.includes(yearStr)) return i;
  }
  return -1;
}

function renderEra(idx) {
  const e = eras[idx];
  const div = document.createElement('div');
  div.className = 'era-divider';
  div.innerHTML = `<div class="era-divider-inner"><h2>${e.label}</h2><p>${e.sub}</p></div>`;
  return div;
}

function badgeClass(type) {
  return `badge-${type}`;
}

function typeLabel(type) {
  const map = {
    colonial: 'Colonial',
    imperio: 'Império',
    republica: 'República',
    golpe: 'Golpe',
    ditadura: 'Ditadura',
    ri: 'Rel. Internacionais',
    resistencia: 'Resistência'
  };
  return map[type] || type;
}

let lastEra = -1;
EVENTS.forEach((ev, i) => {
  const eraIdx = getEraFor(ev.date);
  if (eraIdx > lastEra) {
    for (let j = lastEra + 1; j <= eraIdx; j++) {
      timeline.appendChild(renderEra(j));
    }
    lastEra = eraIdx;
  }

  const div = document.createElement('div');
  div.className = `event ${ev.side}`;
  div.dataset.type = ev.type;
  div.dataset.idx = i;

  const card = `
    <div class="card" onclick="openModal(${i})">
      <div class="card-inner">
        <div class="card-type-badge ${badgeClass(ev.type)}">${typeLabel(ev.type)}</div>
        <div class="date">${ev.date}</div>
        <h3>${ev.title}</h3>
        <p>${ev.summary}</p>
        <div class="click-hint">[ clique para expandir ]</div>
      </div>
    </div>`;

  if (ev.side === 'left') {
    div.innerHTML = `${card}<div class="dot-col"><div class="dot type-${ev.type}" onclick="openModal(${i})"></div></div><div class="spacer"></div>`;
  } else {
    div.innerHTML = `<div class="spacer"></div><div class="dot-col"><div class="dot type-${ev.type}" onclick="openModal(${i})"></div></div>${card}`;
  }

  timeline.appendChild(div);
});

// ── INTERSECTION OBSERVER (animate on scroll) ──
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('visible'), 80);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.event').forEach(el => io.observe(el));

// ── MODAL ──
function openModal(idx) {
  const ev = EVENTS[idx];
  const m = ev.modal;
  document.getElementById('modal-date').textContent = ev.date;
  document.getElementById('modal-title').textContent = ev.title;

  let body = '';

  if (m.contexto) {
    body += `<div class="modal-section"><div class="modal-section-title">Contexto</div><p>${m.contexto}</p></div>`;
  }

  if (m.fatos && m.fatos.length) {
    body += `<div class="modal-section"><div class="modal-section-title">Fatos & Cronologia</div><ul>${m.fatos.map(f => `<li>${f}</li>`).join('')}</ul></div>`;
  }

  if (m.ri) {
    body += `<div class="modal-section"><div class="modal-section-title">Relações Internacionais & Repercussão</div><p>${m.ri}</p></div>`;
  }

  if (m.legado) {
    body += `<div class="modal-section"><div class="modal-section-title">Legado & Impacto</div><p>${m.legado}</p></div>`;
  }

  if (m.tags && m.tags.length) {
    body += `<div class="modal-tags">${m.tags.map(t => `<span class="modal-tag">${t}</span>`).join('')}</div>`;
  }

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal-overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const filter = this.dataset.filter;
    document.querySelectorAll('.event').forEach(ev => {
      if (filter === 'all' || ev.dataset.type === filter) {
        ev.classList.remove('hidden');
      } else {
        ev.classList.add('hidden');
      }
    });
  });
});
</script>
