<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Militares na Política Brasileira | 1500–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;--olive:#3D4A2E;--olive-mid:#5A6B42;--cream:#F5F0E8;--ink:#1A1A14;--red:#8B2222;--red-light:#C0392B;--blue-dim:#2C3E5A;--line:rgba(201,168,76,0.35);--modal-bg:rgba(10,10,8,0.93);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);color:var(--cream);font-family:'Source Serif 4',Georgia,serif;overflow-x:hidden;}
header{background:linear-gradient(180deg,#0D0D0A 0%,#1A1A14 60%,transparent 100%);padding:4rem 2rem 3rem;text-align:center;position:relative;border-bottom:1px solid var(--line);}
header::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:var(--gold);}
.header-label{font-family:'Courier Prime',monospace;font-size:.65rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;line-height:1.1;margin-bottom:.5rem;}
h1 span{color:var(--gold);font-style:italic;}
.header-sub{font-size:.9rem;color:rgba(245,240,232,.5);margin-top:1rem;font-style:italic;}
.legend{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;padding:1rem 2rem;background:rgba(26,26,20,.6);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.legend-item{display:flex;align-items:center;gap:.4rem;font-family:'Courier Prime',monospace;font-size:.6rem;letter-spacing:.1em;color:rgba(245,240,232,.6);text-transform:uppercase;}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;padding:1.2rem 2rem;background:rgba(26,26,20,.95);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;}
.filter-btn{font-family:'Courier Prime',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.35rem .9rem;border:1px solid var(--line);background:transparent;color:rgba(245,240,232,.6);cursor:pointer;transition:all .25s;border-radius:2px;}
.filter-btn:hover,.filter-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.timeline-wrapper{max-width:1100px;margin:0 auto;padding:3rem 1.5rem 6rem;position:relative;}
.timeline-wrapper::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--gold) 5%,var(--gold) 95%,transparent);transform:translateX(-50%);opacity:.4;}
.era-divider{display:flex;align-items:center;justify-content:center;margin:3rem 0 2rem;position:relative;z-index:5;}
.era-divider-inner{background:var(--ink);padding:.6rem 2rem;border:1px solid var(--gold-dark);text-align:center;}
.era-divider h2{font-family:'Courier Prime',monospace;font-size:.7rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;}
.era-divider p{font-size:.75rem;color:rgba(245,240,232,.4);font-style:italic;margin-top:.2rem;}
.event{display:grid;grid-template-columns:1fr 60px 1fr;gap:0;margin-bottom:1.5rem;position:relative;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s;}
.event.visible{opacity:1;transform:translateY(0);}
.event.hidden{display:none;}
.event.left .card{grid-column:1;text-align:right;padding-right:2rem;}
.event.left .dot-col{grid-column:2;}
.event.left .spacer{grid-column:3;}
.event.right .spacer{grid-column:1;}
.event.right .dot-col{grid-column:2;}
.event.right .card{grid-column:3;text-align:left;padding-left:2rem;}
.dot-col{display:flex;flex-direction:column;align-items:center;position:relative;z-index:5;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:var(--ink);margin-top:.9rem;flex-shrink:0;transition:transform .2s;cursor:pointer;position:relative;}
.dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid transparent;transition:border-color .2s;}
.dot:hover::after{border-color:var(--gold);}
.dot:hover{transform:scale(1.3);}
.dot.type-colonial{background:var(--olive);border-color:var(--olive-mid);}
.dot.type-imperio{background:#3A2E5A;border-color:#6B5A9E;}
.dot.type-republica{background:var(--blue-dim);border-color:#4A6FA5;}
.dot.type-golpe{background:var(--red);border-color:var(--red-light);}
.dot.type-ditadura{background:#5A1A1A;border-color:#922B2B;}
.dot.type-ri{background:#1A4A3A;border-color:#2D8A6A;}
.dot.type-resistencia{background:#4A3A00;border-color:#C9A84C;}
.card{cursor:pointer;transition:transform .2s;}
.card:hover{transform:translateX(4px);}
.event.right .card:hover{transform:translateX(-4px);}
.card-inner{display:inline-block;background:rgba(30,30,22,.8);border:1px solid rgba(201,168,76,.2);padding:.9rem 1.1rem;text-align:left;transition:border-color .2s,background .2s;}
.card:hover .card-inner{border-color:rgba(201,168,76,.5);background:rgba(40,38,28,.9);}
.card-inner .date{font-family:'Courier Prime',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:.3rem;}
.card-inner h3{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--cream);line-height:1.3;margin-bottom:.3rem;}
.card-inner p{font-size:.78rem;color:rgba(245,240,232,.55);line-height:1.5;font-style:italic;}
.card-type-badge{display:inline-block;font-family:'Courier Prime',monospace;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;padding:.15rem .5rem;margin-bottom:.4rem;border-radius:2px;}
.badge-colonial{background:rgba(61,74,46,.6);color:#A8C080;}
.badge-imperio{background:rgba(58,46,90,.6);color:#B09ADE;}
.badge-republica{background:rgba(44,62,90,.6);color:#7AAFDE;}
.badge-golpe{background:rgba(139,34,34,.6);color:#F08080;}
.badge-ditadura{background:rgba(90,26,26,.6);color:#E09090;}
.badge-ri{background:rgba(26,74,58,.6);color:#70D4A8;}
.badge-resistencia{background:rgba(74,58,0,.6);color:var(--gold-light);}
.click-hint{font-family:'Courier Prime',monospace;font-size:.55rem;color:rgba(201,168,76,.4);margin-top:.4rem;letter-spacing:.1em;}
.modal-overlay{position:fixed;inset:0;background:var(--modal-bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#1C1C14;border:1px solid var(--gold-dark);max-width:740px;width:100%;max-height:88vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:1.8rem 2rem 1.2rem;border-bottom:1px solid rgba(201,168,76,.2);position:relative;}
.modal-close{position:absolute;top:1.2rem;right:1.5rem;background:none;border:1px solid var(--line);color:var(--cream);width:32px;height:32px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.modal-date{font-family:'Courier Prime',monospace;font-size:.65rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;}
.modal h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--cream);line-height:1.25;}
.modal-governo{display:inline-block;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);padding:.3rem .9rem;margin-top:.7rem;font-family:'Courier Prime',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--gold-light);line-height:1.5;}
.modal-body{padding:1.5rem 2rem 2rem;}
.modal-section{margin-bottom:1.5rem;}
.modal-section-title{font-family:'Courier Prime',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--line);}
.modal-section p{font-size:.87rem;color:rgba(245,240,232,.8);line-height:1.78;}
.modal-section ul{list-style:none;padding:0;}
.modal-section ul li{font-size:.84rem;color:rgba(245,240,232,.75);padding:.32rem 0;border-bottom:1px solid rgba(201,168,76,.08);line-height:1.6;}
.modal-section ul li::before{content:'▸ ';color:var(--gold);font-size:.7rem;}
.pres-box{background:rgba(201,168,76,.06);border-left:2px solid var(--gold-dark);padding:.8rem 1rem;margin:.6rem 0;border-radius:0 2px 2px 0;}
.pres-box .pres-period{font-family:'Courier Prime',monospace;font-size:.6rem;color:var(--gold);letter-spacing:.15em;margin-bottom:.25rem;}
.pres-box .pres-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--cream);}
.pres-box .pres-desc{font-size:.82rem;color:rgba(245,240,232,.7);margin-top:.4rem;line-height:1.65;}
.modal-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--line);}
.modal-tag{font-family:'Courier Prime',monospace;font-size:.6rem;letter-spacing:.1em;color:rgba(201,168,76,.7);border:1px solid rgba(201,168,76,.2);padding:.2rem .6rem;border-radius:2px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--ink);}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:2px;}
@media(max-width:640px){
.timeline-wrapper::before{left:20px;}
.event{grid-template-columns:40px 1fr;}
.event.left .card,.event.right .card{grid-column:2;text-align:left;padding-left:1.2rem;padding-right:0;}
.event.left .dot-col,.event.right .dot-col{grid-column:1;}
.event.left .spacer,.event.right .spacer{display:none;}
.modal h2{font-size:1.1rem;}
.modal-header,.modal-body{padding:1.2rem;}
}
</style>
</head>
<body>
<header>
<div class="header-label">Linha do Tempo · CACD 2026</div>
<h1>Militares na<br><span>Política Nacional</span></h1>
<p class="header-sub">1500 – 2026 · Do descobrimento ao debate democrático contemporâneo</p>
</header>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:var(--olive-mid)"></div>Colonial</div>
<div class="legend-item"><div class="legend-dot" style="background:#6B5A9E"></div>Império</div>
<div class="legend-item"><div class="legend-dot" style="background:#4A6FA5"></div>República</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--red-light)"></div>Golpe/Intervenção</div>
<div class="legend-item"><div class="legend-dot" style="background:#922B2B"></div>Ditadura</div>
<div class="legend-item"><div class="legend-dot" style="background:#2D8A6A"></div>Rel. Internacionais</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Resistência</div>
</div>
<div class="filter-bar">
<button class="filter-btn active" data-filter="all">Todos</button>
<button class="filter-btn" data-filter="colonial">Colonial</button>
<button class="filter-btn" data-filter="imperio">Império</button>
<button class="filter-btn" data-filter="republica">República</button>
<button class="filter-btn" data-filter="golpe">Golpes</button>
<button class="filter-btn" data-filter="ditadura">Ditadura 64–85</button>
<button class="filter-btn" data-filter="ri">Rel. Internacionais</button>
<button class="filter-btn" data-filter="resistencia">Resistência</button>
</div>
<div class="timeline-wrapper" id="timeline"></div>
<div class="modal-overlay" id="modal-overlay">
<div class="modal" id="modal">
<div class="modal-header">
<button class="modal-close" id="modal-close">✕</button>
<div class="modal-date" id="modal-date"></div>
<h2 id="modal-title"></h2>
<div id="modal-governo"></div>
</div>
<div class="modal-body" id="modal-body"></div>
</div>
</div>
<script>
const EVENTS=[
{date:"1500–1549",type:"colonial",side:"right",title:"Capitanias e a estrutura militar colonial",summary:"Administração portuguesa funde poder civil e militar desde o início.",governo:"Coroa Portuguesa — Capitanias Hereditárias; Governo-Geral criado em 1549 (Tomé de Sousa)",modal:{contexto:"Portugal organiza o território colonial sob lógica militar-administrativa. Os capitães-donatários exercem poderes de governador, juiz e comandante militar simultaneamente. A figura do militar é inseparável do administrador colonial.",fatos:["Capitanias hereditárias (1534): donatários com poderes civis e militares plenos","Criação de fortes e feitorias ao longo do litoral como postos militares","Primeira expedição colonizadora (Tomé de Sousa, 1549): 1.000 soldados","Organização das Ordenanças: milícias locais subordinadas ao governador-geral"],ri:"A estrutura militar colonial responde à competição europeia pelo Atlântico Sul. França e Espanha pressionam o domínio português. O Tratado de Tordesilhas (1494) já era um instrumento geopolítico que antecede e fundamenta a militarização do território.",legado:"O modelo de poder misto civil-militar no Brasil nasce na colônia. A confusão entre as esferas permanecerá como traço estrutural até o século XX.",tags:["Colônia","Capitanias","Portugal","Tordesilhas"]}},
{date:"1624–1654",type:"colonial",side:"left",title:"Invasões Holandesas — o primeiro conflito geopolítico",summary:"Holanda ocupa Pernambuco; batalhas dos Guararapes definem o domínio português.",governo:"União Ibérica (até 1640) / D. João IV de Portugal (1640–1656); WIC governa o Nordeste ocupado",modal:{contexto:"A Companhia das Índias Ocidentais (WIC) invade a Bahia em 1624 e o Nordeste a partir de 1630. O Brasil Holandês dura 24 anos e é a primeira experiência de administração não-portuguesa do território. Sob Maurício de Nassau, a ocupação foi relativamente tolerante. A reconquista envolve articulação entre elites locais, tropas regulares e milícias.",fatos:["1624: Holandeses tomam Salvador — portugueses retomam em 1625 com frota de socorro","1630: Invasão de Pernambuco — início do Brasil Holandês sob Maurício de Nassau","1645–48: Insurreição Pernambucana — guerrilha com André Vidal de Negreiros, Henrique Dias e Filipe Camarão","Batalhas dos Guararapes (1648 e 1649): vitórias decisivas que expulsam os holandeses","Tratado de Westminster (1654): Holanda reconhece o domínio português"],ri:"O conflito é um episódio da Guerra dos 80 Anos e das disputas pelo domínio colonial Atlântico. A restauração portuguesa (1640) e o Tratado de Westminster (1654) encerram formalmente o conflito. O Brasil torna-se peça de barganha diplomática europeia. A diplomacia portuguesa com a Inglaterra é reforçada como contrabalança à Holanda.",legado:"Os Guararapes são elevados a mito fundador do Exército Brasileiro. O episódio demonstra a capacidade de articulação militar entre grupos étnicos distintos (brancos, negros, indígenas). A figura de Henrique Dias — o 'negro herói' — é instrumentalizada politicamente até hoje.",tags:["Holanda","WIC","Guararapes","Pernambuco","Atlântico","Nassau"]}},
{date:"1695",type:"resistencia",side:"right",title:"Destruição de Palmares — militarização do controle racial",summary:"Domingos Jorge Velho destrói o Quilombo dos Palmares; Zumbi executado em 20 de novembro.",governo:"Governador de Pernambuco Caetano de Melo e Castro; Vice-Rei Marquês de Montebelo",modal:{contexto:"Palmares existiu por quase um século (c.1600–1695) como Estado quilombola no agreste pernambucano, chegando a reunir até 30.000 pessoas. A Coroa portuguesa — depois de inúmeras expedições fracassadas — contrata o bandeirante paulista Domingos Jorge Velho, conferindo à repressão caráter de força militar privada.",fatos:["Zumbi dos Palmares resistiu a inúmeras expedições militares por décadas","Coroa contrata Domingos Jorge Velho — bandeirante paulista — como força militar privada e mercenária","Fevereiro 1694: Cerco e primeiro ataque — Palmares é destruído parcialmente","20/11/1695: Zumbi capturado e executado; sua cabeça exposta no Recife para desfazer a 'lenda da imortalidade'","As bandeiras como exército informal do Estado: força privatizada de expansão e controle"],ri:"A manutenção do escravismo era pressuposto do modelo agroexportador colonial — e este era sustentáculo da inserção do Brasil no sistema mercantil atlântico. Palmares representava ameaça ao sistema de produção que alimentava as trocas com a Europa. A Coroa via no quilombo também um risco à soberania territorial.",legado:"Zumbi torna-se símbolo da resistência negra brasileira. O 20 de novembro é Dia da Consciência Negra (lei federal desde 2011). A militarização do controle racial estabelece precedente de uso da força armada para manutenção de hierarquias sociais — padrão que reaparece na repressão a movimentos populares nos séculos XIX e XX.",tags:["Escravidão","Palmares","Zumbi","Bandeirantes","Resistência","Controle racial"]}},
{date:"1808",type:"imperio",side:"left",title:"Chegada da Família Real — militarização do Estado Imperial",summary:"A Corte portuguesa chega com tropa; Academia Real Militar é criada; Banda Oriental invadida.",governo:"D. João VI (Príncipe Regente 1808–1816; Rei do Brasil e Portugal 1816–1821)",modal:{contexto:"A transferência da Corte portuguesa para o Brasil, pressionada pela invasão napoleônica, traz cerca de 15.000 pessoas — incluindo grande parte do aparato militar e burocrático de Lisboa. O Brasil deixa de ser colônia e passa a sediar o Estado imperial.",fatos:["1808: Criação da Academia Real Militar — primeiro ensino superior militar no Brasil","Reorganização do Exército com tropas regulares portuguesas e mercenários europeus","1811–12: Intervenção militar na Banda Oriental (atual Uruguai)","1816: Invasão da Banda Oriental, declarada Província Cisplatina","Criação da Marinha como força estratégica atlântica e de projeção de poder"],ri:"A vinda da Corte resulta das Guerras Napoleônicas e da aliança luso-britânica (Tratados de Methuen, 1703). A Convenção Secreta (1807) e os Tratados de 1810 — abrindo portos com tarifas preferenciais à Grã-Bretanha — refletem a dependência estratégica portuguesa. O Brasil assume funções de Estado soberano sem romper com a dinâmica de subordinação.",legado:"A Academia Real Militar forma as primeiras gerações de oficiais brasileiros com formação científica. O padrão de modernização militar via importação europeia (instrutores, técnicas, armamento) permanecerá como traço estrutural. A intervenção na Banda Oriental estabelece o precedente de uso da força nas relações com os países platinos.",tags:["Família Real","Napoleão","Academia Militar","Platina","Reino Unido","D. João VI"]}},
{date:"1822",type:"imperio",side:"right",title:"Independência — militares entre ruptura e conservação",summary:"D. Pedro I lidera a Independência; mercenários europeus e guerra no Norte.",governo:"D. Pedro I (Imperador, 1822–1831)",modal:{contexto:"A Independência do Brasil é um processo conservador: mantém a monarquia, a escravidão e as estruturas de poder. Os militares estão no centro da disputa — parte permanece leal a Portugal, outra adere ao projeto de D. Pedro I. A guerra de independência ocorre principalmente no Norte e Nordeste.",fatos:["1821: Tropas portuguesas tentam recolonizar o Brasil — 'A Viradeira'","7/9/1822: D. Pedro I declara a Independência às margens do Ipiranga","1822–23: Guerras de independência na Bahia, Maranhão, Piauí e Pará contra forças lusas","Contratação de mercenários: Thomas Cochrane (escocês) lidera a Marinha","1823: Dissolução da Assembleia Constituinte — primeiro 'golpe' imperial"],ri:"Reconhecimento britânico é condicionado: em 1825, o Brasil paga £2 milhões a Portugal como 'indenização', sob mediação britânica. O Tratado com os EUA (1824) e o reconhecimento de Portugal (1825) consolidam a soberania. A dívida com a Inglaterra e a perpetuação do tráfico negreiro expõem as contradições da 'independência dependente'.",legado:"A Independência estabelece o padrão do militar como árbitro político nacional. D. Pedro I exerce um papel que antecipa futuros 'salvadores da pátria' fardados. A contratação de mercenários revela a fragilidade das FA nacionais — problema que mobilizará reformadores por décadas.",tags:["Independência","D. Pedro I","Inglaterra","Soberania","1822","Cochrane"]}},
{date:"1825–1828",type:"ri",side:"left",title:"Guerra da Cisplatina — derrota e o Estado-tampão uruguaio",summary:"Brasil perde o Uruguai; Grã-Bretanha arquiteta o Estado-tampão platino; abdicação de D. Pedro I.",governo:"D. Pedro I (1822–1831)",modal:{contexto:"A disputa pela Banda Oriental (Cisplatina) resulta em guerra entre Brasil e Províncias Unidas do Rio da Prata (Argentina). A derrota militar brasileira e a mediação britânica resultam na criação do Uruguai como Estado independente e neutro.",fatos:["1825: Uruguaios proclamam independência e pedem anexação às Províncias Unidas","1825: Declaração de guerra entre Brasil e Argentina","Batalha de Ituzaingó (1827): derrota do Exército Imperial","1828: Tratado do Rio de Janeiro — mediação britânica cria o Uruguai independente","Desgaste militar e financeiro fragiliza D. Pedro I — precipita abdicação em 1831"],ri:"A criação do Uruguai é arquitetada por Canning (Grã-Bretanha) para evitar hegemonia de qualquer potência platina — seja Brasil ou Argentina. O 'Estado-tampão' é instrumento clássico da geopolítica britânica. O Brasil perde território mas cede à pressão de sua principal credora e parceira comercial.",legado:"Primeiro grande fracasso militar externo do Brasil independente. Gera crise de legitimidade que resulta na abdicação de D. Pedro I. Revela a limitação do poderio militar imperial e a dependência estrutural da diplomacia brasileira em relação à Grã-Bretanha. O Uruguai como 'Estado-tampão' é referência da geopolítica platina até hoje.",tags:["Cisplatina","Uruguai","Argentina","Grã-Bretanha","Geopolítica platina"]}},
{date:"1831–1840",type:"resistencia",side:"right",title:"Regências e Revoltas — militares nas rebeliões populares",summary:"Período de instabilidade extrema; revoltas regionais com participação militar em todos os lados.",governo:"Regências: Feijó (1835–37), Araújo Lima (1837–40); D. Pedro II menor de idade",modal:{contexto:"Com a abdicação de D. Pedro I, o Brasil entra numa fase de regências instáveis. O Exército está fragmentado e politizado. Revoltas regionais eclodem em diversas províncias, com participação de militares em todos os lados.",fatos:["Cabanagem (1835–40, Pará): militares reprimem com violência extrema — ~30.000 mortos em conflito de classes e raças","Balaiada (1838–41, Maranhão): ex-militares e desertores entre os líderes revoltosos","Sabinada (1837–38, Bahia): militares republicanos tentam separar a Bahia do Império","Farroupilha (1835–45, RS): oficiais gaúchos proclamam República Rio-Grandense — dura 10 anos","Revolução Liberal de 1842 (SP/MG): civis e militares contra o Regresso conservador"],ri:"O período coincide com pressão britânica para abolição do tráfico negreiro (Aberdeen Act, 1845). A instabilidade interna fragiliza a capacidade de resposta às demandas externas. O Estado recorre à força militar para manter a unidade territorial — diferentemente das repúblicas vizinhas que se fragmentaram.",legado:"As revoltas das regências são o laboratório das contradições sociais do Império. O uso do Exército para reprimir movimentos populares define um padrão que perdurará. A centralização e a força militar são inseparáveis na manutenção da ordem imperial.",tags:["Regências","Cabanagem","Farroupilha","Balaiada","Revoltas populares"]}},
{date:"1864–1870",type:"ri",side:"left",title:"Guerra do Paraguai — o maior conflito da América do Sul",summary:"Tríplice Aliança destrói o Paraguai; militares brasileiros ganham imenso protagonismo político.",governo:"D. Pedro II (1840–1889); Duque de Caxias lidera o Exército (1867–69)",modal:{contexto:"O Brasil entra em guerra contra o Paraguai de Francisco Solano López em aliança com Argentina e Uruguai (Tríplice Aliança, 1865). O conflito dura 5 anos, mata estimadamente 60% da população paraguaia e transforma a estrutura política interna do Brasil.",fatos:["1864: Brasil intervém no Uruguai — Solano López declara guerra ao Brasil","1865: Tratado da Tríplice Aliança — BR, ARG, URU contra Paraguai","Duque de Caxias assume o comando do Exército Imperial e coordena as vitórias decisivas","1869: Queda de Assunção; 1870: morte de Solano López em Cerro Corá — fim da guerra","Paraguai perde 80% da população masculina adulta — a maior destruição demográfica das Américas","60.000 a 100.000 soldados brasileiros participam; dezenas de milhares morrem de batalha e doença"],ri:"Debate historiográfico central: Leon Pomer e Eduardo Galeano atribuem a guerra à pressão do capital britânico — tese refutada por Francisco Doratioto com base em documentos primários. O Tratado da Tríplice Aliança é secreto e assimétrico — Argentina e Brasil dividem territórios paraguaios. Brasil adquire Mato Grosso do Sul. O Paraguai perde acesso ao mar e fica na periferia econômica regional por décadas.",legado:"A guerra transforma o Exército: prestígio militar cresce exponencialmente e surgem lideranças como Caxias, Osório e Deodoro. O Exército passa a se ver como instituição 'salvadora da pátria' com missão política. O positivismo comtiano penetra nas escolas militares. O conflito acelera a crise do Império: a monarquia que comanda a guerra vitoriosa emerge politicamente fragilizada.",tags:["Paraguai","Tríplice Aliança","Caxias","Deodoro","Geopolítica platina","Positivismo"]}},
{date:"15 Nov 1889",type:"golpe",side:"right",title:"Proclamação da República — o primeiro golpe militar",summary:"Deodoro da Fonseca depõe D. Pedro II; militares instalam a República sem eleições.",governo:"Marechal Deodoro da Fonseca (Ditador Provisório, 1889–1891); depois Marechal Floriano Peixoto (1891–1894)",modal:{contexto:"A Proclamação é liderada pelo Marechal Deodoro da Fonseca e pelo Marechal Floriano Peixoto. Não há participação popular significativa. Benjamin Constant introduz o positivismo como ideologia do movimento republicano militar. D. Pedro II é exilado em Portugal.",presGov:[{nome:"Marechal Deodoro da Fonseca",period:"Nov 1889 – Nov 1891",desc:"Primeiro presidente da República. Ditador provisório, depois eleito indiretamente pela Assembleia Constituinte. Fechou o Congresso em novembro de 1891 — o que provocou sua própria deposição por Floriano. Ironicamente, o líder do golpe que instaurou a República foi deposto em menos de 2 anos."},{nome:"Marechal Floriano Peixoto",period:"Nov 1891 – Nov 1894",desc:"'O Marechal de Ferro'. Vice de Deodoro, assumiu após sua deposição. Consolidou a República reprimindo a Revolta da Armada (Marinha) e a Revolução Federalista (Sul). Governo autoritário e centralizador. O positivismo de seu governo influenciou gerações de militares que viriam a reger o Estado."}],fatos:["13/5/1888: Abolição da Escravidão fragiliza base agrária do Império — militares apoiam a mudança","15/11/1889: Deodoro cerca o Ministério da Guerra — governo imperial rende-se sem combate","O próprio Deodoro relata que 'não sabia o que estava fazendo' — golpe quase acidental, convertido em Proclamação","Benjamin Constant: Positivismo comtiano como filosofia do novo Estado ('Ordem e Progresso')","1891: Deodoro fecha o Congresso — Floriano Peixoto o depõe em contramanifestação militar"],ri:"EUA reconhecem a República em 3 dias — antes mesmo da Argentina. A República nasce na esteira do expansionismo norte-americano no Hemisfério (Doutrina Monroe). O Barão do Rio Branco está em missão diplomática quando é proclamada. A República mantém a inserção dependente na economia mundial: exportação de café, importação de manufaturados.",legado:"O 15 de Novembro estabelece o padrão do golpe militar como mecanismo de mudança de regime no Brasil. A 'República dos Militares' (Deodoro e Floriano) revela desde o início a tensão entre tutela militar e governo civil. O positivismo justifica a intervenção: militares como 'poder moderador' laico substituindo o imperador.",tags:["República","Deodoro","Floriano","Positivismo","Golpe","1889"]}},
{date:"1893–1895",type:"golpe",side:"left",title:"Revolta da Armada e Federalista — militares contra militares",summary:"Marinha vs. Exército; guerra civil no Sul expõe fraturas da República recém-nascida.",governo:"Marechal Floriano Peixoto (1891–1894)",modal:{contexto:"A República Velha começa com crises militares simultâneas: a Revolta da Armada no Rio (Marinha contra Floriano) e a Revolução Federalista no Rio Grande do Sul. Os dois conflitos revelam que a República era frágil e dependia do equilíbrio de forças militares internas.",fatos:["1893: Almirante Custódio de Melo proclama a revolta da Marinha contra Floriano Peixoto","Navios de guerra bombardeiam o Rio de Janeiro — inédito na história do país","1893–95: Revolução Federalista no RS — guerra civil entre republicanos e federalistas","As 'Degolas' federalistas: execuções sumárias de prisioneiros com navalha","Floriano esmaga os dois movimentos com apoio americano e consolida a República oligárquica"],ri:"A Revolta da Armada tem dimensão internacional: esquadras portuguesa e britânica ancoradas na baía pressionam pelo reconhecimento dos rebeldes. Os EUA, sob Cleveland, recusam e apoiam Floriano — afirmando a Doutrina Monroe. O capitão Picking (Marinha americana) age em favor de Floriano, impedindo o bloqueio rebelde. A intervenção americana discreta é sinal do que virá no século XX.",legado:"A derrota da Marinha consolida a hegemonia do Exército sobre a Marinha nas disputas políticas internas. O padrão de intervenção norte-americana discreta em favor do governo estabelecido é sinal do que será a relação Brasil-EUA no século XX.",tags:["Armada","Floriano","Federalistas","EUA","Doutrina Monroe"]}},
{date:"1897",type:"resistencia",side:"right",title:"Canudos — o Exército contra o sertão",summary:"Quatro expedições militares destroem Canudos; massacre expõe a República excludente.",governo:"Prudente de Moraes (1894–1898) — primeiro presidente civil da República",modal:{contexto:"Antônio Conselheiro funda Canudos no sertão baiano em 1893. Até 1897, a comunidade reúne 35.000 pessoas. A República envia quatro expedições militares — as três primeiras são derrotadas humilhantemente. A quarta, liderada pelo General Arthur Oscar, destrói Canudos em outubro de 1897.",fatos:["1896: Primeira expedição — 100 soldados derrotados; segunda derrota humilhante em 1897","1897: Terceira expedição (3.000 soldados) derrotada — coronel Moreira César morto em combate","Agosto–outubro 1897: Quarta expedição (8.000 soldados) — cerco e destruição total de Canudos","Estima-se 15.000–25.000 mortos — homens, mulheres e crianças, incluindo rendidos após a queda","Euclides da Cunha cobriu o conflito para O Estado de S. Paulo — resultado: 'Os Sertões' (1902)"],ri:"Canudos é episódio de política interna, mas sua repercussão internacional é significativa. A imprensa europeia e norte-americana acompanha. A narrativa republicana de 'monarquismo' e 'fanatismo' serve para justificar internacionalmente o massacre. A Questão de Missões e o ativismo diplomático de Rio Branco ocorrem em paralelo — mostrando como o Estado projetava poder externamente enquanto massacrava internamente.",legado:"'Os Sertões' (1902) de Euclides da Cunha é o mais importante documento do conflito e da violência estatal. O texto revela as contradições entre o discurso civilizatório da República e a realidade do extermínio. Canudos torna-se referência central de qualquer análise sobre militarismo, exclusão social e violência de Estado no Brasil.",tags:["Canudos","Euclides da Cunha","Sertão","Violência de Estado","República"]}},
{date:"1904",type:"resistencia",side:"left",title:"Revolta da Vacina — militares na rebelião popular",summary:"Soldados e civis se unem contra vacinação compulsória; Escola Militar fecha.",governo:"Rodrigues Alves (1902–1906)",modal:{contexto:"A campanha de vacinação compulsória contra a varíola, liderada por Oswaldo Cruz e apoiada pelo presidente Rodrigues Alves, provoca revolta popular no Rio. Militares positivistas da Escola Militar da Praia Vermelha juntam-se aos revoltosos, tentando um golpe.",fatos:["Novembro 1904: Revolta popular contra obrigatoriedade da vacina — barricadas no Rio de Janeiro","Alunos da Escola Militar da Praia Vermelha aderem à revolta","General Travassos tenta liderar tropas regulares — fracassa","Governo derrota a revolta e fecha a Escola Militar da Praia Vermelha","Florianistas e jacobinos civis aproveitam para tentar golpe republicano radical"],ri:"A vacinação compulsória tem como pano de fundo a necessidade de 'saneamento' do Rio para projetar imagem de civilização europeia e atrair investimentos externos. O 'bota-abaixo' de Pereira Passos e a política sanitarista de Oswaldo Cruz eram parte de um projeto de modernização urbana voltado para o mercado externo — com forte influência de modelos europeus (Haussmann em Paris).",legado:"Revela que o Exército não era monolítico: havia uma ala positivista-jacobina disposta à insurgência. A derrota consolida o poder das oligarquias cafeeiras sobre o Estado republicano. A modernização autoritária e a exclusão das classes populares estabelecem um padrão que se repetirá.",tags:["Vacina","Rio de Janeiro","Positivismo","Revolta","Escola Militar"]}},
{date:"1910",type:"resistencia",side:"right",title:"Revolta da Chibata — marinheiros negros contra o castigo corporal",summary:"João Cândido lidera revolta na Marinha; questão racial e militarismo se cruzam.",governo:"Marechal Hermes da Fonseca (1910–1914)",modal:{contexto:"Marinheiros, em sua maioria negros e mestiços, se rebelam contra o castigo da chibata ainda vigente na Marinha brasileira — 22 anos após a abolição. João Cândido 'o Almirante Negro' lidera a tomada dos maiores navios de guerra do país.",fatos:["22/11/1910: Marinheiros tomam 4 navios de guerra, inclusive o Minas Gerais e o São Paulo","João Cândido negocia com o Congresso — governo cede e aboliu a chibata por lei","Governo decreta anistia, mas logo reverte — centenas de marinheiros presos em massa","22/11–3/12: Revolta da Ilha das Cobras reprimida com violência; mortos e deportados para a Amazônia","João Cândido declarado louco — internado no Hospício Nacional de Alienados"],ri:"O Brasil havia adquirido o Minas Gerais e o São Paulo — os maiores navios de guerra da época — como parte de uma política de poder naval para rivalizar com a Argentina (que também comprara navios). A Revolta expõe que o gigante naval era operado por marinheiros em condições análogas à escravidão. A imprensa internacional, especialmente britânica, cobriu com atenção.",legado:"João Cândido é símbolo maior da resistência negra no contexto militar. A Revolta da Chibata é marco do movimento negro brasileiro e da crítica à continuidade das hierarquias raciais nas instituições militares pós-abolição.",tags:["Chibata","João Cândido","Marinha","Raça","Revolta","1910"]}},
{date:"1917–1918",type:"ri",side:"left",title:"Brasil na 1ª Guerra Mundial — único latino-americano no front europeu",summary:"Navios afundados por alemães levam à declaração de guerra; DNOG vai ao Mediterrâneo.",governo:"Venceslau Brás (1914–1918) — presidente civil durante toda a participação na guerra",modal:{contexto:"O Brasil manteve neutralidade até 1917. O afundamento de navios mercantes brasileiros por submarinos alemães — o Paraná em abril e o Macau em outubro de 1917 — gerou onda de indignação nacional. Em 26 de outubro de 1917, o Brasil declarou guerra à Alemanha, tornando-se o único país sul-americano a participar ativamente do conflito.",fatos:["Brasil era o principal destino de imigrantes alemães na AL — Alemanha era seu maior parceiro comercial antes da guerra","Abril 1917: Submarino alemão afunda o navio Paraná em águas europeias — Brasil rompe relações com a Alemanha","Outubro 1917: Afundamento do Macau pelo U-93 — estopim para a declaração de guerra","26/10/1917: Brasil declara guerra às Potências Centrais — único país sul-americano a fazê-lo","Divisão Naval em Operações de Guerra (DNOG): navios scouts Bahia e Rio Grande do Sul, destroyers e o transporte Belmonte partem para o Mediterrâneo (maio de 1918)","Missão médica, aviadores e oficiais enviados à França — tenente José Pessoa promovido por bravura a capitão do Exército francês","DNOG chega a Gibraltar um dia antes do armistício (11/11/1918) — epidemia de gripe espanhola a bordo reduziu capacidade operacional","Participação militar modesta, mas garantiu presença na Conferência de Paz de Versalhes (1919)"],ri:"A participação foi estratégica: garantiu ao Brasil assento na Conferência de Paz de Versalhes e vaga na Liga das Nações — o único país sul-americano a ter assento permanente no Conselho da Liga. O Barão do Rio Branco havia falecido em 1912, mas sua doutrina de aproximação com os EUA norteou a decisão. A Alemanha era o principal parceiro comercial do Brasil antes da guerra — o conflito acelerou o realinhamento para a esfera americana.",legado:"Único país latino-americano a enviar forças para combater na Europa. A participação consolidou a política externa brasileira voltada para os EUA e garantiu presença no sistema internacional pós-guerra. A Conferência de Versalhes (1919) e a Liga das Nações são os marcos do multilateralismo que o Brasil ajudou a construir — e que seriam referência para o sistema pós-1945 da ONU. A desilusão com a Belle Époque europeia reforçou o nacionalismo que eclodiria na Semana de Arte Moderna (1922) e no tenentismo.",tags:["1ª Guerra","DNOG","Alemanha","Versalhes","Liga das Nações","EUA","Venceslau Brás"]}},
{date:"1922",type:"resistencia",side:"right",title:"O 18 do Forte de Copacabana — o tenentismo",summary:"Revolta tenentista inaugura geração que moldará décadas de política brasileira.",governo:"Epitácio Pessoa (1919–22) — decretou estado de sítio; Artur Bernardes (1922–26) — reprimiu continuamente",modal:{contexto:"Jovens tenentes e capitães do Exército se rebelam contra a República Velha e as oligarquias do café-com-leite. O movimento tenentista (1922–1930) é a primeira crise sistêmica do Exército e antecipa a Revolução de 1930.",fatos:["Julho 1922: Revolta militar no Rio, Mato Grosso e Nordeste — início do tenentismo","18 do Forte de Copacabana: grupo de revoltosos marcha pela praia em confronto suicida — apenas 2 sobrevivem","Sobreviventes: Siqueira Campos e Eduardo Gomes — tornam-se ícones tenentistas","1924: Segunda revolta tenentista em São Paulo — semanas de combates urbanos; governo bombardeia a cidade","1925–27: Coluna Prestes percorre 25.000 km pelo interior do Brasil — 'invicta' mas sem base social"],ri:"O tenentismo reflete o reformismo militar latino-americano da época e o impacto da Primeira Guerra Mundial nas concepções de Estado e modernização. A Coluna Prestes percorre o Brasil enquanto internacionalmente comunismo (URSS), fascismo (Itália) e liberalismo democrático competem. Luís Carlos Prestes tornará-se líder comunista após exílio na Argentina.",legado:"O tenentismo é a 'escola política' de Juarez Távora, Eduardo Gomes, Eurico Gaspar Dutra e, indiretamente, de toda a geração que dominou a política brasileira até 1985. A crítica à corrupção oligárquica sem projeto social claro abre espaço para ser instrumentalizado por Vargas em 1930.",tags:["Tenentismo","Copacabana","Coluna Prestes","República Velha","1922"]}},
{date:"1930",type:"golpe",side:"left",title:"Revolução de 1930 — militares instalam Vargas no poder",summary:"Golpe encerra a República Velha; Vargas governa por 15 anos contínuos.",governo:"Washington Luís deposto; Junta Militar instala Getúlio Vargas (1930–1945)",modal:{contexto:"A eleição fraudada de Júlio Prestes contra Getúlio Vargas leva à aliança entre tenentes, oligarquias dissidentes (MG, RS, PB) e facções militares. O Exército derruba Washington Luís e entrega o poder a Vargas.",presGov:[{nome:"Getúlio Vargas",period:"1930–1945 (15 anos contínuos)",desc:"O político mais importante do século XX brasileiro. Governou como ditador provisório (1930–34), presidente constitucional (1934–37) e ditador do Estado Novo (1937–45). Os militares foram seus principais apoiadores e instrumentos de poder — mas também os que o depositariam em 1945. Retornou pelo voto em 1950 e governou até o suicídio em 1954."}],fatos:["Pacto entre RS, MG, PB — a Aliança Liberal","Assassinato de João Pessoa (PB) serve de pretexto emocional para a revolta","Outubro 1930: Junta militar (Tasso Fragoso, Mena Barreto) depõe Washington Luís e entrega o poder a Vargas","Vargas governa como ditador provisório (1930–34), presidente constitucional (1934–37) e ditador do Estado Novo (1937–45)","Golpe dentro do golpe: Estado Novo (1937) articulado pelos generais Dutra e Góes Monteiro com Vargas"],ri:"A Revolução de 1930 ocorre no contexto da Grande Depressão (1929). O colapso do preço do café expõe a fragilidade do modelo agroexportador. A Revolução representa uma inflexão industrializante. Vargas navegará habilmente entre EUA e Alemanha na Segunda Guerra, até a entrada do Brasil ao lado dos Aliados em 1942.",legado:"A Revolução de 1930 inaugura o Estado desenvolvimentista, o trabalhismo e a industrialização via Estado. Os militares tornam-se árbitros permanentes do sistema político — o golpe de 1930 estabelece que o Exército pode e deve intervir quando a 'ordem' estiver ameaçada.",tags:["Vargas","1930","República Velha","Golpe","Grande Depressão"]}},
{date:"1932",type:"resistencia",side:"right",title:"Revolução Constitucionalista — São Paulo contra Vargas",summary:"SP mobiliza milícias civis; Exército Federal esmaga a revolta em 87 dias.",governo:"Getúlio Vargas (Ditador Provisório, 1930–1934)",modal:{contexto:"São Paulo — excluída do poder federal pela Revolução de 1930 — se rebela exigindo constituição e governo civil. A revolta mobiliza civis paulistas (MMDC) e forças militares locais contra o Exército Federal.",fatos:["9/7/1932: Início da revolta em São Paulo","Tropas federais de quatro direções cercam SP; aviões bombardeiam a cidade","Voluntários civis compõem a maioria das forças paulistas — o 'exército dos meninos'","Outubro 1932: Capitulação paulista após 87 dias — maior conflito armado interno desde a Farroupilha","Vargas convoca a Assembleia Constituinte — SP 'vence perdendo'"],ri:"São Paulo tentou importar armas e munições — com resultados limitados. O conflito mostrou que a hegemonia militar federal era irreversível. A derrota paulista consolida o poder centralizador de Vargas, que usará o período para reorganizar o Estado segundo modelo inspirado no corporativismo europeu.",legado:"A Revolução de 32 é o último conflito armado interno de grande escala no Brasil. O MMDC e os 'constitucionalistas' tornam-se símbolos da identidade paulista. A derrota militar/vitória política antecipa o padrão de negociação-dentro-da-derrota que marcará futuras relações entre oposição e poder militar.",tags:["São Paulo","1932","Constitucionalismo","Vargas","Federalismo"]}},
{date:"1935",type:"golpe",side:"left",title:"Intentona Comunista — o anticomunismo entra na doutrina militar",summary:"Revolta do PCB fracassa; Vargas usa o evento para consolidar o Estado de exceção.",governo:"Getúlio Vargas (Presidente Constitucional, 1934–1937)",modal:{contexto:"O PCB, com apoio da Internacional Comunista (Komintern), organiza revoltas em Natal, Recife e Rio. As revoltas são debeladas em dias. Vargas usa o episódio para decretar estado de guerra e preparar o caminho para o Estado Novo.",fatos:["Novembro 1935: Revoltas em Natal (domina a cidade por 4 dias), Recife e Rio de Janeiro","No Rio: oficiais comunistas tentam tomar a base da Aviação — mortos e presos no dormitório","Luís Carlos Prestes e Olga Benario (alemã-judia, grávida) presos em 1936","Olga Benario deportada para a Alemanha nazista pelo governo Vargas — morta em câmara de gás em 1942","Vargas usa o 'Plano Cohen' (forjado pelo integralista Olímpio Mourão!) para justificar o Estado Novo em 1937"],ri:"A Intentona está inserida na dinâmica da Guerra Fria avant la lettre: URSS/Komintern vs. potências liberais e fascistas. O caso Olga Benario tem repercussão internacional — denúncias de grupos antifascistas europeus. Vargas ao mesmo tempo negociava aproximação com a Alemanha nazista (missões comerciais, fornecimento de minerais).",legado:"O anticomunismo passa a ser pilar ideológico das Forças Armadas — persistindo até 1985. A 'Intentona' é usada e reusada como justificativa de intervenção política militar até 1964. A deportação de Olga Benario — grávida, entregue à morte pelo governo brasileiro — é um dos maiores escândalos humanitários do período.",tags:["PCB","Comunismo","Vargas","Estado Novo","Olga Benario","URSS"]}},
{date:"1937",type:"golpe",side:"right",title:"Estado Novo — ditadura civil-militar de Vargas",summary:"Golpe cancela eleições; Constituição 'Polaca'; industrialização autoritária.",governo:"Getúlio Vargas (Ditador do Estado Novo, 1937–1945); Ministro da Guerra: General Eurico Dutra; General Góes Monteiro: arquiteto militar",modal:{contexto:"Em novembro de 1937, Vargas — com apoio dos generais Eurico Dutra e Góes Monteiro — cancela as eleições presidenciais previstas, fecha o Congresso e outorga uma nova Constituição de inspiração fascista (a 'Polaca'). O Estado Novo dura até 1945.",fatos:["Plano Cohen: documento forjado pelo integralista Olímpio Mourão — inventou ameaça comunista para justificar o golpe","10/11/1937: Vargas anuncia o Estado Novo pelo rádio; constituição outorgada sem qualquer consulta popular","General Góes Monteiro: arquiteto militar do Estado Novo, controla o Exército","CLT (1943): legislação trabalhista que cooptou o movimento operário via sindicalismo corporativo de Estado","1938: Revolta integralista de Plínio Salgado fracassa — Vargas também reprime a direita radical"],ri:"O Estado Novo navega entre Aliados e Eixo até 1942. Vargas negocia a usina de Volta Redonda com os EUA (1940) e mantém relações com a Alemanha. A entrada do Brasil na 2ª Guerra (1942) — após afundamento de navios — é decisão também militar. A Missão Militar Americana (1942) institucionaliza a influência dos EUA nas FA brasileiras.",legado:"O Estado Novo é o modelo de modernização autoritária brasileiro. A industrialização por substituição de importações, a legislação trabalhista corporativa e o Estado forte são heranças do período. A relação entre militares e desenvolvimento nacional é forjada neste momento — e reaparece no golpe de 1964.",tags:["Estado Novo","Vargas","Ditadura","Fascismo","Industrialização","Góes Monteiro"]}},
{date:"1942–1945",type:"ri",side:"left",title:"FEB na 2ª Guerra Mundial — o Brasil no front italiano",summary:"Força Expedicionária Brasileira combate na Itália; 'cobra fumando' vira símbolo.",governo:"Getúlio Vargas (Estado Novo, 1937–1945); Ministro da Guerra: General Eurico Dutra",modal:{contexto:"O Brasil entra na Segunda Guerra em agosto de 1942, após afundamento de navios por submarinos do Eixo. A Força Expedicionária Brasileira (FEB) — 25.334 homens — combate na Itália entre julho de 1944 e maio de 1945, integrada ao V Exército americano sob o General Mascarenhas de Morais.",fatos:["1942: 31 navios brasileiros afundados por submarinos alemães e italianos — comoção nacional","22/8/1942: Declaração de guerra ao Eixo","Julho 1944: FEB parte para a Itália — 'Cobra fumando' é a mascote sarcástica que ficou famosa ('é mais fácil uma cobra fumar do que o Brasil entrar na guerra')","Monte Castelo: batalha símbolo da FEB — tentada quatro vezes, tomada em fevereiro de 1945 após meses de combates intensos no inverno italiano","FEB captura 20.573 prisioneiros alemães e italianos — mais do que qualquer outra força aliada proporcionalmente","Base de Natal: maior base aérea dos Aliados no Atlântico Sul — parte essencial do esforço de guerra"],ri:"Vargas negociou com os EUA (base de Natal, financiamento de Volta Redonda) em troca de participação na guerra. A Conferência de Bretton Woods (1944), o FMI e o Banco Mundial surgem nesse contexto — Brasil participa como aliado dos vencedores. O general Dutra, futuro presidente, coordena a relação com o Estado-Maior americano. A interoperabilidade com o Exército americano institucionaliza a influência militar dos EUA no Brasil.",legado:"A FEB é o único exército sul-americano a combater na Europa na 2ª Guerra. O retorno dos 'pracinhas' reforça a contradição: soldados que lutaram contra o nazifascismo voltam para uma ditadura. Essa tensão acelera a queda de Vargas (1945). O laço militar com os EUA — forjado na Itália — será determinante no golpe de 1964.",tags:["FEB","Segunda Guerra","Itália","EUA","Monte Castelo","Pracinhas","Mascarenhas"]}},
{date:"Out 1945",type:"golpe",side:"right",title:"Deposição de Vargas — militares restauram (por interesse) a democracia",summary:"Generais Dutra e Góes Monteiro depõem Vargas; eleições livres em dezembro.",governo:"Getúlio Vargas deposto; Junta Militar; depois Dutra eleito (1946–1951)",modal:{contexto:"Com o fim da 2ª Guerra e a contradição insustentável entre ditadura interna e luta antifascista externa, os militares pressionam Vargas a deixar o poder. Em outubro de 1945, os generais apresentam-lhe o ultimato. Vargas renuncia. Em dezembro, Dutra é eleito.",presGov:[{nome:"General Eurico Gaspar Dutra",period:"1946–1951",desc:"Ex-Ministro da Guerra de Vargas e um dos arquitetos do Estado Novo, Dutra foi eleito com apoio de Vargas. Alinhou-se aos EUA na Guerra Fria, proscreveu o PCB e cassou o mandato de Prestes. Governou sob a Constituição de 1946, a mais liberal desde a Primeira República."}],fatos:["1945: Vargas anuncia eleições mas cria o 'queremismo' popular para adiar e permanecer","29/10/1945: Exército exige a renúncia — Vargas aceita sem resistência","Generais Góes Monteiro e Eurico Dutra lideram o movimento deposicionista","Dezembro 1945: Dutra eleito presidente — primeira eleição livre desde 1930","1946: Promulgada nova Constituição democrática"],ri:"A deposição é influenciada pelo clima internacional pós-guerra: a ONU, os princípios da Carta do Atlântico e a retórica democrática dos Aliados tornam insustentável a manutenção de ditaduras. Os EUA, parceiros privilegiados do Brasil, pressionam pela democratização. A Guerra Fria está começando — e os militares brasileiros precisam se posicionar no novo eixo anticomunista.",legado:"O episódio revela que as FA não tinham compromisso com nenhum líder específico — nem mesmo Vargas, aliado por 15 anos. A lealdade era com a 'ordem' e com a preservação da instituição. O padrão se repetirá em 1954, 1961 e 1964.",tags:["Vargas","Deposição","1945","Democracia","Dutra","Pós-guerra"]}},
{date:"1954",type:"golpe",side:"left",title:"Crise do Segundo Vargas — suicídio e a carta testamento",summary:"27 generais exigem renúncia; Vargas se mata e transforma derrota em vitória política.",governo:"Getúlio Vargas (Presidente eleito, 1951–1954); 27 generais assinaram manifesto pela renúncia",modal:{contexto:"Vargas retorna pelo voto em 1950. Em 1954, uma crise militar acirrada — com a UDN, a imprensa de Lacerda e setores do Exército — leva ao manifesto de 27 generais exigindo a renúncia. Vargas escolhe o suicídio.",fatos:["Agosto 1954: 27 generais assinam manifesto exigindo a renúncia de Vargas","Crise do Atentado da Rua Toneleros: tiro destinado a Lacerda mata major da Aeronáutica — Vargas é responsabilizado","24/8/1954: Vargas se suicida com um tiro no coração no Palácio do Catete","Carta Testamento: 'Saio da vida para entrar na História' — ataca grupos internacionais e o 'capital estrangeiro'","Manifestações populares massivas contra a UDN e o golpismo — queima de jornais e ataque à embaixada americana"],ri:"O suicídio é interpretado como protesto contra a dependência externa e a pressão norte-americana. A carta testamento menciona explicitamente grupos internacionais e sua pressão sobre o Brasil. O contexto de Guerra Fria havia isolado Vargas, visto como populista perigoso pelos EUA. A queima de jornais e o ataque à embaixada americana revelam o componente anti-imperialista da reação popular.",legado:"O suicídio é o momento político mais dramático da história republicana. Transforma uma derrota política em vitória simbólica. Vargas morto torna-se mais poderoso que Vargas vivo — seu projeto é herdado por Jango e pelo PTB. A 'carta testamento' é lida como manifesto do nacional-desenvolvimentismo.",tags:["Vargas","Suicídio","1954","Nacional-desenvolvimentismo","Guerra Fria"]}},
{date:"11 Nov 1955",type:"golpe",side:"right",title:"Movimento de 11 de Novembro — Lott e o contragolpe legalista",summary:"General Lott depõe presidente em exercício para garantir posse de JK; militares divididos entre legalismo e golpismo.",governo:"Carlos Luz (presidente em exercício, deposto por Lott); Nereu Ramos assume; Café Filho estava licenciado",modal:{contexto:"O 'Movimento de 11 de Novembro' é o nome oficial dado ao contragolpe do general Henrique Teixeira Lott. Após a eleição de JK e Jango (outubro de 1955), setores militares ligados à UDN — especialmente o ministro da Aeronáutica Eduardo Gomes e o da Marinha Amorim do Vale — articulam o impedimento da posse. Café Filho 'licencia-se' por doença (suspeita-se de manobra política). Carlos Luz assume e sinaliza apoio ao golpe antipossista. Lott reage.",fatos:["Outubro 1955: JK eleito; UDN e linha dura militar contestam o resultado","Carlos Luz (presidente da Câmara em exercício) edita nota favorável ao impedimento de JK","11/11/1955: Lott lança manifesto, ocupa o Ministério da Guerra e dirige tanques às ruas do Rio","Carlos Luz deposto; Nereu Ramos (presidente do Senado) assume a presidência","Congresso decreta estado de sítio — Café Filho é impedido de retornar ao cargo","31/1/1956: JK e Jango tomam posse normalmente","Ministros golpistas Eduardo Gomes (Aeronáutica) e Amorim do Vale (Marinha) são substituídos por Lott"],ri:"O episódio ocorre no contexto da eleição de Eisenhower e do avanço da doutrina anticomunista americana na AL. O FMI pressionava por ajuste fiscal que JK recusaria. A crise revela que a democracia eleitoral brasileira era frágil — dependente do equilíbrio interno nas FA, não de uma cultura civil de aceitação dos resultados.",legado:"Alfred Stepan, em 'Os Militares na Política' (1971), usa o Movimento de 11 de Novembro como caso paradigmático do 'padrão moderador' das FA brasileiras: intervêm não para governar diretamente, mas para arbitrar crises políticas. O legalismo de Lott — usar tanques para garantir a democracia — é paradoxal mas real. A divisão entre Lott-legalistas e Eduardo Gomes-golpistas é o eixo da instabilidade 1955–1964.",tags:["11 de Novembro","Lott","JK","Legalismo","Eduardo Gomes","1955","Stepan"]}},
{date:"1955",type:"republica",side:"right",title:"Contragolpe Lott — militar legalista defende posse de JK",summary:"General Lott impede golpe da UDN; exceção histórica de militar que usa a força pela democracia.",governo:"Café Filho / Carlos Luz (depostos por Lott); Nereu Ramos assume; JK toma posse em jan. 1956",modal:{contexto:"Após a eleição de Juscelino Kubitschek (1955), setores militares e a UDN tentam impedir sua posse alegando que JK era comunista. O General Henrique Teixeira Lott, Ministro da Guerra, desfere um 'contragolpe preventivo': depõe o presidente em exercício Carlos Luz e garante a posse de JK.",fatos:["Outubro 1955: JK eleito com João Goulart como vice — UDN e militares contestam","Carlos Luz (presidente em exercício) edita nota contrária à posse de JK","Novembro 1955: General Lott ocupa o Ministério da Guerra e deflagra o 'contragolpe'","Carlos Luz deposto; Nereu Ramos assume como presidente do Senado","Janeiro 1956: JK toma posse normalmente — contragolpe bem-sucedido","Lott candidata-se à presidência em 1960 e perde para Jânio Quadros"],ri:"O episódio ocorre no contexto de Guerra Fria e da eleição de Eisenhower nos EUA. JK, com a Operação Pan-Americana (1958), tentará contornar a desconfiança americana propondo um plano de desenvolvimento multilateral para o hemisfério.",legado:"O 'contragolpe' de Lott é exceção histórica: militar que usa a força para garantir a democracia, não para destruí-la. O episódio revela que as FA eram internamente divididas — havia uma tradição 'legalista' que se contrapunha ao golpismo. A divisão interna do Exército entre legalistas e golpistas será determinante em 1961 e 1964.",tags:["Lott","JK","Legalismo","Contragolpe","1955","UDN"]}},
{date:"Fev 1956",type:"golpe",side:"right",title:"Revolta de Jacareacanga — golpismo no 1º mês de JK",summary:"FAB toma base amazônica; JK anistia os rebeldes e pavimenta novas conspirações.",governo:"Juscelino Kubitschek (posse em 31/1/1956 — revolta eclode 10 dias depois); Min. da Guerra: General Lott",modal:{contexto:"Poucos dias após a posse de JK, oficiais da Aeronáutica liderados pelo major Haroldo Veloso partem do Campo de Afonsos (RJ) e ocupam a base aérea de Jacareacanga, no sul do Pará. Na análise de Alfred Stepan em 'Os Militares na Política' (1971), a crise político-militar permanente do período 1954–1964 tem origem nessa fratura interna entre legalistas e golpistas nas FA.",fatos:["10/2/1956: Major Veloso e capitão Lameirão roubam avião no Campo de Afonsos e voam para a Amazônia","Rebeldes controlam aeródromos de Jacareacanga, Cachimbo, Belterra e Itaituba (PA)","Manifesto acusa JK de manter comunistas nas FA e de ser legado do getulismo","General Lott enfrenta resistência interna — oficiais da FAB se recusam a combater os colegas","Governo envia paraquedistas; revolta sufocada em 19 dias (29/2/1956). Nenhuma morte","JK anistia os rebeldes pelo Decreto Legislativo nº 22 — 'perigoso precedente'"],ri:"A revolta usa a retórica anticomunista da Doutrina de Segurança Nacional disseminada pelos EUA via Escola das Américas. A FAB tinha laços históricos com a RAF e a USAF, alimentando a influência ideológica anticomunista na força aérea. O contexto internacional é de Revolução Húngara e crise de Suez (1956).",legado:"A anistia concedida por JK foi um erro estratégico: Veloso conspirou novamente em 1959 (Aragarças). A tolerância com o golpismo pavimenta 1964. O nome de Castello Branco aparece nos inquéritos como possível articulador — arquivado sem conclusão. Castello Branco seria o 1º presidente da ditadura em 1964.",tags:["Jacareacanga","JK","FAB","Golpismo","Anticomunismo","Aeronáutica","1956"]}},
{date:"Dez 1959",type:"golpe",side:"left",title:"Revolta de Aragarças — 1º sequestro de avião do Brasil",summary:"Os mesmos de Jacareacanga voltam; sequestram avião da Panair e tentam bombardear palácios presidenciais.",governo:"Juscelino Kubitschek (1956–1961); Min. da Guerra: General Lott (sufocou a revolta em 36h)",modal:{contexto:"Em dezembro de 1959, o mesmo major Haroldo Veloso — anistiado em 1956 — articula nova conspiração com o tenente-coronel João Paulo Moreira Burnier. Roubam aviões do Galeão, sequestram um Constellation da Panair com 46 pessoas a bordo (primeiro sequestro aéreo do Brasil) e ocupam Aragarças (GO) como QG. Pretendiam bombardear os Palácios do Catete e Laranjeiras.",fatos:["2/12/1959: Rebeldes roubam 3 C-47 da Base do Galeão (RJ); sequestram Constellation da Panair sobre a Bahia com 46 reféns","Reféns incluem senador Remy Archer (PSD-MA) e repórter da Globo José Ribamar","Objetivo: bombardear palácios presidenciais, fechar o Congresso e instaurar ditadura militar","Esperavam a adesão de 300 militares — apenas 34 aderiram, reduzidos a 15 ao final","General Lott envia paraquedistas: sufoca a revolta em 36 horas; nenhuma morte","Rebeldes fogem para Argentina, Paraguai e Bolívia; reféns liberados em Buenos Aires","JK NÃO anistia os golpistas desta vez — aprendeu a lição de 1956","Nos papéis apreendidos, Castello Branco aparece novamente como articulador — inquérito arquivado"],ri:"O sequestro do avião da Panair coloca o Brasil em manchetes internacionais. Stepan, em 'Os militares na política' (1971), descreve esse período como crise da relação civil-militar: a linha dura anti-getulista nunca aceitou a democracia quando ela produzia resultados 'errados'.",legado:"Aragarças e Jacareacanga são o embrião do golpe de 1964. O 'Comando Revolucionário' que age em 1956 e 1959 é a mesma rede que o IPES/IBAD articula em 1964. Castello Branco — vinculado a ambas as conspirações e nunca punido — será o 1º presidente da ditadura.",tags:["Aragarças","JK","FAB","Sequestro","Golpismo","Castello Branco","1959"]}},
{date:"1956–1961",type:"ri",side:"left",title:"JK e Jânio — militares, PEI e Cuba",summary:"JK navega entre EUA e URSS; Jânio condecora Che e renuncia misteriosamente.",governo:"Juscelino Kubitschek (1956–1961); Jânio Quadros (jan–ago 1961)",modal:{contexto:"Juscelino Kubitschek implementa o Plano de Metas e constrói Brasília. Jânio Quadros adota a 'Política Externa Independente' (PEI) que irrita os EUA. Os militares observam com crescente desconfiança.",fatos:["JK constrói Brasília — decisão estratégica de interiorização e integração nacional","1958: 'Operação Pan-Americana' — proposta ao Eisenhower de plano Marshall para a América Latina","JK mantém relações com URSS, recusa rompimento com Cuba após Revolução de 1959","1961: Jânio Quadros condecora Che Guevara com a Ordem do Cruzeiro do Sul","Agosto 1961: Jânio renuncia abruptamente — motivos jamais completamente esclarecidos (pressão política, saúde mental?)"],ri:"A 'Política Externa Independente' representa a percepção de que o Brasil devia navegar entre os blocos e ampliar seu espaço de manobra. JK e Jânio antecipam o modelo não-alinhado. Os militares observam com desconfiança — a PEI e a proximidade com Cuba são alvos dos que planejam o golpe de 1964.",legado:"A PEI do período JK-Jânio-Jango é a primeira formulação sistemática da autonomia brasileira nas RI. É precursora do conceito de 'autonomia pela participação' (Gelson Fonseca Jr.) e referência para a análise da inserção internacional brasileira. A renúncia de Jânio precipita a crise de 1961.",tags:["JK","Jânio","Política Externa Independente","Cuba","Brasília","PEI"]}},
{date:"Ago–Set 1961",type:"golpe",side:"right",title:"Veto militar a Jango — Campanha da Legalidade",summary:"Ministros militares veiam a posse do vice Jango; Brizola mobiliza o RS; solução parlamentarista.",governo:"Jânio Quadros renunciou; Ministros militares (Denys, Heck, Grün Moss) tentam vetar Jango; General Machado Lopes apoia a legalidade",modal:{contexto:"Com a renúncia de Jânio, o vice João Goulart (Jango) deveria assumir. Os ministros militares veiam sua posse, alegando comunismo. O Rio Grande do Sul, sob Brizola, mobiliza a 'Cadeia da Legalidade'. Solução: parlamentarismo, que dilui os poderes de Jango.",fatos:["25/8/1961: Jânio renuncia; três ministros militares (Denys, Heck, Grün Moss) vetam a posse de Jango","Brizola organiza a 'Campanha da Legalidade' no RS — transmite pelo rádio em rede nacional clandestina","General Machado Lopes, III Exército (RS), apoia a legalidade com tropa — raro exemplo de militar legalista","Emenda Constitucional parlamentarista aprovada — Jango assume com poderes reduzidos de primeiro-ministro","1963: Referendo restaura o presidencialismo — 82% votam pelo retorno; Jango com plenos poderes"],ri:"A crise ocorre no contexto da Revolução Cubana (1959) e da máxima tensão da Guerra Fria. Os militares brasileiros, formados pela doutrina anticomunista americana (Escola das Américas), veem Jango como vetor da expansão cubana. Os EUA apoiam discretamente o veto militar.",legado:"A 'Campanha da Legalidade' é o maior movimento civil em defesa da Constituição até aquele momento. O general Machado Lopes — que apoiou a legalidade — é figura rara. A solução parlamentarista cria o precedente de alterar o sistema de governo via pressão militar. O episódio divide o Exército e antecipa o golpe de 1964.",tags:["Jânio","Jango","Legalidade","Brizola","Guerra Fria","Cuba","Parlamentarismo"]}},
{date:"31 Mar–1 Abr 1964",type:"golpe",side:"left",title:"Golpe Militar de 1964 — a ditadura que duraria 21 anos",summary:"Militares depõem Jango; EUA reconhecem o governo em 24h; início da ditadura.",governo:"João Goulart deposto; Junta Militar instala Castelo Branco — início do regime de 21 anos",modal:{contexto:"O golpe de 31/3 e 1/4 de 1964 derruba o presidente João Goulart. Articulado pelos generais Castelo Branco, Costa e Silva e pelo empresariado civil (IPES/IBAD), conta com apoio dos EUA (Operação Brother Sam) e de setores da Igreja, imprensa e classe média.",fatos:["13/3/1964: Comício das Reformas de Base — Jango anuncia reforma agrária e estatização de refinarias","19/3/1964: 'Marcha da Família com Deus pela Liberdade' — 500.000 pessoas em SP","31/3/1964: General Olímpio Mourão Filho inicia movimento em Juiz de Fora — desobedece a ordens superiores","1/4/1964: Jango parte para o Uruguai sem resistência; Congresso declara a vaga da presidência vaga","Operação Brother Sam: porta-aviões USS Forrestal e petroleiros americanos a caminho do Brasil — desnecessários pois o golpe triunfou rapidamente","9/4/1964: Primeiro Ato Institucional — cassações e poderes de exceção"],ri:"Os EUA reconhecem o novo governo em menos de 24 horas — antes mesmo da confirmação constitucional. Lincoln Gordon, embaixador dos EUA, teve papel ativo na articulação do golpe — cabogramas revelados décadas depois confirmam o apoio americano. A 'Operação Brother Sam' demonstra que Washington aprovara o golpe preventivamente. O golpe é parte do padrão americano de apoio a regimes militares na América Latina durante a Guerra Fria.",legado:"O golpe de 1964 inaugura a mais longa e sistemática ditadura da história brasileira. 21 anos de regime autoritário, cinco generais-presidentes, torturas, exílios, 434 mortos e desaparecidos (CNV). A Lei da Anistia (1979) e a Comissão Nacional da Verdade (2014) são marcos do processo incompleto de justiça de transição.",tags:["1964","Golpe","EUA","Guerra Fria","Castelo Branco","Ditadura","IPES"]}},
{date:"1964–1985",type:"ditadura",side:"right",title:"Os Cinco Generais-Presidentes — a ditadura em detalhe",summary:"21 anos, cinco presidentes fardados: de Castelo Branco à abertura de Figueiredo.",governo:"Ditadura Militar — cinco presidentes generais (1964–1985)",modal:{contexto:"A ditadura (1964–1985) teve cinco presidentes militares, cada um com perfil e dinâmica distintos. A linha do tempo interna vai da 'institucionalização' autoritária (Castelo) ao endurecimento máximo (Médici) e à lenta abertura (Geisel e Figueiredo).",presGov:[{nome:"General Humberto Castelo Branco",period:"Abril 1964 – Março 1967",desc:"Primeiro presidente da ditadura. Considerado 'moderado' e 'castelista': pretendia institucionalizar e entregar o poder aos civis. Criou os Atos Institucionais (AI-1, AI-2). Extinguiu os partidos e criou ARENA e MDB. Cassou 3.500 cidadãos. Morreu num acidente aéreo em 1967, meses após deixar o poder."},{nome:"General Artur da Costa e Silva",period:"Março 1967 – Agosto 1969",desc:"Representa a ascensão da 'linha dura'. Decretou o AI-5 em dezembro de 1968 — o mais autoritário ato da ditadura. Fechou o Congresso, suspendeu o habeas corpus, institucionalizou a censura e a tortura. Sofreu um AVC em agosto de 1969 e foi substituído por uma Junta Militar (Lira, Rademaker e Muricy) que escolheu Médici."},{nome:"General Emílio Garrastazu Médici",period:"Outubro 1969 – Março 1974",desc:"'Os Anos de Chumbo'. Maior repressão da ditadura: torturas sistemáticas nos DOI-CODIs, guerrilha do Araguaia esmagada, 434 mortos e desaparecidos confirmados pela CNV. Paradoxalmente, coincide com o 'Milagre Econômico' (PIB +11% ao ano). Usou o futebol (Copa 70) e a propaganda ufanista como instrumentos de legitimação."},{nome:"General Ernesto Geisel",period:"Março 1974 – Março 1979",desc:"Iniciou a abertura política 'lenta, gradual e segura'. Filho de imigrante alemão, luterano — perfil incomum. Em 1975 demitiu o general Ednardo D'Ávila após a morte de Herzog. Revogou o AI-5 em 1978. Resistiu à 'linha dura' — mas o atentado do Riocentro (1981) mostrou que ela ainda agia."},{nome:"General João Baptista Figueiredo",period:"Março 1979 – Março 1985",desc:"Último general-presidente. Dizia 'prender e arrebentar' e 'preferir o cheiro de cavalo ao cheiro do povo'. Sancionou a Lei de Anistia (1979). Enfrentou a Novembrada em Florianópolis (1979). O atentado do Riocentro (1981) — bomba que matou um sargento durante show — foi sabotagem da 'linha dura'. Conduziu a transição até a eleição de Tancredo Neves (1985)."}],fatos:["AI-1 (1964) → AI-2 (1965) → AI-5 (1968): escalada autoritária em três atos","DOI-CODIs e OBAN: centros de tortura em SP e RJ, financiados por empresas privadas","434 mortos e desaparecidos confirmados pela Comissão Nacional da Verdade (2014)","Operação Condor: rede regional de repressão com Argentina, Chile, Paraguai, Uruguai e Bolívia — suporte da CIA","Guerrilha do Araguaia (1972–74): PCdoB; 69 guerrilheiros mortos e desaparecidos — corpos nunca entregues"],ri:"A ditadura é profundamente moldada pela Guerra Fria e pela Doutrina de Segurança Nacional (DSN) americana. A ESG absorve a doutrina anti-subversão da Escola das Américas. A Operação Condor conecta as ditaduras sul-americanas. A dívida externa salta de US$5bi (1964) para US$100bi (1985). O regime simultaneamente reprime internamente e busca uma política externa 'responsável e pragmática': reconhece Angola (1975), diversifica parceiros.",legado:"O período deixa 434 mortos e desaparecidos confirmados — e impunidade garantida pela Lei de Anistia. A CNV (2014) documentou os crimes mas não houve responsabilização penal. O debate sobre a memória da ditadura permanece central na política brasileira, ressurgindo com intensidade no governo Bolsonaro (2019–22).",tags:["Ditadura","Castelo","Costa e Silva","Médici","Geisel","Figueiredo","AI-5","Tortura","Condor"]}},
{date:"13 Dez 1968",type:"ditadura",side:"left",title:"AI-5 — o golpe dentro do golpe",summary:"Costa e Silva fecha o Congresso; tortura torna-se política de Estado; Anos de Chumbo.",governo:"General Artur da Costa e Silva (1967–1969)",modal:{contexto:"Em dezembro de 1968, o deputado Márcio Moreira Alves discursa conclamando o boicote ao desfile de 7 de setembro. O governo pede ao Congresso a cassação do mandato — a Câmara recusa. Costa e Silva reage com o AI-5, o ato mais autoritário da ditadura.",fatos:["13/12/1968: AI-5 — fecha o Congresso, suspende habeas corpus, institui censura total e cassações ilimitadas","DOI-CODI São Paulo (OBAN): centro de tortura e execução de dissidentes, financiado por empresas privadas","Carlos Marighella (ALN): líder guerrilheiro morto em emboscada em SP (nov. 1969)","Carlos Lamarca (VPR/MRT): ex-capitão do Exército; líder guerrilheiro morto na Bahia (set. 1971)","1969: Sequestro do embaixador americano Burke Elbrick — trocado por 15 presos políticos","Sequestros de embaixadores alemão (1970), suíço (1970) e japonês (1970) — trocas por presos políticos"],ri:"O sequestro de Burke Elbrick (embaixador americano) e de outros diplomatas europeus cria grave tensão nas relações externas. O Brasil é alvo de denúncias internacionais de tortura na ONU e em Anistia Internacional. A guerrilha urbana usa sequestros de diplomatas como instrumento de pressão e visibilidade internacional — revelando a interdependência entre repressão interna e política externa.",legado:"O AI-5 é o instrumento mais autoritário da ditadura. Os '10 anos de chumbo' que se seguem são o período mais violento. A tortura como política de Estado deixa sequelas físicas e psicológicas em toda uma geração. A impunidade dos torturadores — garantida pela Lei de Anistia — é ferida aberta da democracia brasileira.",tags:["AI-5","Costa e Silva","Tortura","Guerrilha","1968","DOI-CODI","Sequestros"]}},
{date:"30 Nov 1979",type:"resistencia",side:"right",title:"Novembrada — Florianópolis enfrenta o ditador",summary:"Primeira vez que um presidente militar enfrenta protesto popular direto; estudantes são presos.",governo:"General João Baptista Figueiredo (1979–1985)",modal:{contexto:"Em 30 de novembro de 1979, o presidente Figueiredo visitou Florianópolis numa tentativa de popularizar sua imagem. A visita — planejada com balões, bandeirinhas e churrasco em Palhoça — desandou em protesto histórico. Estudantes da UFSC organizados pelo DCE foram ao centro da cidade junto com populares indignados com a carestia.",fatos:["Figueiredo era conhecido pela frase 'prefiro o cheiro de cavalo ao cheiro do povo' e 'prendo e arrebento'","30/11/1979: Estudantes da UFSC vão ao calçadão; taxistas e populares aderem protestando contra carestia e arrocho salarial","Confronto físico com a comitiva presidencial — ministro Cesar Cals levou um tapa de manifestante; assessores foram empurrados","Sete estudantes presos e enquadrados na Lei de Segurança Nacional","As prisões geram novos e maiores protestos por dias — movimento se amplifica","A partir da Novembrada, Figueiredo cancelou visitas aos centros históricos das cidades","Presos defendidos por advogados históricos dos direitos humanos: Heleno Fragoso, Renê Dotti, José Carlos Dias"],ri:"A Novembrada ocorre meses após a Lei de Anistia (agosto de 1979) e no mesmo ano da 2ª crise do petróleo que aprofundava a recessão brasileira. Internacionalmente, o Brasil observava o processo de redemocratização da Europa do Sul (Portugal, 1974; Espanha, 1975–78) e da América Latina. O evento teve cobertura de todos os jornais e redes de rádio e televisão nacionais.",legado:"Primeiro protesto popular direto enfrentado por um presidente militar durante a ditadura. Marco do processo de redemocratização. Evidenciou que a 'linha dura' e o controle da informação já não conseguiam isolar o regime da crítica popular. Samuel Wainer (Folha de S.Paulo) chamou de 'Provocações em Marcha'. Tornou-se símbolo da resistência catarinense e referência do movimento estudantil na luta pela democracia.",tags:["Novembrada","Figueiredo","Florianópolis","UFSC","Ditadura","Resistência","1979"]}},
{date:"1979–1985",type:"ditadura",side:"left",title:"Abertura, Anistia e Diretas Já — a saída negociada",summary:"Geisel e Figueiredo conduzem a 'distensão lenta, gradual e segura'; civis retornam em 1985.",governo:"General Geisel (1974–79); General Figueiredo (1979–85)",modal:{contexto:"Geisel inicia a abertura política 'lenta, gradual e segura'. A 'linha dura' resiste. Figueiredo conduz a transição; em 1985, Tancredo Neves é eleito pelo Colégio Eleitoral.",fatos:["1974: Geisel anuncia a 'distensão' — MDB vence as eleições parlamentares (58% dos votos)","1975: Morte de Vladimir Herzog nas dependências do DOI-CODI — Geisel demite general responsável","1977: 'Pacote de Abril' — Geisel fecha o Congresso para garantir maioria conservadora no Senado","1978: Revogação do AI-5","1979: Lei de Anistia — anistia presos políticos E torturadores (a grande controvérsia)","1980–84: Surgimento do PT (Lula), da CUT, do MST — novos atores sociais","1981: Atentado do Riocentro — bomba mata sargento durante show: 'linha dura' sabotava a abertura","1983–84: Diretas Já — maior movimento popular da história brasileira (3 milhões nas ruas)","1985: Tancredo Neves eleito pelo Colégio Eleitoral; morre antes de tomar posse — Sarney assume"],ri:"A abertura ocorre no contexto de crise da dívida externa (choque do petróleo 1973/79, alta dos juros americanos em 1979 — FED sob Volcker). A pressão do FMI e dos credores externos é determinante. O declínio da ditadura é também declínio do modelo econômico. O Brasil reconhece Angola (MPLA, 1975) e adota posição mais autônoma na política externa — 'Pragmatismo Responsável' de Geisel.",legado:"A transição 'pelo alto' — sem ruptura, sem julgamento dos torturadores — é o calcanhar de Aquiles da democracia brasileira. A Lei de Anistia (1979), reinterpretada pelo STF em 2010 como abrangendo também os agentes do Estado, impede a responsabilização penal. O debate sobre impunidade persiste e reaparece nos momentos de crise democrática.",tags:["Abertura","Anistia","Diretas Já","Geisel","Figueiredo","Transição","Herzog","Riocentro"]}},
{date:"1985–1990",type:"republica",side:"right",title:"Nova República — militares sob tutela constitucional (parcial)",summary:"Constituição de 1988 redefine o papel das FA; art. 142 gera controvérsia até hoje.",governo:"José Sarney (1985–1990) — primeiro presidente civil desde Jânio Quadros (1961)",modal:{contexto:"A Constituição de 1988 é o marco jurídico da Nova República. O artigo 142, que atribui às FA a missão de 'garantir os poderes constitucionais' e a 'lei e a ordem', torna-se alvo de disputa interpretativa por décadas. Os militares aceitam a democracia formal mas preservam zonas de autonomia.",fatos:["1988: Constituição Cidadã — FA subordinadas ao poder civil, mas art. 142 permanece ambíguo","Ministério da Defesa só é criado em 1999 — até lá, militares respondiam diretamente à Presidência","SNI (Serviço Nacional de Informações) preservado sob Sarney — dissolvido apenas em 1990 por Collor","Militares mantêm controle sobre Amazônia, fronteiras e questões de 'segurança nacional'","1989: Collor eleito — primeiro presidente civil eleito diretamente desde 1960"],ri:"O Brasil redemocratizado retoma iniciativa na política externa. Sarney aprofunda a integração com a Argentina — processo que culminará no Mercosul (1991). A questão nuclear (Brasil e Argentina tinham programas militares secretos) é central: ambos desmilitarizam seus programas e criam a ABACC (1991). O Brasil assina o TNP somente em 1998.",legado:"A Constituição de 1988 é a mais democrática da história brasileira, mas preserva ambiguidades sobre o papel das FA. O art. 142 será reinterpretado por militares e políticos como autorização para 'moderação' política — ressuscitando a tese do 'poder moderador' fardado que ressurge em 2022.",tags:["Constituição 88","Nova República","Art. 142","Mercosul","Nuclear","Sarney"]}},
{date:"1992–1994",type:"republica",side:"left",title:"Impeachment de Collor — militares ficam à margem",summary:"Primeiro impeachment da história — sem intervenção militar; democracia consolida-se.",governo:"Fernando Collor de Mello (1990–1992); Itamar Franco (1992–1994)",modal:{contexto:"Collor é eleito em 1989. Em 1992, escândalo de corrupção (PC Farias) leva ao impeachment. O processo é conduzido inteiramente por instituições civis. Os militares — diferentemente de crises anteriores — não intervêm.",fatos:["1992: Denúncias do irmão Pedro Collor — esquema PC Farias exposto pela Veja","Caras pintadas: manifestações massivas de jovens pelo impeachment — geração pós-ditadura","29/12/1992: Collor renuncia antes da votação final no Senado","Itamar Franco assume — governa até 1994 sem qualquer crise ou pressão militar","Plano Real (1994): estabilização econômica que elegerá FHC com 54% no primeiro turno"],ri:"O impeachment ocorre enquanto o Brasil realizara a ECO-92 (Rio) e integrava o Mercosul. A resolução institucional — ao contrário do padrão histórico — projetou internacionalmente a imagem de consolidação democrática. O Brasil emerge como ator emergente no sistema internacional.",legado:"O impeachment de Collor é o primeiro teste da democracia brasileira sem intervenção militar. Seu sucesso demonstra que as instituições civis podiam resolver crises sem tutor fardado. O precedente é invocado em 2016 (Dilma) e em 2022 (Bolsonaro). A ausência militar no processo é, em si, o legado mais importante.",tags:["Collor","Impeachment","Democracia","1992","Itamar","Plano Real"]}},
