<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil — Expansão Territorial & Diplomacia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;600&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#f5f0e8;--surface:#faf7f2;--dark:#1a1208;--border:#c8b89a;--accent:#8b3a0f;--gold:#b8860b;--text:#2a1f0e;--muted:#7a6a52}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;color:var(--text);font-family:'Crimson Pro',serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#0f0c06;padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;border-bottom:2px solid var(--gold);flex-shrink:0}
.hl h1{font-family:'Playfair Display',serif;font-size:clamp(.85rem,2vw,1.2rem);font-weight:900;color:#f5f0e8}
.hl h1 em{color:var(--gold);font-style:normal}
.hl p{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:#7a6a52;margin-top:.1rem}
.layout{display:flex;flex:1;overflow:hidden;min-height:0;flex-direction:column}
#map{flex:1;background:#1a2a3a !important;min-height:300px}
.leaflet-container{background:#1a2a3a !important}
.leaflet-control-zoom a{background:#0f0c06 !important;color:var(--gold) !important}

/* Timeline */
.timeline-container{background:#0f0c06;border-top:2px solid var(--gold);padding:.5rem 1rem;flex-shrink:0}
.timeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.timeline-header h3{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--gold)}
.timeline-value{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:#f5f0e8;background:rgba(184,134,11,.2);padding:.1rem .5rem;border-radius:20px}
.timeline-labels{display:flex;justify-content:space-between;margin-top:.3rem}
.timeline-labels span{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:#8a7a62;cursor:pointer}
.timeline-labels span:hover{color:var(--gold)}
#timeline{height:6px;margin:.5rem 0 .2rem}
.noUi-connect{background:var(--gold)}
.noUi-handle{width:16px;height:16px;right:-8px;top:-5px;background:#f5f0e8;border:2px solid var(--gold);border-radius:50%;box-shadow:none;cursor:pointer}
.noUi-handle:before,.noUi-handle:after{display:none}

.legend-bar{background:#13100a;padding:.2rem 1rem;display:flex;flex-wrap:wrap;gap:.3rem .8rem;align-items:center;flex-shrink:0;max-height:45px;overflow-y:auto}
.leg-item{display:flex;align-items:center;gap:.25rem;font-family:'IBM Plex Mono',monospace;font-size:.45rem;color:#8a7a62;cursor:pointer}
.leg-item:hover{color:#f5f0e8}
.leg-sw{width:10px;height:10px;border-radius:2px}

.panel{position:fixed;bottom:140px;right:15px;width:300px;background:var(--surface);border:1px solid var(--border);border-radius:6px;display:none;z-index:1000;max-height:50vh}
.panel.active{display:flex;flex-direction:column}
.p-header{padding:.5rem .8rem;background:var(--dark);border-radius:6px 6px 0 0}
.p-tit{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;color:#f5f0e8}
.p-sub{font-size:.6rem;color:var(--gold)}
.p-close{float:right;background:transparent;border:none;color:var(--muted);cursor:pointer}
.p-scroll{flex:1;overflow-y:auto;padding:.5rem;font-size:.7rem}
.ev-card{border:1px solid var(--border);margin-bottom:.4rem;background:#fff;border-radius:4px}
.ev-top{padding:.4rem .6rem;cursor:pointer}
.ev-name{font-weight:600;font-size:.75rem}
.ev-date{font-size:.6rem;color:var(--muted)}
.ev-body{display:none;padding:.4rem .6rem;border-top:1px solid #eee}
.ev-body.open{display:block}
.badge{display:inline-block;font-size:.45rem;padding:.1rem .3rem;border-radius:2px;margin-bottom:.2rem}
.bc{background:#fdecea;color:#b71c1c}
.bt{background:#fff8e1;color:#e65100}
.bd{background:#e3f0fb;color:#0d47a1}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
</head>
<body>
<header>
  <div class="hl">
    <h1>Brasil — <em>Expansão Territorial</em> &amp; Diplomacia</h1>
    <p>Arraste a linha do tempo • Clique nos estados</p>
  </div>
</header>

<div class="layout">
  <div id="map"></div>
  
  <div class="timeline-container">
    <div class="timeline-header">
      <h3>📜 EVOLUÇÃO TERRITORIAL — ARRASTE</h3>
      <div class="timeline-value" id="yearDisplay">1494</div>
    </div>
    <div id="timeline"></div>
    <div class="timeline-labels" id="timelineLabels"></div>
  </div>
  
  <div class="legend-bar" id="legendBar"></div>
</div>

<div class="panel" id="panel">
  <div class="p-header">
    <button class="p-close" onclick="closePanel()">✕</button>
    <div class="p-tit" id="panelTitle">Tratado</div>
    <div class="p-sub" id="panelSub"></div>
  </div>
  <div class="p-scroll" id="panelContent"></div>
</div>

<script>
// ============================================
// MAPA
// ============================================
const map = L.map('map').setView([-14, -55], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, attribution: '&copy; OSM & CartoDB'
}).addTo(map);

// ============================================
// TRATADOS
// ============================================
const tratados = [
  { year: 1494, name: "Tratado de Tordesilhas", sub: "Divisão Portugal/Espanha", color: "#c8685a", region: "original",
    desc: "7 de junho de 1494: divisão do mundo a 370 léguas de Cabo Verde.",
    leaders: "🇵🇹 D. João II | 🇪🇸 Fernando II e Isabel I", consequence: "Portugal reivindicou o Brasil.", legacy: "Fundamento do colonialismo português." },
  { year: 1750, name: "Tratado de Madri", sub: "Uti possidetis", color: "#d4956a", region: "espanha",
    desc: "13 de janeiro de 1750: substituiu Tordesilhas pelo uti possidetis.", leaders: "🇵🇹 D. João V | 🇪🇸 Fernando VI", consequence: "Brasil incorporou milhões de km².", legacy: "Maior ganho territorial da história." },
  { year: 1777, name: "Santo Ildefonso", sub: "Ajuste no sul", color: "#e8a850", region: "espanha",
    desc: "1º de outubro de 1777: ajuste de fronteiras no sul.", leaders: "🇵🇹 D. Maria I | 🇪🇸 Carlos III", consequence: "Portugal manteve o Rio Grande do Sul.", legacy: "Última demarcação colonial." },
  { year: 1801, name: "Missões Orientais", sub: "Anexação do noroeste do RS", color: "#90b878", region: "argentina1801",
    desc: "Tomada dos Sete Povos das Missões.", leaders: "🇧🇷 Borges do Canto", consequence: "Brasil incorporou o noroeste gaúcho.", legacy: "Definiu a fronteira do RS." },
  { year: 1816, name: "Cisplatina", sub: "Banda Oriental", color: "#58c888", region: "argentina1816",
    desc: "Invasão da Banda Oriental (atual Uruguai).", leaders: "🇧🇷 D. João VI | 🇺🇾 José Artigas", consequence: "Cisplatina tornou-se Uruguai (1828).", legacy: "Estado-tampão britânico." },
  { year: 1867, name: "Tratado de Ayacucho", sub: "Fronteira com a Bolívia", color: "#78b468", region: "bolivia1860",
    desc: "Fronteira no paralelo 10°20' e rio Madeira.", leaders: "🇧🇷 D. Pedro II | 🇧🇴 Mariano Melgarejo", consequence: "Acre ficou em zona ambígua.", legacy: "Semente da crise de 1903." },
  { year: 1870, name: "Guerra do Paraguai", sub: "Anexação de territórios", color: "#8ab4d8", region: "paraguai",
    desc: "Paraguai perdeu 140.000 km².", leaders: "🇧🇷 D. Pedro II | 🇵🇾 Solano López", consequence: "Brasil consolidou-se como potência.", legacy: "Acelerou o fim do Império." },
  { year: 1900, name: "Questão do Amapá", sub: "Arbitragem de Berna", color: "#78c8d8", region: "franca",
    desc: "Suíça decidiu a favor do Brasil.", leaders: "🇧🇷 Prudente de Morais | 🇫🇷 Félix Faure", consequence: "Brasil garantiu o Amapá.", legacy: "Vitória de Rio Branco." },
  { year: 1903, name: "Tratado de Petrópolis", sub: "Anexação do Acre", color: "#b888c8", region: "acre",
    desc: "Brasil anexou 191.000 km² da Bolívia.", leaders: "🇧🇷 Rio Branco | 🇧🇴 José Manuel Pando", consequence: "Acre foi incorporado.", legacy: "Símbolo da diplomacia de Rio Branco." }
];

// Cores
const regionColors = {
  'original': '#c8685a', 'espanha': '#d4956a', 'argentina1801': '#90b878',
  'argentina1816': '#58c888', 'bolivia1860': '#78b468', 'acre': '#b888c8',
  'paraguai': '#8ab4d8', 'franca': '#78c8d8'
};

// Estado base
const baseRegion = {
  'AC':'original','AL':'original','AP':'original','AM':'original','BA':'original',
  'CE':'original','DF':'original','ES':'original','GO':'original','MA':'original',
  'MG':'original','MS':'original','MT':'original','PA':'original','PB':'original',
  'PE':'original','PI':'original','PR':'original','RJ':'original','RN':'original',
  'RO':'original','RR':'original','RS':'original','SC':'original','SE':'original',
  'SP':'original','TO':'original'
};

let stateRegions = {...baseRegion};

// Atualiza cores pelo ano
function updateMapByYear(year) {
  stateRegions = {...baseRegion};
  tratados.forEach(t => {
    if (t.year <= year) {
      if (t.region === 'espanha') ['MG','GO','DF','TO','MT'].forEach(s => stateRegions[s] = 'espanha');
      if (t.region === 'argentina1801') stateRegions['RS'] = 'argentina1801';
      if (t.region === 'argentina1816') stateRegions['SC'] = 'argentina1816';
      if (t.region === 'bolivia1860') stateRegions['RO'] = 'bolivia1860';
      if (t.region === 'acre') stateRegions['AC'] = 'acre';
      if (t.region === 'paraguai') stateRegions['MS'] = 'paraguai';
      if (t.region === 'franca') stateRegions['AP'] = 'franca';
    }
  });
  if (stateLayer) {
    stateLayer.eachLayer(layer => {
      const sigla = layer.feature?.properties?.sigla;
      if (sigla) layer.setStyle({ fillColor: regionColors[stateRegions[sigla]] || '#666' });
    });
  }
  document.getElementById('yearDisplay').innerHTML = year;
}

// ============================================
// GEOJSON (USANDO O MESMO DO SEU MAPA DE CONFLITOS)
// ============================================
let stateLayer = null;

fetch('https://raw.githubusercontent.com/codeforgermany/click-here/main/brazil-states.json')
  .then(r => r.json())
  .then(geojson => {
    stateLayer = L.geoJSON(geojson, {
      style: f => ({ fillColor: regionColors[stateRegions[f.properties.sigla]||'original'], fillOpacity: 0.7, color: '#fff', weight: 1 }),
      onEachFeature: (f, l) => {
        const nome = f.properties.name;
        const sigla = f.properties.sigla;
        l.bindTooltip(nome);
        l.on('click', () => {
          const treaty = tratados.slice().reverse().find(t => {
            if (t.region === 'espanha') return ['MG','GO','DF','TO','MT'].includes(sigla);
            if (t.region === 'argentina1801') return sigla === 'RS';
            if (t.region === 'argentina1816') return sigla === 'SC';
            if (t.region === 'bolivia1860') return sigla === 'RO';
            if (t.region === 'acre') return sigla === 'AC';
            if (t.region === 'paraguai') return sigla === 'MS';
            if (t.region === 'franca') return sigla === 'AP';
            return false;
          }) || tratados[0];
          showPanel(treaty, nome);
        });
        l.on('mouseover', () => l.setStyle({ fillOpacity: 0.9, weight: 2 }));
        l.on('mouseout', () => l.setStyle({ fillOpacity: 0.7, weight: 1 }));
      }
    }).addTo(map);
    map.fitBounds([[-33, -73], [5, -34]]);
    updateMapByYear(1494);
  })
  .catch(e => { console.error(e); document.getElementById('timeline-container').innerHTML += '<p style="color:red">Erro ao carregar mapa</p>'; });

// ============================================
// TIMELINE
// ============================================
const years = tratados.map(t => t.year);
const timeline = document.getElementById('timeline');
noUiSlider.create(timeline, { start: [1494], connect: [true, false], step: 1, range: { min: 1494, max: 1903 } });
timeline.noUiSlider.on('update', (v) => updateMapByYear(Math.round(v[0])));

const labelsDiv = document.getElementById('timelineLabels');
years.forEach(y => { let s = document.createElement('span'); s.textContent = y; s.onclick = () => timeline.noUiSlider.set(y); labelsDiv.appendChild(s); });

// ============================================
// LEGENDA
// ============================================
const legendBar = document.getElementById('legendBar');
tratados.forEach(t => {
  const div = document.createElement('div');
  div.className = 'leg-item';
  div.innerHTML = `<div class="leg-sw" style="background:${t.color}"></div>${t.name}`;
  div.onclick = () => { timeline.noUiSlider.set(t.year); showPanel(t); };
  legendBar.appendChild(div);
});

// ============================================
// PAINEL
// ============================================
function showPanel(t, state = '') {
  document.getElementById('panelTitle').innerHTML = `📜 ${t.name}`;
  document.getElementById('panelSub').innerHTML = t.sub;
  document.getElementById('panelContent').innerHTML = `
    <div class="ev-card"><div class="ev-top" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="badge ${t.year>=1900?'bc':(t.year>=1800?'bt':'bd')}">${t.year}</span>
      <div class="ev-name">${t.name}</div><div class="ev-date">📅 ${t.year}</div>
    </div><div class="ev-body">
      <div><strong>📝 Descrição</strong><br>${t.desc}</div><br>
      <div><strong>👑 Líderes</strong><br>${t.leaders}</div><br>
      <div><strong>⚡ Consequências</strong><br>${t.consequence}</div><br>
      <div><strong>🏛️ Legado</strong><br>${t.legacy}</div>
      ${state ? `<br><div><strong>📍 ${state}</strong> foi incorporado por este tratado.</div>` : ''}
    </div></div>`;
  document.getElementById('panel').classList.add('active');
}

function closePanel() { document.getElementById('panel').classList.remove('active'); }

// Linha de Tordesilhas
L.polyline([[5,-46],[0,-46],[-5,-46],[-10,-46],[-15,-46],[-20,-46],[-25,-46],[-30,-46],[-33,-46]],
  { color: '#b8860b', weight: 3, dashArray: '8,6', opacity: 0.8 }).addTo(map);
</script>
</body>
</html>
