<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil — Expansão Territorial & Diplomacia na América do Sul</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;600&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#f5f0e8;--surface:#faf7f2;--dark:#1a1208;--border:#c8b89a;--accent:#8b3a0f;--gold:#b8860b;--text:#2a1f0e;--muted:#7a6a52}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;color:var(--text);font-family:'Crimson Pro',serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#0f0c06;padding:.9rem 1.6rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:2px solid var(--gold);flex-shrink:0}
.hl h1{font-family:'Playfair Display',serif;font-size:clamp(.95rem,2vw,1.4rem);font-weight:900;color:#f5f0e8;line-height:1.2}
.hl h1 em{color:var(--gold);font-style:normal}
.hl p{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:#7a6a52;margin-top:.2rem;letter-spacing:.1em;text-transform:uppercase}
.legend-bar{background:#13100a;border-bottom:1px solid rgba(184,134,11,.2);padding:.4rem 1.6rem;display:flex;flex-wrap:wrap;gap:.5rem 1.2rem;align-items:center;flex-shrink:0;max-height:70px;overflow-y:auto}
.leg-item{display:flex;align-items:center;gap:.35rem;font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:#8a7a62;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:color .2s}
.leg-item:hover{color:#f5f0e8}
.leg-sw{width:13px;height:13px;border-radius:2px;flex-shrink:0}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
#map{flex:1;background:#1a2a3a !important}
.leaflet-container{background:#1a2a3a !important}
.leaflet-control-zoom a{background:#0f0c06 !important;color:var(--gold) !important;border-color:var(--border) !important}
.panel{width:380px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.p-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;gap:.7rem;color:var(--muted)}
.p-empty .d{font-size:2.8rem;opacity:.12}
.p-empty h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--muted);font-weight:400}
.p-empty p{font-size:.82rem;line-height:1.6;opacity:.8}
.p-content{display:none;flex-direction:column;height:100%;overflow:hidden}
.p-content.active{display:flex}
.p-header{padding:.9rem 1.2rem .8rem;border-bottom:1px solid var(--border);background:var(--dark);flex-shrink:0;position:relative}
.p-ey{font-family:'IBM Plex Mono',monospace;font-size:.57rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.2rem}
.p-tit{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#f5f0e8;line-height:1.25}
.p-sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8a7a62;margin-top:.18rem}
.p-close{position:absolute;top:.7rem;right:.8rem;width:24px;height:24px;border:1px solid rgba(184,134,11,.4);background:transparent;color:var(--gold);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.p-close:hover{background:var(--gold);color:var(--dark)}
.p-scroll{flex:1;overflow-y:auto;padding:.8rem 1rem;scrollbar-width:thin}
.ev-card{border:1px solid var(--border);margin-bottom:.65rem;background:#fff;transition:border-color .2s}
.ev-card:hover{border-color:var(--accent)}
.ev-top{padding:.65rem .85rem;cursor:pointer;display:flex;flex-direction:column;gap:.22rem}
.ev-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.4rem}
.badge{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:600;padding:.14rem .38rem;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;border:1px solid;flex-shrink:0}
.bc{background:#fdecea;color:#b71c1c;border-color:#ef9a9a}
.bd{background:#e3f0fb;color:#0d47a1;border-color:#90caf9}
.bt{background:#fff8e1;color:#e65100;border-color:#ffcc02}
.be{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}
.bn{background:#fff3e0;color:#bf360c;border-color:#ffcc80}
.br{background:#f3e5f5;color:#4a148c;border-color:#ce93d8}
.ev-name{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--dark);line-height:1.3;flex:1}
.ev-date{font-family:'IBM Plex Mono',monospace;font-size:.63rem;color:var(--muted)}
.ev-ch{font-size:.56rem;color:var(--muted);transition:transform .2s;margin-left:.2rem;flex-shrink:0}
.ev-card.open .ev-ch{transform:rotate(90deg)}
.ev-body{display:none;padding:0 .85rem .85rem;border-top:1px solid #eee}
.ev-body.open{display:block}
.ev-s{margin-top:.65rem}
.ev-l{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.16rem}
.ev-t{font-size:.79rem;line-height:1.65;color:#3a2a18}
.ldrs{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.18rem}
.ldr{background:var(--bg);border:1px solid var(--border);padding:.38rem .52rem}
.lf{font-size:.9rem;display:block;margin-bottom:.08rem}
.lr{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.ln{font-size:.74rem;font-weight:600;color:var(--dark);line-height:1.25}
.tord-btn{display:flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:600;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;transition:all .25s;white-space:nowrap}
.tord-btn:hover,.tord-btn.active{background:var(--gold);color:#0f0c06}
@media(max-width:900px){.layout{flex-direction:column}.panel{width:100%;border-left:none;border-top:2px solid var(--border);max-height:50vh}}
</style>
</head>
<body>
<header>
  <div class="hl">
    <h1>Brasil — <em>Expansão Territorial</em> &amp; Diplomacia na América do Sul</h1>
    <p>Clique nos estados • Cores indicam origem histórica do território</p>
  </div>
  <button class="tord-btn" id="tordBtn">⚖️ &nbsp;Linha de Tordesilhas (1494)</button>
</header>

<div class="legend-bar" id="legendBar"></div>

<div class="layout">
  <div id="map"></div>
  <div class="panel">
    <div class="p-empty" id="pEmpty">
      <div class="d">🗺</div>
      <h3>Selecione uma Região</h3>
      <p>Clique em qualquer estado do mapa ou nos itens da legenda para ver os eventos históricos e diplomáticos detalhados.</p>
    </div>
    <div class="p-content" id="pContent">
      <div class="p-header">
        <div class="p-ey" id="pEy">Região</div>
        <div class="p-tit" id="pTit">—</div>
        <div class="p-sub" id="pSub"></div>
        <button class="p-close" onclick="closePanel()">✕</button>
      </div>
      <div class="p-scroll" id="pScroll"></div>
    </div>
  </div>
</div>

<script>
// Mapa base
const map = L.map('map').setView([-14, -55], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB'
}).addTo(map);

// Cores por região histórica (baseadas na sua imagem)
const regionColors = {
  'Território Original': '#c8685a',
  'Cedido pela Espanha (1494)': '#d4956a',
  'Cedido pelo Peru/Espanha (1600)': '#e8a850',
  'Cedido pelo Peru/Espanha (1650)': '#d4c060',
  'Cedido pela Colômbia/Espanha (1750)': '#88c858',
  'Cedido pela Colômbia (1860)': '#5aaa38',
  'Cedido pela Bolívia (1860)': '#78b468',
  'Cedido pela Bolívia (1903) — Acre': '#b888c8',
  'Cedido pelo Paraguai (1870)': '#8ab4d8',
  'Cedido pela Argentina/Espanha (1801)': '#90b878',
  'Cedido pela Argentina (1816)': '#58c888',
  'Cedido pela França (1816)': '#78c8d8'
};

// Mapeamento de cada estado para sua região histórica
// Baseado na história territorial do Brasil
const stateToRegion = {
  // Território Original (litoral do Nordeste e Sudeste)
  'PE': 'Território Original', 'PB': 'Território Original', 'RN': 'Território Original',
  'CE': 'Território Original', 'PI': 'Território Original', 'AL': 'Território Original',
  'SE': 'Território Original', 'BA': 'Território Original', 'ES': 'Território Original',
  'RJ': 'Território Original', 'SP': 'Território Original',
  
  // Cedido pela Espanha (área central)
  'MG': 'Cedido pela Espanha (1494)', 'GO': 'Cedido pela Espanha (1494)',
  'DF': 'Cedido pela Espanha (1494)', 'TO': 'Cedido pela Espanha (1494)',
  
  // Peru/Espanha (Amazonas)
  'AM': 'Cedido pelo Peru/Espanha (1650)', 'PA': 'Cedido pelo Peru/Espanha (1650)',
  'RR': 'Cedido pelo Peru/Espanha (1650)', 'AP': 'Cedido pela França (1816)',
  
  // Colômbia
  'AC': 'Cedido pela Bolívia (1903) — Acre',
  
  // Bolívia
  'RO': 'Cedido pela Bolívia (1860)', 'MT': 'Cedido pela Bolívia (1860)',
  
  // Paraguai
  'MS': 'Cedido pelo Paraguai (1870)', 'PR': 'Cedido pelo Paraguai (1870)',
  
  // Argentina
  'SC': 'Cedido pela Argentina (1816)', 'RS': 'Cedido pela Argentina (1801)'
};

// Dados detalhados por região (para o painel)
const regionDetails = {
  'Território Original': {
    sub: 'A leste da Linha de Tordesilhas · A partir de 1494',
    events: [
      { n: "Tratado de Tordesilhas", b: "bt", bl: "Tratado", d: "7 de junho de 1494", l: [{ f: "🇵🇹", r: "Rei de Portugal", n: "D. João II" }, { f: "🇪🇸", r: "Reis de Castela", n: "Fernando II e Isabel I" }], re: "Divisão do mundo a 370 léguas a oeste de Cabo Verde. Apenas o litoral nordeste/leste do Brasil ficava do lado português.", mo: "Resolver a disputa sobre as terras descobertas por Colombo (1492).", co: "Portugal reivindicou legitimidade sobre o Brasil.", le: "Nunca foi efetivamente respeitada. O Tratado de Madri (1750) a substituiu.", rp: "Fundamento do direito colonial português." },
      { n: "Chegada de Pedro Álvares Cabral", b: "br", bl: "Evento", d: "22 de abril de 1500", l: [{ f: "🇵🇹", r: "Rei de Portugal", n: "D. Manuel I" }], re: "Cabral chega ao atual Porto Seguro (BA) e reivindica o território para Portugal.", mo: "Expedição rumo à Índia desvia-se para o oeste.", co: "Início da colonização portuguesa.", le: "Fundamento jurídico da soberania brasileira.", rp: "Definiu o Brasil como possessão lusitana." }
    ]
  },
  'Cedido pela Espanha (1494)': {
    sub: 'Faixa entre Tordesilhas e a fronteira colonial efetiva',
    events: [
      { n: "Expansão Bandeirante Além de Tordesilhas", b: "br", bl: "Expansão", d: "Sécs. XVII–XVIII", l: [{ f: "🇧🇷", r: "Bandeirantes", n: "Borba Gato, Anhanguera" }], re: "As bandeiras paulistas avançam centenas de léguas ignorando Tordesilhas.", mo: "Busca por escravos indígenas, ouro e pedras preciosas.", co: "Criou o princípio do uti possidetis.", le: "Brasil conquistou ~4 milhões de km² além de Tordesilhas.", rp: "Alexandre de Gusmão usou no Tratado de Madri (1750)." }
    ]
  },
  'Cedido pelo Peru/Espanha (1650)': {
    sub: 'Grande expansão central e norte — Amazônia',
    events: [
      { n: "Expedição de Pedro Teixeira", b: "br", bl: "Expansão", d: "1637–1638", l: [{ f: "🇧🇷", r: "Capitão", n: "Pedro Teixeira" }], re: "Navegou todo o Amazonas até Quito.", mo: "Afirmar posse portuguesa durante a União Ibérica.", co: "Precedente de controle lusitano sobre o Amazonas.", le: "Primeira demarcação efetiva do Amazonas.", rp: "Afastou Peru/Espanha da bacia amazônica." }
    ]
  },
  'Cedido pela Bolívia (1903) — Acre': {
    sub: 'Tratado de Petrópolis · Revolução Acreana',
    events: [
      { n: "Revolução Acreana e Tratado de Petrópolis", b: "bc", bl: "Conflito/Tratado", d: "1899–1903", l: [{ f: "🇧🇷", r: "Presidente", n: "Rodrigues Alves/Rio Branco" }, { f: "🇧🇴", r: "Presidente", n: "José Manuel Pando" }], re: "Seringueiros brasileiros no Acre boliviano se rebelaram. O Brasil interveio e o Tratado de Petrópolis (1903) cedeu o Acre ao Brasil.", mo: "Riqueza da borracha. ~60.000 brasileiros viviam no Acre.", co: "Brasil obteve 191.000 km².", le: "Símbolo máximo da diplomacia Rio Branco.", rp: "Causou ressentimento duradouro na Bolívia." }
    ]
  },
  'Cedido pela Bolívia (1860)': {
    sub: 'Alto Madeira / Guaporé / Fronteira MT',
    events: [
      { n: "Tratado de Ayacucho", b: "bt", bl: "Tratado", d: "1867", l: [{ f: "🇧🇷", r: "Imperador", n: "D. Pedro II" }, { f: "🇧🇴", r: "Presidente", n: "Mariano Melgarejo" }], re: "Fixou fronteira pelo paralelo 10°20'.", mo: "Demarcação após independência boliviana.", co: "Acre ficou em zona ambígua.", le: "Semente da crise de 1903.", rp: "Exemplo de acordos vagos que criam conflitos." }
    ]
  },
  'Cedido pelo Paraguai (1870)': {
    sub: 'Guerra da Tríplice Aliança · Ganhos Territoriais',
    events: [
      { n: "Guerra do Paraguai", b: "bc", bl: "Guerra", d: "1864–1870", l: [{ f: "🇧🇷", r: "Imperador", n: "D. Pedro II" }, { f: "🇵🇾", r: "Ditador", n: "Francisco Solano López" }], re: "Maior guerra da América do Sul. Paraguai invadiu RS e MT.", mo: "Solano López buscava hegemonia regional.", co: "Paraguai perdeu 140.000 km² para Brasil e Argentina.", le: "Brasil emergiu como potência militar regional.", rp: "Acelerou a Proclamação da República (1889)." }
    ]
  },
  'Cedido pela Argentina/Espanha (1801)': {
    sub: 'Missões Orientais · Noroeste do Rio Grande do Sul',
    events: [
      { n: "Tomada das Missões Orientais", b: "bc", bl: "Conflito", d: "1801", l: [{ f: "🇧🇷", r: "Capitania do RS", n: "Borges do Canto" }], re: "Tropas luso-brasileiras tomaram os Sete Povos das Missões.", mo: "Guerra das Laranjas na Europa.", co: "Brasil incorporou o NW do RS.", le: "Definiu o extremo noroeste do RS.", rp: "Argentina reconheceu em 1857." },
      { n: "Questão de Palmas — Arbitragem Cleveland", b: "bd", bl: "Arbitragem", d: "1893–1895", l: [{ f: "🇧🇷", r: "Presidente", n: "Floriano Peixoto" }, { f: "🇦🇷", r: "Presidente", n: "Luis Sáenz Peña" }], re: "EUA arbitrou a favor do Brasil.", mo: "Região rica em erva-mate.", co: "Brasil ganhou 30.621 km² (SW do Paraná).", le: "Primeira grande vitória de Rio Branco.", rp: "Consagrou a arbitragem internacional." }
    ]
  },
  'Cedido pela Argentina (1816)': {
    sub: 'Cisplatina · Banda Oriental',
    events: [
      { n: "Província Cisplatina", b: "bc", bl: "Conflito", d: "1816–1821", l: [{ f: "🇧🇷", r: "Rei", n: "D. João VI" }, { f: "🇺🇾", r: "Revolucionário", n: "José Artigas" }], re: "Banda Oriental incorporada como Cisplatina.", mo: "Conter a revolução artiguista.", co: "Artigas exilado no Paraguai.", le: "Gerou nacionalismo uruguaio.", rp: "Contribuiu para instabilidade do Império." },
      { n: "Independência do Uruguai", b: "bc", bl: "Guerra", d: "1825–1828", l: [{ f: "🇧🇷", r: "Imperador", n: "D. Pedro I" }, { f: "🇺🇾", r: "Líderes", n: "Lavalleja/Rivera" }], re: "Criação do Uruguai como Estado-tampão.", mo: "Grã-Bretanha não queria hegemonia no Prata.", co: "Brasil perdeu a Cisplatina.", le: "Uruguai nasceu por interesse britânico.", rp: "Contribuiu para abdicação de D. Pedro I." }
    ]
  },
  'Cedido pela França (1816)': {
    sub: 'Amapá · Questão do Oiapoque',
    events: [
      { n: "Questão do Amapá — Arbitragem de Berna", b: "bd", bl: "Arbitragem", d: "1895–1900", l: [{ f: "🇧🇷", r: "Presidente", n: "Prudente de Morais" }, { f: "🇫🇷", r: "Presidente", n: "Félix Faure" }], re: "Suíça decidiu a favor do Brasil.", mo: "Descoberta de ouro na região.", co: "Brasil garantiu o Amapá.", le: "Primeira grande vitória de Rio Branco.", rp: "Lançou Rio Branco à cena nacional." }
    ]
  }
};

// Construir legenda
const legendBar = document.getElementById('legendBar');
Object.entries(regionColors).forEach(([name, color]) => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.setAttribute('data-region', name);
  item.innerHTML = `<div class="leg-sw" style="background:${color}"></div>${name}`;
  item.onclick = () => openRegionDetail(name);
  legendBar.appendChild(item);
});

let currentLayer = null;

// Carregar GeoJSON dos estados do Brasil
fetch('https://raw.githubusercontent.com/codeforgermany/click-here/main/brazil-states.json')
  .then(response => response.json())
  .then(data => {
    // Fallback: tentar IBGE
    if (!data || !data.features) {
      return fetch('https://servicodados.ibge.gov.br/api/v3/malhas/estados?formato=application/vnd.geo+json&qualidade=minima')
        .then(r => r.json());
    }
    return data;
  })
  .then(geojson => {
    currentLayer = L.geoJSON(geojson, {
      style: function(feature) {
        const sigla = feature.properties.sigla || feature.properties.SIGLA || feature.properties.UF;
        const region = stateToRegion[sigla] || 'Território Original';
        return {
          fillColor: regionColors[region] || '#666',
          fillOpacity: 0.7,
          color: '#fff',
          weight: 1,
          opacity: 0.8
        };
      },
      onEachFeature: function(feature, layer) {
        const sigla = feature.properties.sigla || feature.properties.SIGLA || feature.properties.UF;
        const nome = feature.properties.nome || feature.properties.NM_ESTADO || feature.properties.Nome || sigla;
        const region = stateToRegion[sigla] || 'Território Original';
        
        layer.bindTooltip(`${nome} — ${region}`);
        
        layer.on('click', () => {
          openRegionDetail(region);
        });
        
        layer.on('mouseover', function() {
          this.setStyle({ fillOpacity: 0.9, weight: 2 });
        });
        
        layer.on('mouseout', function() {
          this.setStyle({ fillOpacity: 0.7, weight: 1 });
        });
      }
    }).addTo(map);
  })
  .catch(error => {
    console.error('Erro ao carregar GeoJSON:', error);
    document.getElementById('pEmpty').innerHTML = `
      <div class="d">⚠️</div>
      <h3>Erro ao carregar mapa</h3>
      <p>Não foi possível carregar os dados dos estados.<br>Verifique sua conexão e tente novamente.</p>
    `;
  });

function openRegionDetail(regionName) {
  const details = regionDetails[regionName];
  if (!details) return;
  
  document.getElementById('pEy').textContent = 'Região Histórica';
  document.getElementById('pTit').textContent = regionName;
  document.getElementById('pSub').textContent = details.sub;
  document.getElementById('pScroll').innerHTML = details.events.map((e, i) => renderCard(e, regionName + i)).join('');
  document.getElementById('pEmpty').style.display = 'none';
  document.getElementById('pContent').style.display = 'flex';
}

function renderCard(e, id) {
  const leadersHtml = e.l.map(l => `
    <div class="ldr">
      <span class="lf">${l.f}</span>
      <div class="lr">${l.r}</div>
      <div class="ln">${l.n}</div>
    </div>
  `).join('');
  
  return `
    <div class="ev-card" id="c${id}">
      <div class="ev-top" onclick="toggleCard('${id}')">
        <div class="ev-row">
          <span class="badge ${e.b}">${e.bl}</span>
          <span class="ev-ch">▶</span>
        </div>
        <div class="ev-name">${e.n}</div>
        <div class="ev-date">📅 ${e.d}</div>
      </div>
      <div class="ev-body" id="b${id}">
        <div class="ev-s"><div class="ev-l">Líderes</div><div class="ldrs">${leadersHtml}</div></div>
        ${e.re ? `<div class="ev-s"><div class="ev-l">Resumo</div><p class="ev-t">${e.re}</p></div>` : ''}
        ${e.mo ? `<div class="ev-s"><div class="ev-l">Motivação</div><p class="ev-t">${e.mo}</p></div>` : ''}
        ${e.co ? `<div class="ev-s"><div class="ev-l">Consequências</div><p class="ev-t">${e.co}</p></div>` : ''}
        ${e.le ? `<div class="ev-s"><div class="ev-l">Legado</div><p class="ev-t">${e.le}</p></div>` : ''}
        ${e.rp ? `<div class="ev-s"><div class="ev-l">Repercussão na Política Externa</div><p class="ev-t">${e.rp}</p></div>` : ''}
      </div>
    </div>
  `;
}

function toggleCard(id) {
  const card = document.getElementById('c' + id);
  const body = document.getElementById('b' + id);
  if (!card || !body) return;
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

function closePanel() {
  document.getElementById('pEmpty').style.display = 'flex';
  document.getElementById('pContent').style.display = 'none';
}

// Linha de Tordesilhas
let tordesilhasOn = false;
const tordesilhasPoints = [[-33, -50], [-5, -45], [5, -35]];
const tordesilhasLine = L.polyline(tordesilhasPoints, {
  color: '#b8860b',
  weight: 3,
  dashArray: '8, 6',
  opacity: 0
}).addTo(map);

document.getElementById('tordBtn').addEventListener('click', () => {
  tordesilhasOn = !tordesilhasOn;
  tordesilhasLine.setStyle({ opacity: tordesilhasOn ? 1 : 0 });
  document.getElementById('tordBtn').classList.toggle('active', tordesilhasOn);
});

// Adicionar fallback manual
setTimeout(() => {
  if (!currentLayer) {
    console.log('Tentando carregar GeoJSON alternativo...');
    fetch('https://servicodados.ibge.gov.br/api/v3/malhas/estados?formato=application/vnd.geo+json&qualidade=minima')
      .then(r => r.json())
      .then(geojson => {
        L.geoJSON(geojson, {
          style: { fillColor: '#666', fillOpacity: 0.5, color: '#fff', weight: 1 },
          onEachFeature: (f, l) => {
            const nome = f.properties.NM_ESTADO || 'Estado';
            l.bindTooltip(nome);
          }
        }).addTo(map);
      });
  }
}, 2000);
</script>
