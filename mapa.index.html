<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil — Expansão Territorial & Diplomacia na América do Sul</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;600&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#f5f0e8;--surface:#faf7f2;--dark:#1a1208;--border:#c8b89a;--accent:#8b3a0f;--gold:#b8860b;--text:#2a1f0e;--muted:#7a6a52}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;color:var(--text);font-family:'Crimson Pro',serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#0f0c06;padding:.9rem 1.6rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:2px solid var(--gold);flex-shrink:0}
.hl h1{font-family:'Playfair Display',serif;font-size:clamp(.95rem,2vw,1.4rem);font-weight:900;color:#f5f0e8;line-height:1.2}
.hl h1 em{color:var(--gold);font-style:normal}
.hl p{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:#7a6a52;margin-top:.2rem;letter-spacing:.1em;text-transform:uppercase}
.legend-bar{background:#13100a;border-bottom:1px solid rgba(184,134,11,.2);padding:.4rem 1.6rem;display:flex;flex-wrap:wrap;gap:.5rem 1.2rem;align-items:center;flex-shrink:0;max-height:80px;overflow-y:auto}
.leg-item{display:flex;align-items:center;gap:.35rem;font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:#8a7a62;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:color .2s}
.leg-item:hover{color:#f5f0e8}
.leg-sw{width:13px;height:13px;border-radius:2px;flex-shrink:0}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
#map{flex:1;background:#1a2a3a !important}
.leaflet-container{background:#1a2a3a !important}
.leaflet-control-zoom a{background:#0f0c06 !important;color:var(--gold) !important;border-color:var(--border) !important}
.panel{width:380px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.p-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;gap:.7rem;color:var(--muted)}
.p-empty .d{font-size:2.8rem;opacity:.12}
.p-empty h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--muted);font-weight:400}
.p-empty p{font-size:.82rem;line-height:1.6;opacity:.8}
.p-content{display:none;flex-direction:column;height:100%;overflow:hidden}
.p-content.active{display:flex}
.p-header{padding:.9rem 1.2rem .8rem;border-bottom:1px solid var(--border);background:var(--dark);flex-shrink:0;position:relative}
.p-ey{font-family:'IBM Plex Mono',monospace;font-size:.57rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.2rem}
.p-tit{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#f5f0e8;line-height:1.25}
.p-sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#8a7a62;margin-top:.18rem}
.p-close{position:absolute;top:.7rem;right:.8rem;width:24px;height:24px;border:1px solid rgba(184,134,11,.4);background:transparent;color:var(--gold);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.p-close:hover{background:var(--gold);color:var(--dark)}
.p-scroll{flex:1;overflow-y:auto;padding:.8rem 1rem;scrollbar-width:thin}
.ev-card{border:1px solid var(--border);margin-bottom:.65rem;background:#fff;transition:border-color .2s}
.ev-card:hover{border-color:var(--accent)}
.ev-top{padding:.65rem .85rem;cursor:pointer;display:flex;flex-direction:column;gap:.22rem}
.ev-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.4rem}
.badge{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:600;padding:.14rem .38rem;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;border:1px solid;flex-shrink:0}
.bc{background:#fdecea;color:#b71c1c;border-color:#ef9a9a}
.bd{background:#e3f0fb;color:#0d47a1;border-color:#90caf9}
.bt{background:#fff8e1;color:#e65100;border-color:#ffcc02}
.be{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}
.bn{background:#fff3e0;color:#bf360c;border-color:#ffcc80}
.br{background:#f3e5f5;color:#4a148c;border-color:#ce93d8}
.ev-name{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--dark);line-height:1.3;flex:1}
.ev-date{font-family:'IBM Plex Mono',monospace;font-size:.63rem;color:var(--muted)}
.ev-ch{font-size:.56rem;color:var(--muted);transition:transform .2s;margin-left:.2rem;flex-shrink:0}
.ev-card.open .ev-ch{transform:rotate(90deg)}
.ev-body{display:none;padding:0 .85rem .85rem;border-top:1px solid #eee}
.ev-body.open{display:block}
.ev-s{margin-top:.65rem}
.ev-l{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.16rem}
.ev-t{font-size:.79rem;line-height:1.65;color:#3a2a18}
.ldrs{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.18rem}
.ldr{background:var(--bg);border:1px solid var(--border);padding:.38rem .52rem}
.lf{font-size:.9rem;display:block;margin-bottom:.08rem}
.lr{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.ln{font-size:.74rem;font-weight:600;color:var(--dark);line-height:1.25}
.tord-btn{display:flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:600;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;transition:all .25s;white-space:nowrap}
.tord-btn:hover,.tord-btn.active{background:var(--gold);color:#0f0c06}
@media(max-width:900px){.layout{flex-direction:column}.panel{width:100%;border-left:none;border-top:2px solid var(--border);max-height:50vh}}
</style>
</head>
<body>
<header>
  <div class="hl">
    <h1>Brasil — <em>Expansão Territorial</em> &amp; Diplomacia na América do Sul</h1>
    <p>Clique nos estados • Cores indicam origem histórica do território</p>
  </div>
  <button class="tord-btn" id="tordBtn">⚖️ &nbsp;Linha de Tordesilhas (1494)</button>
</header>

<div class="legend-bar" id="legendBar"></div>

<div class="layout">
  <div id="map"></div>
  <div class="panel">
    <div class="p-empty" id="pEmpty">
      <div class="d">🗺</div>
      <h3>Selecione uma Região</h3>
      <p>Clique em qualquer estado do mapa ou nos itens da legenda para ver os eventos históricos e diplomáticos detalhados.</p>
    </div>
    <div class="p-content" id="pContent">
      <div class="p-header">
        <div class="p-ey" id="pEy">Região</div>
        <div class="p-tit" id="pTit">—</div>
        <div class="p-sub" id="pSub"></div>
        <button class="p-close" onclick="closePanel()">✕</button>
      </div>
      <div class="p-scroll" id="pScroll"></div>
    </div>
  </div>
</div>

<script>
// Mapa base
const map = L.map('map').setView([-14, -55], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB'
}).addTo(map);

// CORES POR REGIÃO (bem distintas para visualização)
const regionColors = {
  'Território Original (Portugal)': '#c8685a',      // vermelho terroso
  'Cedido pela Espanha (1494)': '#d4956a',         // laranja
  'Cedido pelo Peru/Espanha (1650)': '#e8a850',    // dourado
  'Cedido pela Bolívia (1860)': '#78b468',         // verde claro
  'Cedido pela Bolívia (1903) — Acre': '#b888c8',  // lilás
  'Cedido pelo Paraguai (1870)': '#8ab4d8',        // azul
  'Cedido pela Argentina/Espanha (1801)': '#90b878', // verde oliva
  'Cedido pela Argentina (1816)': '#58c888',       // verde
  'Cedido pela França (1816)': '#78c8d8'           // azul claro
};

// MAPEAMENTO POR ESTADO (IMPORTANTE - cada estado com sua região histórica)
const stateToRegion = {
  // Território Original (litoral leste)
  'AC': 'Cedido pela Bolívia (1903) — Acre',
  'AL': 'Território Original (Portugal)',
  'AP': 'Cedido pela França (1816)',
  'AM': 'Cedido pelo Peru/Espanha (1650)',
  'BA': 'Território Original (Portugal)',
  'CE': 'Território Original (Portugal)',
  'DF': 'Cedido pela Espanha (1494)',
  'ES': 'Território Original (Portugal)',
  'GO': 'Cedido pela Espanha (1494)',
  'MA': 'Território Original (Portugal)',
  'MT': 'Cedido pela Espanha (1494)',
  'MS': 'Cedido pelo Paraguai (1870)',
  'MG': 'Cedido pela Espanha (1494)',
  'PA': 'Cedido pelo Peru/Espanha (1650)',
  'PB': 'Território Original (Portugal)',
  'PR': 'Território Original (Portugal)',
  'PE': 'Território Original (Portugal)',
  'PI': 'Território Original (Portugal)',
  'RJ': 'Território Original (Portugal)',
  'RN': 'Território Original (Portugal)',
  'RS': 'Cedido pela Argentina/Espanha (1801)',
  'RO': 'Cedido pela Bolívia (1860)',
  'RR': 'Cedido pelo Peru/Espanha (1650)',
  'SC': 'Cedido pela Argentina (1816)',
  'SP': 'Território Original (Portugal)',
  'SE': 'Território Original (Portugal)',
  'TO': 'Cedido pela Espanha (1494)'
};

// Nomes dos estados
const stateNames = {
  'AC': 'Acre', 'AL': 'Alagoas', 'AP': 'Amapá', 'AM': 'Amazonas', 'BA': 'Bahia',
  'CE': 'Ceará', 'DF': 'Distrito Federal', 'ES': 'Espírito Santo', 'GO': 'Goiás',
  'MA': 'Maranhão', 'MT': 'Mato Grosso', 'MS': 'Mato Grosso do Sul', 'MG': 'Minas Gerais',
  'PA': 'Pará', 'PB': 'Paraíba', 'PR': 'Paraná', 'PE': 'Pernambuco', 'PI': 'Piauí',
  'RJ': 'Rio de Janeiro', 'RN': 'Rio Grande do Norte', 'RS': 'Rio Grande do Sul',
  'RO': 'Rondônia', 'RR': 'Roraima', 'SC': 'Santa Catarina', 'SP': 'São Paulo',
  'SE': 'Sergipe', 'TO': 'Tocantins'
};

// DADOS DETALHADOS DAS REGIÕES
const regionDetails = {
  'Território Original (Portugal)': {
    sub: 'A leste da Linha de Tordesilhas · Séc. XVI',
    events: [
      { n: "Tratado de Tordesilhas", b: "bt", bl: "Tratado", d: "7 de junho de 1494", l: [{ f: "🇵🇹", r: "Rei de Portugal", n: "D. João II" }, { f: "🇪🇸", r: "Reis de Castela", n: "Fernando II e Isabel I" }], re: "Divisão do mundo a 370 léguas a oeste de Cabo Verde.", mo: "Resolver a disputa sobre as terras descobertas por Colombo.", co: "Portugal reivindicou legitimidade sobre o Brasil.", le: "Nunca foi efetivamente respeitada.", rp: "Fundamento do direito colonial português." }
    ]
  },
  'Cedido pela Espanha (1494)': {
    sub: 'Faixa entre Tordesilhas e a fronteira colonial',
    events: [
      { n: "Expansão Bandeirante", b: "br", bl: "Expansão", d: "Sécs. XVII–XVIII", l: [{ f: "🇧🇷", r: "Bandeirantes", n: "Borba Gato, Anhanguera" }], re: "Bandeiras avançam ignorando Tordesilhas.", mo: "Busca por ouro e escravos.", co: "Criou o princípio do uti possidetis.", le: "Brasil conquistou milhões de km².", rp: "Usado no Tratado de Madri (1750)." }
    ]
  },
  'Cedido pelo Peru/Espanha (1650)': {
    sub: 'Expansão na Amazônia',
    events: [
      { n: "Expedição de Pedro Teixeira", b: "br", bl: "Expansão", d: "1637–1638", l: [{ f: "🇧🇷", r: "Capitão", n: "Pedro Teixeira" }], re: "Navegou o Amazonas até Quito.", mo: "Afirmar posse portuguesa.", co: "Controle lusitano sobre o Amazonas.", le: "Primeira demarcação efetiva.", rp: "Afastou Peru da bacia amazônica." }
    ]
  },
  'Cedido pela Bolívia (1903) — Acre': {
    sub: 'Tratado de Petrópolis',
    events: [
      { n: "Revolução Acreana", b: "bc", bl: "Conflito", d: "1899–1903", l: [{ f: "🇧🇷", r: "Presidente", n: "Rio Branco" }, { f: "🇧🇴", r: "Presidente", n: "José Manuel Pando" }], re: "Seringueiros se rebelaram. Brasil anexou o Acre.", mo: "Riqueza da borracha.", co: "Brasil obteve 191.000 km².", le: "Símbolo da diplomacia Rio Branco.", rp: "Ressentimento na Bolívia." }
    ]
  },
  'Cedido pela Bolívia (1860)': {
    sub: 'Tratado de Ayacucho',
    events: [
      { n: "Tratado de Ayacucho", b: "bt", bl: "Tratado", d: "1867", l: [{ f: "🇧🇷", r: "Imperador", n: "D. Pedro II" }, { f: "🇧🇴", r: "Presidente", n: "Mariano Melgarejo" }], re: "Fixou fronteira pelo paralelo 10°20'.", mo: "Demarcação pós-independência.", co: "Acre ficou em zona ambígua.", le: "Semente da crise de 1903.", rp: "Exemplo de acordos vagos." }
    ]
  },
  'Cedido pelo Paraguai (1870)': {
    sub: 'Guerra da Tríplice Aliança',
    events: [
      { n: "Guerra do Paraguai", b: "bc", bl: "Guerra", d: "1864–1870", l: [{ f: "🇧🇷", r: "Imperador", n: "D. Pedro II" }, { f: "🇵🇾", r: "Ditador", n: "Solano López" }], re: "Paraguai perdeu 140.000 km².", mo: "Solano López buscava hegemonia.", co: "Brasil ganhou territórios.", le: "Brasil como potência militar.", rp: "Acelerou a Proclamação da República." }
    ]
  },
  'Cedido pela Argentina/Espanha (1801)': {
    sub: 'Missões Orientais',
    events: [
      { n: "Tomada das Missões", b: "bc", bl: "Conflito", d: "1801", l: [{ f: "🇧🇷", r: "Comandante", n: "Borges do Canto" }], re: "Tomada dos Sete Povos das Missões.", mo: "Guerra das Laranjas.", co: "Brasil incorporou NW do RS.", le: "Definiu fronteira do RS.", rp: "Argentina reconheceu em 1857." }
    ]
  },
  'Cedido pela Argentina (1816)': {
    sub: 'Cisplatina',
    events: [
      { n: "Província Cisplatina", b: "bc", bl: "Conflito", d: "1816–1821", l: [{ f: "🇧🇷", r: "Rei", n: "D. João VI" }, { f: "🇺🇾", r: "Líder", n: "José Artigas" }], re: "Banda Oriental incorporada.", mo: "Conter a revolução artiguista.", co: "Artigas exilado.", le: "Gerou nacionalismo uruguaio.", rp: "Contribuiu para instabilidade." }
    ]
  },
  'Cedido pela França (1816)': {
    sub: 'Amapá',
    events: [
      { n: "Questão do Amapá", b: "bd", bl: "Arbitragem", d: "1900", l: [{ f: "🇧🇷", r: "Presidente", n: "Prudente de Morais" }, { f: "🇫🇷", r: "Presidente", n: "Félix Faure" }], re: "Suíça decidiu a favor do Brasil.", mo: "Descoberta de ouro.", co: "Brasil garantiu o Amapá.", le: "Vitória de Rio Branco.", rp: "Lançou Rio Branco à cena nacional." }
    ]
  }
};

// Construir legenda
const legendBar = document.getElementById('legendBar');
Object.entries(regionColors).forEach(([name, color]) => {
  if (regionDetails[name]) {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-sw" style="background:${color}; border:1px solid rgba(255,255,255,0.3)"></div>${name}`;
    item.onclick = () => openRegionDetail(name);
    legendBar.appendChild(item);
  }
});

function openRegionDetail(regionName) {
  const details = regionDetails[regionName];
  if (!details) return;
  
  document.getElementById('pEy').textContent = 'Região Histórica';
  document.getElementById('pTit').textContent = regionName;
  document.getElementById('pSub').textContent = details.sub;
  document.getElementById('pScroll').innerHTML = details.events.map((e, i) => renderCard(e, regionName + i)).join('');
  document.getElementById('pEmpty').style.display = 'none';
  document.getElementById('pContent').style.display = 'flex';
}

function renderCard(e, id) {
  const leadersHtml = e.l.map(l => `
    <div class="ldr">
      <span class="lf">${l.f}</span>
      <div class="lr">${l.r}</div>
      <div class="ln">${l.n}</div>
    </div>
  `).join('');
  
  return `
    <div class="ev-card" id="c${id}">
      <div class="ev-top" onclick="toggleCard('${id}')">
        <div class="ev-row">
          <span class="badge ${e.b}">${e.bl}</span>
          <span class="ev-ch">▶</span>
        </div>
        <div class="ev-name">${e.n}</div>
        <div class="ev-date">📅 ${e.d}</div>
      </div>
      <div class="ev-body" id="b${id}">
        <div class="ev-s"><div class="ev-l">Líderes</div><div class="ldrs">${leadersHtml}</div></div>
        ${e.re ? `<div class="ev-s"><div class="ev-l">Resumo</div><p class="ev-t">${e.re}</p></div>` : ''}
        ${e.mo ? `<div class="ev-s"><div class="ev-l">Motivação</div><p class="ev-t">${e.mo}</p></div>` : ''}
        ${e.co ? `<div class="ev-s"><div class="ev-l">Consequências</div><p class="ev-t">${e.co}</p></div>` : ''}
        ${e.le ? `<div class="ev-s"><div class="ev-l">Legado</div><p class="ev-t">${e.le}</p></div>` : ''}
        ${e.rp ? `<div class="ev-s"><div class="ev-l">Repercussão na Política Externa</div><p class="ev-t">${e.rp}</p></div>` : ''}
      </div>
    </div>
  `;
}

function toggleCard(id) {
  const card = document.getElementById('c' + id);
  const body = document.getElementById('b' + id);
  if (!card || !body) return;
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

function closePanel() {
  document.getElementById('pEmpty').style.display = 'flex';
  document.getElementById('pContent').style.display = 'none';
}

// ============================================
// LINHA DE TORDESILHAS
// ============================================
const tordesilhasPoints = [
  [5.5, -46], [2, -46], [0, -46], [-3, -46], [-6, -46],
  [-9, -46], [-12, -46], [-15, -46], [-18, -46], [-21, -46],
  [-24, -46], [-27, -46], [-30, -46], [-33, -46]
];

const tordesilhasLine = L.polyline(tordesilhasPoints, {
  color: '#b8860b',
  weight: 4,
  dashArray: '10, 8',
  opacity: 0
}).addTo(map);

const tordesilhasLabel = L.marker([-16, -46], {
  icon: L.divIcon({
    className: 'tordesilhas-label',
    html: '<div style="background:#0f0c06;color:#b8860b;padding:4px 8px;border-radius:4px;font-family:monospace;font-size:11px;border:1px solid #b8860b;white-space:nowrap;">⚖️ Linha de Tordesilhas<br><span style="font-size:9px;">Meridiano ~46° W</span></div>',
    iconSize: [140, 40],
    iconAnchor: [70, 20]
  })
}).addTo(map);
tordesilhasLabel.setOpacity(0);

let tordesilhasOn = false;
document.getElementById('tordBtn').addEventListener('click', () => {
  tordesilhasOn = !tordesilhasOn;
  tordesilhasLine.setStyle({ opacity: tordesilhasOn ? 1 : 0 });
  tordesilhasLabel.setOpacity(tordesilhasOn ? 1 : 0);
  document.getElementById('tordBtn').classList.toggle('active', tordesilhasOn);
});

// ============================================
// CARREGAR GEOJSON DOS ESTADOS COM CORES
// ============================================
console.log('Carregando mapa dos estados...');

fetch('https://servicodados.ibge.gov.br/api/v3/malhas/estados?formato=application/vnd.geo+json&qualidade=minima')
  .then(response => response.json())
  .then(geojson => {
    console.log('GeoJSON carregado com sucesso!', geojson.features.length, 'estados');
    
    L.geoJSON(geojson, {
      style: function(feature) {
        const sigla = feature.properties.SIGLA;
        const region = stateToRegion[sigla] || 'Território Original (Portugal)';
        const color = regionColors[region] || '#666';
        console.log('Estado:', sigla, 'Região:', region, 'Cor:', color);
        return {
          fillColor: color,
          fillOpacity: 0.75,
          color: '#ffffff',
          weight: 1.5,
          opacity: 0.9
        };
      },
      onEachFeature: function(feature, layer) {
        const sigla = feature.properties.SIGLA;
        const nome = stateNames[sigla] || feature.properties.NM_ESTADO || sigla;
        const region = stateToRegion[sigla] || 'Território Original (Portugal)';
        
        layer.bindTooltip(`${nome}<br><span style="font-size:10px;color:#b8860b">${region}</span>`);
        
        layer.on('click', () => {
          openRegionDetail(region);
        });
        
        layer.on('mouseover', function() {
          this.setStyle({ fillOpacity: 0.95, weight: 2.5 });
        });
        
        layer.on('mouseout', function() {
          this.setStyle({ fillOpacity: 0.75, weight: 1.5 });
        });
      }
    }).addTo(map);
    
    // Ajustar zoom para mostrar todo o Brasil
    map.fitBounds([[-33, -73], [5, -34]]);
  })
  .catch(error => {
    console.error('Erro ao carregar GeoJSON:', error);
    document.getElementById('pEmpty').innerHTML = `
      <div class="d">⚠️</div>
      <h3>Erro ao carregar mapa</h3>
      <p>Não foi possível carregar os dados dos estados.<br>Erro: ${error.message}</p>
    `;
  });
</script>
</body>
</html>
